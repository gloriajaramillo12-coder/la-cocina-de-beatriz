harinado a 350 grados hasta que esté.", "Se desmolda y se deja enfriar.", "Se cubre con pudín de chocolate."], "notes": []}, {"title": "Bizcocho De Un Huevo", "ingredients": ["1 huevo", "1 naranja rallada", "2 pocillos colmados de harina", "¼ de cucharadita de bicarbonato", "1 cucharada de manteca o mantequilla", "1 pocillo de azúcar", "1 cucharadita de polvo royal", "1 pocillo de leche cortada"], "steps": ["Se mezcla la manteca o la mantequilla y el azúcar, la naranja y la leche batiendo bien.", "Se agregan los demás ingredientes y se mezclan bien, luego se coloca en el horno en un molde engrasado y enharinado a 350 grados hasta que el cuchillo salga limpio.", "Se deja reposar, y se desmolda."], "notes": []}, {"title": "Bizcocho Inglés", "ingredients": ["4 ½ pocillos de bizcocho", "1 pocillo de azúcar", "8 huevos", "½ libra de ciruelas picadas", "1 libra de pasas sin semilla, mitad licuadas", "1 trago de vino", "¼ de mantequilla derretida", "½ pocillo de mermelada de naranja (en tiritas)", "1 cucharadita de canela", "1 limón rallado", "½ de clavos en polvo", "1 cucharada de naranja rallada", "poquito de nuez moscada rallada", "1 pocillo de crema de leche", "panela quemada al gusto"], "steps": ["Se mezclan todos los ingredientes en el orden en que están. Se revuelve bien, se coloca al baño maría en un molde engrasado y enharinado, hasta que el cuchillo salga limpio.", "Se deja enfriar, se desmolda y se sirve con una salsita clara de ciruelas con vino."], "notes": []}, {"title": "Bizcochuelo", "ingredients": [], "steps": ["Se baten 6 claras de huevo a la nieve, se juntan con las yemas, se sigue batiendo y agregando poco a poco 6 cucharadas de maicena y 6 cucharadas de azúcar.", "Se baten un poco más, se coloca el batido en latas engrasadas y se asa al horno caliente. Cuando esté fría la pasta se corta el bizcochuelo y se pone de nuevo en el horno suave hasta que esté tostado, puede agregarse 1 cucharadita de polvo royal."], "notes": []}, {"title": "Buñuelos Antioqueños", "ingredients": ["1 queso mediano", "1 paquete pequeño de maicena y 2 cucharadas más", "2 huevos", "1 cucharadita de panela raspada", "1 cucharadita de polvo royal", "agregar un poco de sal si el queso está simple", "aceite abundante para freír"], "steps": ["Se muele el queso, se le añade la maicena y la panela.", "Se agregan los huevos, el polvo royal y la sal amasando bien.", "Se vuelve a moler y se forman bolas sin apretar la masa.", "Se fríen en aceite tibio abundante que lo cubra.", "Cuando se suban a la superficie, se deja calentar más el aceite y se dejan dorar."], "notes": []}, {"title": "Canastas Rellenas", "ingredients": ["1 huevo", "harina de trigo", "leche", "sal al gusto", "1 paquete de habichuelas", "1 frasco de mayonesa mediano", "papas, zanahorias, alverjas,", "jamón o mortadela y sal.", "Pasa ........................."], "steps": ["Se bate el huevo.", "Se agrega la harina poco a poco, alterándola con la leche hasta formar una crema, ni muy espesa y ni muy clara.", "Se agrega la sal.", "Se calienta el aceite muy bien.", "Se mete en él el fierro a que se caliente un ratico.", "Se saca y se introduce en la colada sin que pase del borde del molde porque se pega.", "Se escurre un poco y se mete en el aceite caliente.", "Cuando estén unas poquitas doradas se sueltan del fierro y se dejan dorar.", "Se sacan muy bien escurridas y se rellenan con guiso de sal o crema inglesa. GUISO:", "Se cocinan las papas peladas y picadas menuditas, en agua con sal.", "Aparte se cocinan las zanahorias y luego se pican.", "Se cocinan las alverjas también por aparte.", "Se cocinan las habichuelas y se pican menuditas.", "Se revuelve todo con mayonesa.", "Se rellenan las canasticas y se adornan con una ramita de perejil crespo."], "notes": []}, {"title": "Color De Caramelo", "ingredients": ["½ libra de azúcar o panela molida", "1 taza de agua"], "steps": ["Se pone al fuego una sartén con ½ libra de azúcar o panela molida, y cuando haya tomado color oscuro se agrega una taza de agua.", "Se deja hervir hasta que el caramelo se disuelva completamente."], "notes": []}, {"title": "Coquitos", "ingredients": ["½ lata de leche condensada grande", "3 pocillos de coco deshidratado", "1 huevo", "pasas"], "steps": ["Se revuelve la leche con el coco y el huevo.", "Se pone una pasita por encima y se mete al horno hasta que empiecen a dorar un poco.", "Se sacan y se colocan en entre platicos de papel"], "notes": []}, {"title": "Cubierta Esponjosa", "ingredients": ["3 claras de huevo", "1 ½ pocillo de azúcar refinada", "1 tercio de pocillo de agua", "½ cucharadita de vainilla", "½ cucharadita de limón", "1 pizca de cremor tártaro", "1 pocillo de azúcar refinada", "½ pocillo de agua", "3 claras a la nieve"], "steps": ["Se baten las claras a punto de nieve.", "Aparte se hace un almíbar con el azúcar y el agua, hasta darle punto de bola no muy blanda.", "Se deja caer lentamente sobre las claras batidas a la nieve, sin dejar de revolver hasta darle consistencia gruesa.", "Al final se agrega 1 limón y el cremor tártaro.", "Se cubre el bizcocho y se adorna con coco o ciruelas pasas. CUBIERTA DE MERENGUE (Cocida)", "Se pone al fuego el azúcar y el agua hasta que dé punto de bola que recoja, se vacía sobre las claras batidas a punto de nieve y se bate bien, se echa sobre el bizcocho dejando que corra."], "notes": []}, {"title": "Cubierta De Cocoa", "ingredients": ["¼ escaso de mantequilla", "¼ libra de azúcar pulverizada (escasa)", "3 cucharadas de cocoa o 3 cuadros de chocolate amargo"], "steps": ["Se bate la mantequilla, y el azúcar bastante rato, luego el chocolate y se esparce con un cuchillo sobre el bizcocho."], "notes": []}, {"title": "Cucas", "ingredients": ["2 huevos batidos a la nieve", "1 cucharada de mantequilla", "1 cucharadita de bicarbonato de soda", "1 cucharadita de vinagre", "1 libra de azúcar pulverizada (escasa)", "Harina suficiente para formar pasta manejable", "1 pocillo de azúcar", "1 cucharada de manteca", "½ panela hecha en melado en un poco más", "de ½ pocillo de agua, que quede oscuro."], "steps": ["Se coloca encima de una tabla un poco de harina, se hace un hueco en el centro y se agregan los ingredientes.", "Se agregan los huevos, la grasa y demás ingredientes; luego el melado con más harina.", "Se amasa hasta que desprenda de la tabla y se deja reposar ½ hora, luego se extiende la masa delgada y se cortan las galletas, se colocan al horno caliente."], "notes": []}, {"title": "Dedos Romanos", "ingredients": ["¾ de libra de harina de trigo", "3 cucharaditas de polvo royal", "¼ de mantequilla largo", "1 huevo", "1 pocillo de leche", "1 pizca de sal", "bocadillo o pasas y arequipe para rellenarlos"], "steps": ["Se cierne juntos la harina, el polvo royal y la sal en la tabla donde se amasa, se agrega la mantequilla, el huevo y la leche; luego se amasa y se cortan cuadritos.", "Se rellenan con bocadillo o con pasas y arequipe.", "Se untan por los bordes de leche, se cierran los deditos, se les unta leche y azúcar por encima.", "Se asan en horno caliente hasta que doren."], "notes": []}, {"title": "Donas", "ingredients": ["1 pocillo de azúcar", "3 tazas de haría de trigo", "½ cucharadita de nuez moscada rallada", "½ cucharadita de sal", "1 cucharada de manteca", "2 huevos", "½ taza de leche", "4 cucharaditas de polvo royal", "2 cucharadas de mantequilla"], "steps": ["Se bate la mantequilla, la manteca y el azúcar, se agregan los huevos batidos, la leche, la nuez moscada y por último la harina con el polvo royal (cernidos).", "Se coloca la masa sobre la tabla enharinada, se extiende gruesa, se corta en forma de roscas. se fríe en abundante aceite caliente y se rocía con azúcar."], "notes": []}, {"title": "Galleticas De Chocolate", "ingredients": ["¼ de mantequilla", "1 pocillo colmado de harina de trigo", "1 ½ pocillo de azúcar", "1 pasta de chocolate amargo"], "steps": ["Se mezcla el azúcar y la mantequilla, luego se agregan poco a poco la harina hasta formar una pasta suave que no prenda de las manos.", "Se extiende con el rodillo enharinado, se cortan redondeticos y se llevan al horno a 350 grados más o menos un cuarto de hora.", "Se azucaran."], "notes": []}, {"title": "Galletas De Jeringa", "ingredients": ["¼ de mantequilla", "¼ de pocillo de azúcar", "1 pocillo colmado de harina de trigo", "2 yemas de huevo"], "steps": ["Se mezcla la mantequilla con el azúcar hasta formar crema, se agrega la harina y las yemas con unas gotas de vainilla.", "Se echa la crema en la jeringa, se hacen galletas en una lata engrasada con un poco de mantequilla a 350 hasta que doren."], "notes": []}, {"title": "Galletas De Mantequilla", "ingredients": ["5 ½ pocillos de harina", "1 cucharadita de polvo royal", "¼ cucharadita de sal", "1 ½ pocillo de azúcar", "½ libra de mantequilla la fina", "3 huevos sin batir", "1 cucharadita de extracto de vainilla"], "steps": ["Se cierne la harina con el polvo royal, la sal y el azúcar.", "Se agrega la mantequilla incorporándola con un tenedor.", "Se añaden los huevos sin batir y el extracto de vainilla mezclando bien, para que no prenda de los dedos. Si queda blanda se agrega más harina.", "Se extiende la masa con el rodillo sobre una tabla enharinada de un espesor muy fino y se cortan con un cortapastas.", "Se ponen al horno a fuego moderado por 8 minutos.", "Se dejan enfriar y se guardan en un tarro de lata para que se conserven frescas.", "Estas mismas galletas pueden prepararse de limón, reemplazando la vainilla por la cáscara rallada de dos limones verdes."], "notes": ["Tiempo: 1 hora con preparación (horno 5 minutos)", "Porciones: 250 ó 300"]}, {"title": "Galletas De Nata", "ingredients": ["1 taza de nata", "½ tazón de azúcar", "carbonato amonio ó ½ sobre de litines", "limón", "canela o vainilla", "1 huevo", "harina", "sal"], "steps": ["En la nata se echa el huevo batido y una pisca de sal, lo que se coge entre los dedos; el azúcar y un poco de canela, vainilla o un chorrito de limón y la levadura.", "Se mezcla todo muy bien y luego se le agrega la harina necesaria para formar una pasta blandita, pero que no se pegue a los dedos. Se estira y se cortan las galletas.", "Se untan de huevo, si se quiere, y se meten al horno fuerte, aunque no demasiado, sobre papeles o sobre la placa engrasados. Se hacen enseguida."], "notes": []}, {"title": "Galleticas De Crema", "ingredients": ["2 pocillos de harina", "1 ½ cucharadita de polvo royal", "½ cuarto de mantequilla", "1 pocillo de azúcar", "1 huevo", "½ cucharadita de vainilla", "1 cucharada de crema de leche"], "steps": ["Se crema la mantequilla y el azúcar, se agregan los demás ingredientes, uno a uno. Se amasa muy bien.", "Se coloca a la nevera 15 minutos, luego se cortan en la forma que se desee.", "Se mete al horno a 350 grados."], "notes": []}, {"title": "Galleticas De Maní", "ingredients": ["Lo mismo que las de crema, pero con cuatro cucharadas de maní bien", "molido."], "steps": [], "notes": []}, {"title": "Hojuelas", "ingredients": ["1 libra de harina", "2 cucharaditas de azúcar", "1 cucharadita de jugo de naranja", "1 huevo", "2 cucharadas de mantequilla (altas)", "1 cucharadita de sal", "agua de panela para remojar la masa", "1 cucharadita de polvo royal"], "steps": ["Se amasa la harina con la mantequilla, el azúcar, la sal y el jugo de naranja y se acaba de remojar con agua de panela.", "Se amasa hasta que esté suave y déjese reposar ¼ de hora.", "Se extiende la masa más delgada sobre una tabla enharinada y se cortan las hojuelas.", "Se fríen en aceite caliente."], "notes": []}, {"title": "Masmelo", "ingredients": ["2/3 de gelatina sin sabor", "1 pizca de sal", "1 pocillo de agua", "1 cucharadita de cremor tártaro", "1 libra de azúcar", "rallado de limón"], "steps": ["Se hace el almíbar con el azúcar y el pocillo de agua, cuando dé punto de bola blanda se baja.", "Aparte se revuelve la gelatina, la sal y el cremor tártaro, un pocillo de agua caliente.", "Se va echando al mismo tiempo en la batidora el almíbar, la gelatina y el rallado de limón.", "Cuando esté duro se echa en un molde engrasado", "Se sirve con crema inglesa o con la salsa que se quiera."], "notes": []}, {"title": "Merengues Con Crema", "ingredients": ["1 libra de azúcar", "3 claras de huevo batidas a la nieve", "1 pocillo de agua", "un poco de maní triturado"], "steps": ["Se pone al fuego el azúcar con el agua hasta que dé punto de bola.", "Se retira del fuego y se agregan las claras batidas a punto de nieve y se revuelve hasta que el batido esté duro.", "Se agrega el maní y se colocan los merengues por cucharadas en una lata engrasada.", "Se meten al horno a 250 grados sin dejarlos dorar. Cuando estén se apaga el horno."], "notes": []}, {"title": "Moffis De Queso", "ingredients": ["1 queso suizer de libra, rallado", "½ libra de mortadela", "1 taza de leche", "4 huevos", "2 cucharadas de mantequilla derretida", "1 taza de harina de trigo", "1 taza de maicena", "2 cucharadas de azúcar", "3 cucharaditas de polvo royal"], "steps": ["Se revuelve el queso con la leche, la mantequilla, la harina y cernida con el azúcar.", "Se agrega la maicena, las yemas, la mortadela menudita y el polvo royal, se mezcla todo muy bien.", "Se vacía en moldecitos pequeños engrasados con mantequilla, se meten al hormo caliente más o menos ¾ de hora.", "Se desmoldan y se cubren con salsa de tomate."], "notes": []}, {"title": "Palitos De Crema De Leche", "ingredients": ["3 pocillos de harina de trigo", "1 cucharadita de sal", "3 cucharaditas de polvo royal", "1 pocillo de crema de leche", "queso amarillo rallado", "2 cucharaditas de azúcar", "1 cucharadita de sal", "3 cucharadas de mantequilla de vaca", "2 claras de huevo"], "steps": ["Se revuelven bien los ingredientes con la punta de los dedos, se agrega la crema de leche, se amasa bien hasta formar crema suave.", "Se extiende sobre la tabla enharinada, dejando la masa gruesa de 1 centímetro más o menos.", "Se cortan los palitos, se untan de clara de huevo y luego de queso rallado.", "Se meten al horno hasta que estén doraditos a 350 grados."], "notes": []}, {"title": "Palitos De Masa Hojaldrada", "ingredients": ["1 libra de masa hojaldrada", "½ queso amarillo", "1 huevo"], "steps": ["Se prepara la masa.", "Se extiende en la tabla enharinada que quede delgada de ½ centímetro más o menos.", "Se corta en cuadros o rectángulos pequeños.", "Se barniza con huevo batido y se untan de queso rallado.", "Se ponen al horno hasta que doren."], "notes": []}, {"title": "Palitos De Queso", "ingredients": ["1 queso pequeño", "¼ libra de mantequilla", "2 huevos", "3 cucharaditas rasas de polvo royal", "harina de trigo suficiente para formar pasta", "suave que no prenda de los dedos"], "steps": ["Se ralla el queso, se agrega la mantequilla, los huevos y el polvo royal.", "Se agrega harina de trigo poco a poco, amasando bien hasta formar una pasta suave que no prenda de los dedos.", "Se arman los palitos, se cortan del tamaño de un cigarrillo y se ponen en una lata engrasada. Se meten al horno hasta que doren."], "notes": []}, {"title": "Palitos De Sal", "ingredients": ["½ libra de harina cernida", "¼ de mantequilla", "½ pocillo de leche", "1 cucharadita de polvo royal", "½ cucharadita de bicarbonato de soda"], "steps": ["Se amasa la harina con la mantequilla.", "Se moja con la leche mezclada con el polvo royal, la sal y el bicarbonato.", "Se extiende la masa.", "Se corta en palitos.", "Se asan al horno a 450 grados."], "notes": []}, {"title": "Palitos De Soda", "ingredients": ["½ libra de harina de trigo", "½ taza de leche", "1 cucharadita de polvo royal", "¼ de mantequilla", "1 cucharadita de sal", "½ cucharadita de bicarbonato de soda"], "steps": ["Se mezclan todos los ingredientes y se amasan.", "Se forma un cordón y se cortan los palitos.", "Se asan a 350 grados hasta que doren."], "notes": []}, {"title": "Pan Al Minuto", "ingredients": ["½ libra de harina de trigo", "¼ de mantequilla", "1 cucharadita de sal", "2 cucharadita de polvo royal", "3 huevos"], "steps": ["Se pone la harina sobre la tabla de amasar, se le incorpora el polvo royal, la sal y la mantequilla.", "Cuando esté bien incorporada se acaba de mojar con los huevos, procurando amasar solamente con los dedos y se agrega un poco de harina de trigo hasta que no prenda de los dedos.", "Se extiende la masa que quede un poco gruesa de un centímetro más o menos, se cortan cuadritos y se hace doblez de servilleta, se untan de huevo batido por encima y se llevan al horno a 350 grados hasta que doren."], "notes": ["Tiempo: 1 hora", "Porciones: 24"]}, {"title": "Pan De Sal", "ingredients": ["3 huevos", "2 pocillos de harina de trigo", "sal al gusto, un poco de nuez moscada rallada", "4 cucharadas de mantequilla derretida", "2 cucharaditas de polvo royal", "un poco de leche"], "steps": ["En una vasija honda se baten los huevos, se agrega la harina de trigo, la mantequilla (derretida), la leche y el polvo royal, la sal y la nuez moscada.", "Se revuelve todo muy bien y se vacía en un molde engrasado y enharinado, se coloca al horno a 350 grados, hasta que, al introducir un cuchillo salga limpio."], "notes": []}, {"title": "Pancitos Rellenos", "ingredients": ["unos pancitos redondos", "½ pocillo de leche", "2 cucharadas de vinagre", "1 cucharada de agua", "1 cucharadita de sal", "1 cucharada de azúcar", "1 cucharada de aceite y pimienta al gusto", "2 huevos duros", "1 tarrito pequeño de alverjas", "½ frasquito de alcaparras y la miga de los panes", "1 cucharada de mantequilla", "un poco de caldo de las carnes", "carne de cerdo o jamón."], "steps": ["Se les quita la tapita a los panes por la parte superior y se les saca las migas sin dañarlos.", "Se remojan por dentro con una mezcla del ½ pocillo de leche, el vinagre, el agua, la sal, el azúcar, el aceite y la pimienta al gusto.", "Aparte se hace un guiso con la carne de cerdo cocida y picada menudita o el jamón picado, los huevos duros picados menuditos, las alverjas, las alcaparras picadas y la miga de los panes.", "Se pone todo al fuego con un poquito de caldo de la carne y la mantequilla.", "Se rellenan los panes, se tapan y se bañan con una salsa amarilla y, se adornan con una ramita de perejil crespo."], "notes": []}, {"title": "Pancitos Royal", "ingredients": ["2 tazas de harina de trigo cernidas", "4 cucharaditas de polvo royal", "½ cucharadita de sal", "4 cucharadas de mantequilla", "¾ de taza de leche"], "steps": ["Cierna juntos la harina de trigo, el polvo royal y la sal, agréguele la mantequilla e incorpórela con un tenedor.", "Agregue los ¾ de taza de leche (o mitad agua y mitad leche) para hacer una masa suave.", "Ponga en una tabla enharinada y golpee ligeramente hasta que el exterior quede liso.", "Extienda dejando la masa un poco gruesa. Corte con una corta pasta.", "Coloque en una tabla engrasada.", "Ponga en un horno muy caliente (a 350 grados) durante 12 minutos.", "Pueden conservarse en coco de lata."], "notes": []}, {"title": "Pancitos Fáciles", "ingredients": ["½ libra de harina de trigo", "½ cucharadita de sal", "2 cucharadas de azúcar", "2 cucharaditas de polvo royal", "¼ de mantequilla", "2 huevos batidos y una yema"], "steps": ["Se cierne la harina de trigo con la sal, el azúcar, el polvo royal y, se le añade en pedacitos la mantequilla sin amasarla hasta que tenga aspecto de queso rallado.", "Se añaden dos huevos y una yema batidos separadamente, mezclándolos con un tenedor para no amasar mucho la masa.", "Se extiende la pasta y se cortan cuadritos y se meten al horno caliente hasta que doren."], "notes": []}, {"title": "Panqueques Con Atún", "ingredients": ["harina de trigo", "maicena", "2 huevos", "sal al gusto", "leche", "1 lata de atún", "polvo royal", "1 cucharadita de mantequilla"], "steps": ["Se baten los huevos como para perico y se les va agregando la harina poco a poco, alternando con la leche hasta formar una colada espesa, se agrega la sal, el polvo royal, la maicena y se revuelve todo muy bien.", "Se pone al fuego una cacerola panda tamaño mediano y se engrasa con un poco de mantequilla y se deja calentar bien.", "Se echa un poco de esta colada haciéndola correr por toda la superficie, se deja hasta que dore, y así sucesivamente hasta terminar toda la colada.", "Se prepara un poco de salsa blanca, se le agrega el atún desmenuzado y se rellenan los pankekes, se enrollan en forma de pionono.", "Puede cubrirse con un poco de salsa de tomate preparada."], "notes": []}, {"title": "Pasta De Hojaldre", "ingredients": ["1 libra de vitina o la fina", "2 libras de harina de trigo", "el jugo de un limón"], "steps": ["Se parte la mantequilla en cuatro partes iguales.", "Se ponen sobre la tabla las 2 libras de harina de trigo menos un poquito, a la cantidad grande uno de los trozos de mantequilla y se junta bien, se acaba de formar una pasta suave añadiéndole agua y el jugo de limón, se le pone un poco de sal y azúcar.", "Luego se extiende y se le unta otro de los trozos de mantequilla, se espolvorea de la harina que había quedado aparte y se dobla en tres telas de los lados para el centro.", "Se envuelve en una servilleta mojada y se mete a la nevera por ½ hora.", "Después de este tiempo se vuelve a extender sobre la tabla en sentido contrario anteriormente, se unta nuevamente con la vitina y se espolvorea con la harina de trigo, este proceso se repite otra vez.", "Luego se arman los pasteles y se ponen al horno muy caliente."], "notes": []}, {"title": "Pasta Hojaldrada Rápida", "ingredients": ["2 pocillos colmados de harina de trigo", "½ de mantequilla (libra)", "10 cucharadas de agua helada"], "steps": ["Se unen los ingredientes con las yemas de los dedos rápidamente.", "Luego se junta todo sin amasar mucho.", "Se dobla en tres partes y queda lista para trabajar. Si no se usa, se lleva a la nevera."], "notes": []}, {"title": "Pasteles De Masa Romana", "ingredients": ["1 libra de harina de trigo", "1 pocillo chocolatero de leche", "1 cucharada de azúcar", "1 libra de peras", "½ libra de mantequilla la fina", "1 cucharada de polvo royal", "½ cucharada de sal", "½ libra de azúcar"], "steps": ["Se revuelve la harina de trigo con el polvo royal, la sal, el azúcar y la mantequilla, se le va agregando la leche por poquitos hasta formar una pasta suave y manejable.", "Se lleva a la nevera por 10 minutos.", "Se arman los pasteles y se rellenan con las peras en tronquitos pequeños.", "Las peras se han colocado con el azúcar en la olla pitadora sin agua.", "Se ponen los pasteles en el horno a 350 grados hasta que estén dorados y luego se bañan con el almíbar de las peras."], "notes": []}, {"title": "Pasteles Gloria", "ingredients": ["½ libra de pasta hojaldrada", "½ pocillo de arequipe", "10 bocadillos o mermelada de guayaba"], "steps": ["Se parten para cada pastelito dos redondeles iguales de pasta hojaldrada y no muy delgada.", "En cada centro se pone un trozo de arequipe y bocadillo, se tapan y se barnizan con yema de huevo y azúcar."], "notes": []}, {"title": "Pastelitos De Yuca", "ingredients": ["2 yucas cocidas", "2 huevos crudos", "2 cucharadas de harina de trigo", "½ libra de carne de cerdo cocida y molida", "1 cucharada de salsa de tomate", "1 huevo cocido duro", "polvo de bizcocho y sal al gusto."], "steps": ["Se muelen las yucas y se agregan las dos yemas de huevo, la harina de trigo para formar una pasta de buena.", "Se mezcla la carne molida con el huevo picado, la salsa de tomate y sal al gusto.", "Se arman arepitas y se rellenan con guiso, se cierran y se pasan por clara de huevo a medio batir y luego por polvo de bizcocho.", "Se fríen en aceite caliente."], "notes": []}, {"title": "Pastel De Vainilla", "ingredients": ["¼ de mantequilla", "1 huevo", "1 cucharadita de polvo royal", "½ libra de harina de trigo", "1 pocillo pequeño de azúcar", "1 pizca de sal"], "steps": ["Se bate la mantequilla con el azúcar, agregue el huevo y la harina de trigo cernida con el polvo royal y la sal.", "Con esta pasta forre el molde que no debe ser muy hondo, más bien pando.", "Ponga al horno a 350 grados hasta que dore. RELLENO PARA EL PASTEL:", "Se prepara un pudín de vainilla en 2 pocillos de leche. Se retira del fuego y se deja reposar.", "Se agrega medio pocillo de crema y 6 cucharadas de fresas lavadas y despezonadas. Con esto se rellena el pastel y se deja enfriar hasta que cuaje."], "notes": []}, {"title": "Pionono", "ingredients": ["3 huevos", "8 cucharadas de harina de trigo", "1 pocillo cafetero de agua", "6 cucharas de azúcar", "2 cucharaditas de polvo royal"], "steps": ["Se bate las claras a punto de nieve. Se agregan las yemas batiendo bien.", "Se agrega el azúcar, la harina de trigo y el polvo royal disuelto en el pocillo de agua y se revuelve bien.", "Se coloca en una lata engrasada y enharinada, se pone al horno a 350 grados hasta que esté bien dorado, y se pone en la parte de abajo.", "Cuando esté despréndase de los bordes con el cuchillo y se envuelve en una servilleta húmeda y se le cortan los bordes.", "Se rellenan con crema inglesa o con lo que se quiera. Puede ser también con guiso de sal."], "notes": []}, {"title": "Plátanos Maduros Al Horno", "ingredients": ["3 plátanos maduros", "1 tajada de queso de cocina", "1 tarrito de leche condensada", "½ pocillo de leche", "2 huevos", "mantequilla", "aceite para freír"], "steps": ["Se fríen los plátanos en forma de patacones.", "Luego se les rocía la leche condensada revuelta con el ½ pocillo de leche y, encima la tajada de queso rallado.", "Se cubre con los huevos batidos como para hacer ponche y se ponen durante ¼ de hora al horno en una lata engrasada.", "Quedan listos para servir."], "notes": []}, {"title": "Plátanos Maduros Rellenos", "ingredients": ["3 plátanos maduros grandes", "1 pedacito de mantequilla de vaca", "½ queso de cocina bueno", "canela en polvo"], "steps": ["Se cocinan los maduros con cáscara hasta que estén blanditos.", "Se cortan en trocitos grandes, se les saca un poquito de comida, se forma una coquita y se rellenan con queso, se espolvorean de canela, se ponen en el molde con trocitos de mantequilla por encima, se lleva al horno un momento y se espolvorean con azúcar por encima.", "Se sirven calientes."], "notes": []}, {"title": "Ponqué De Piña", "ingredients": ["1 libra de mantequilla", "1 piña mediana picada menudita, calada", "en ½ libra de azúcar sin agua", "1 libra de harina", "6 huevos"], "steps": ["Se bate la mantequilla con el azúcar hasta que quede cremosa.", "Se agrega la harina cernida con el polvo royal, los huevos, la ralladura de los limones, y la piña picada pequeñita calada en un poco de azúcar y escurrida.", "Se toma un molde tamaño de 1 libra y se engrasa, se le pone papel parafinado en el fondo.", "Se echa el ponqué y mete al horno a 350 grados por espacio de una hora.", "Para desmoldarlo se deja reposar un poquito para que no se enfríe del todo."], "notes": []}, {"title": "Ponqué De Ron", "ingredients": ["½ libra de mantequilla", "1 ½ pocillo de azúcar", "6 huevos", "1 ½ pocillo de harina de trigo", "1 pocillo de maicena", "2 cucharaditas de polvo royal", "¼ de pocillo de ron", "el jugo de ½ limón y la cascara"], "steps": ["Se bate la mantequilla con el azúcar hasta que esté cremosa", "Se agregan los huevos uno a uno batiendo bien.", "Se agrega la harina de trigo, la maicena cernida y el polvo royal, alternando con el ron, el rallado de limón y el jugo.", "Coloque al horno en lata engrasada y enharinada a 350 grados o 400 grados, hasta que el cuchillo salga limpio."], "notes": []}, {"title": "Ponqué Mármol", "ingredients": ["1 libra de harina de trigo", "½ libra de mantequilla", "6 huevos", "3 cucharaditas de cocoa o chocolate amargo", "1 cucharadita de nuez moscada rallada", "3 cucharaditas de polvo royal", "1 libra de azúcar", "2 tazas de leche", "la cascara de una naranja rallada", "Vainilla al gusto"], "steps": ["Se bate la mantequilla con el azúcar hasta que esté cremosa.", "Se le añaden los huevos, la leche y la harina cernida con el polvo royal alternadamente.", "Se derrite el chocolate con un poquito de agua o se agrega la cocoa a la tercera parte de la mezcla, se le añade la vainilla.", "Al resto de la masa se le pone el rallado de naranja y la nuez. Se engrasa un molde tamaño de una libra, se le pone papel engrasado y enharinado en el fondo.", "Se echa la masa blanca encima de la masa oscura, se pica un poco con la punta de un cuchillo y se mete al horno a 350 grados durante 1 hora."], "notes": []}, {"title": "Ponche Romano", "ingredients": ["1 copa de helado de vainilla", "1 huevo entero", "1 copa de brandy o ron", "1 copa de leche bien helada"], "steps": ["Bátalo muy bien y sírvalo."], "notes": []}, {"title": "Polvo Royal", "ingredients": ["¼ cremor tártaro", "½ bicarbonato de soda", "1 caja pequeña de maizena"], "steps": ["Se cierne todo junto por 3 veces y se envasa en un frasco de cristal."], "notes": []}, {"title": "Pudín Español", "ingredients": ["1 pan pulman de comapán", "3 cuartos de libra de azúcar", "½ libra de frutas cristalizadas", "4 huevos", "1 cucharadita de canela en polvo", "1 ½ botella de leche", "1 cajita de pasas", "¼ de nueces del Brasil picadas o ralladas", "1 ralladura de limón verde"], "steps": ["Se parte el pan en cuadritos pequeños, se baten los huevos enteros con el azúcar, se agrega la leche, la canela y la ralladura de limón.", "Se agrega el pan, las frutas, las pasas y demás ingredientes; se revuelve bien, se toma un molde tamaño de una libra con hueco en el centro.", "Se acaramela con ¼ de azúcar, 1 cucharada de agua caliente, se echa el pudín y se mete al horno a 350 grados por espacio de 1 hora.", "Se desmolda y se sirve con una salsa de vino o ron, o con salsa de ciruelas pasas."], "notes": []}, {"title": "Salsa De Ron", "ingredients": ["1 libra de azúcar", "1 yema de huevo", "1 taza de agua", "Licor al gusto"], "steps": ["Se hace un almíbar con el azúcar y el agua (no muy espesa), se le agrega la yema disuelta en medio pocillo de agua, se deja hervir y se retira.", "Se deja reposar y se le agrega a esto, el licor, bañando el postre."], "notes": []}, {"title": "Repollas", "ingredients": ["¼ de litro de leche", "1 cucharadita de sal", "6 onzas de harina de trigo", "¼ de mantequilla", "½ cucharadita de polvo royal", "4 huevos", "Crema inglesa espesa"], "steps": ["Se pone al fuego la leche con la mantequilla, la sal y el polvo royal.", "Cuando hierva se le agrega la harina de trigo y se revuelve hasta que despegue de la paila.", "Se retira del fuego, cuando esté tibia se le ponen los huevos uno a uno, batiendo bien.", "Se ponen cucharadas de esta masa y se ponen al horno en lata engrasada a 400 grados, y se rellenan con crema inglesa."], "notes": []}, {"title": "Rosquillas De Mantequilla", "ingredients": ["¼ de libra de azúcar", "1 yema de huevo", "harina de trigo suficiente", "¼ de libra de mantequilla", "1 cucharadita de polvo royal"], "steps": ["Se amasa todo muy bien y se arman las rosquillas."], "notes": []}, {"title": "Torta De Arracacha", "ingredients": ["1 taza de arracacha rallada", "2 cucharadas de mantequilla", "½ taza de queso rallado", "azúcar al gusto", "2 huevos", "3 tajadas de ponqué ramo", "1 cajitas de pasas", "1 trago de vino"], "steps": ["Se ralla la arracacha y se deja en agua con sal, un poquito tiempo hasta que le salga el almidón.", "Se baten las claras de huevo a la nieve y se agregan las yemas, se sigue batiendo y se agregan los demás ingredientes.", "Se engrasa un molde y se coloca papel parafinado en el fondo y polvo de bizcocho y se mete al horno ½ hora."], "notes": []}, {"title": "Torta De Banano", "ingredients": ["4 bananos", "6 panes redondos pequeños []", "2 huevos", "1 cucharada de mantequilla", "2 vasos de leche", "azúcar al gusto"], "steps": ["Se desmenuza el pan y se remoja con la leche.", "Se agregan los bananos mojados con un tenedor, con los huevos, la mantequilla derretida y el azúcar al gusto.", "Se coloca esta mezcla en un molde engrasado y enharinado, se pone al baño maría en el horno hasta que al introducir un cuchillo salga limpio."], "notes": []}, {"title": "Torta De Chocolate", "ingredients": ["½ libra de azúcar", "½ libra de harina de trigo", "2 huevos", "1 pasta de chocolate rallada", "½ cucharadita de bicarbonato", "2 cucharadas de mantequilla", "1 taza de leche", "½ cucharadita de esencia de vainilla", "2 cucharaditas de polvo royal"], "steps": ["Se bate el azúcar con las 2 cucharadas de mantequilla, luego se le añade la ½ libra de harina de trigo, la taza de leche y los huevos batidos, la esencia de vainilla y la pasta de chocolate rallada y el polvo royal, igualmente el bicarbonato.", "Se pone en dos latas engrasadas, se asa y se une con la siguiente crema: ```{=html} <!-- -- ```", "Se baten 2 yemas, se mezclan con una taza de leche, ½ de azúcar, 1 cucharada de mantequilla, 2 pastas de chocolate ralladas, 2 cucharadas de harina de trigo (disueltas en leche), y un poco de vainilla. Se pone al fuego y se revuelve hasta que espese. El chocolate debe ser sin azúcar."], "notes": []}, {"title": "Torta De Chócolo", "ingredients": ["8 chócolos tiernos", "½ tarro de leche condensada", "5 bocadillos pequeños", "2 huevos", "3 cucharadas de harina de trigo", "¼ de mantequilla", "azúcar al gusto (si queda simple)"], "steps": ["Se mezclan todos los ingredientes, los bocadillos se pican menuditos y se coloca todo en un molde engrasado y enharinado al horno caliente a 350 grados, hasta que el cuchillo salga limpio.", "Se deja enfriar para desmoldarla."], "notes": []}, {"title": "Torta De Dos Harinas", "ingredients": ["2 cucharadas de mantequilla", "2 cucharadas de manteca", "1 pocillo de azúcar", "3 huevos", "1 pocillo de harina de trigo", "1 pocillo de harina de maíz", "1 cucharadita de polvo royal", "1 vaso mediano de leche", "1 copita de vino", "la cascara de un limón verde rallada", "un poco de nuez moscada rallada", "pasas si se quiere"], "steps": ["Se bate la mantequilla, la manteca y el azúcar, hasta formar crema.", "Se agregan los huevos uno a uno batiendo bien.", "Se agregan las harinas, el polvo royal disuelto en la leche, el rallado de limón y la nuez moscada rallada, el trago de vino y las pasas enharinadas", "Se coloca en el horno en un molde engrasado hasta que al introducir un cuchillo salga limpio."], "notes": ["Tiempo: 30 a 40 minutos al horno", "Porciones: de 10 a 12"]}, {"title": "Torta Economica", "ingredients": ["¾ de libra de harina de trigo", "6 huevos", "½ libra de mantequilla la fina", "½ libra de azúcar", "2 tragos de vino", "1 trago de aguardiente", "1 vaso pequeño de leche", "2 cucharaditas de polvo royal", "½ nuez moscada rallada", "la cascara de un limón verde rallada", "½ cucharadita de canela en polvo", "¼ de pasas", "panela quemada"], "steps": ["Se bate la mantequilla con el azúcar, hasta formar crema.", "Luego se agregan los huevos, uno a uno batiendo bien.", "Luego la harina cernida, la nuez moscada, la canela en polvo, la cascara del limón rallado, el vino, el aguardiente, la leche mezclada con el polvo royal, la panela quemada y las pasas enharinadas. Se revuelve todo muy bien.", "Se vacía en un molde engrasado y enharinado con papel en el fondo engrasado y enharinado.", "Se pone al horno a 350 grados, hasta que al introducir el cuchillo salga limpio.", "Se saca, se deja enfriar, se desmolda y se le quita el papel.", "Se puede hacer con tiempo y remojarla todos los días con un poquito de vino, que no sea mucho, para que la torta no se ponga masatuda."], "notes": []}, {"title": "Torta De Plátano", "ingredients": ["3 plátanos bien maduros", "3 huevos batidos a la nieve", "½ panela", "clavos y canela en astilla", "2 cucharadas de mantequilla", "6 cucharadas de harina de trigo", "½ pan tajado remojado en leche", "2 cucharaditas de polvo royal", "1 copa de vino, el rallado de un limón verde", "1 cajita de pasas", "un poco de panela quemada"], "steps": ["Se calan los plátanos en la pitadora con un poco de agua, la panela, los clavos y la canela.", "Se licúan con la mantequilla, el vino, el polvo royal y el rallado del limón.", "Se colocan en una vasija y se agrega la harina, el pan, las pasas enharinadas, la panela quemada, y por último los huevos batidos a la nieve; se revuelve bien y se coloca en un molde engrasado y enharinado.", "Se pone al horno caliente a 350 grados hasta que el cuchillo salga limpio."], "notes": []}, {"title": "Torta De Yuca", "ingredients": ["2 o 3 yucas grandes cocidas y molidas", "¼ de mantequilla derretida", "3 huevos batidos", "1 trago de vino", "azúcar al gusto", "¼ de queso rallado blanco"], "steps": ["Se mezclan las yucas molidas con el resto de los ingredientes y se colocan en un molde engrasado con mantequilla y enharinado.", "Se lleva al horno a 350 grados, hasta que el cuchillo salga limpio.", "Se deja enfriar para desmoldarla."], "notes": []}, {"title": "Torta De Yuca Y Coco", "ingredients": ["1 pocillo de coco rallado", "½ pocillo de yuca cruda", "4 huevos", "1 pocillo de queso rallado", "1/8 de mantequilla derretida", "azúcar al gusto"], "steps": ["Batir las claras a la nieve", "Revolver todos los ingredientes incluyendo la yema.", "Agregar las claras a la nieve", "Vaciar en un molde engrasado y enharinado.", "Poner en el horno, hasta que al introducir un cuchillo salga limpio."], "notes": []}, {"title": "Torta De Papa", "ingredients": ["3 papas grandes cocidas y trituradas", "4 huevos batidos a nieve", "1 cucharada de mantequilla derretida", "½ taza de leche", "1 tomate maduro grande y pelado", "1 queso blanco rallado", "1 cucharada de mantequilla", "sal y pimienta al gusto", "vinagre y azúcar"], "steps": ["Se trituran las papas cocidas y se desatan en la leche.", "Se agregan los huevos batidos a la nieve, la sal, la pimienta y la cucharada de mantequilla derretida.", "Se coloca en un molde engrasado la mitad de esta mezcla, luego se le ponen las tajadas del tomate pelado mezcladas con vinagre, azúcar y la mitad del queso rallado"], "notes": []}, {"title": "Tostadas A La Francesa", "ingredients": ["1 pan de molde un poco viejo de 2 o 3 días.", "½ botella de leche", "Aceite para freír", "4 huevos", "azúcar pulverizada"], "steps": ["Se corta el pan en tajadas de 2 centímetros de gruesas, luego se moja en la leche y se pasa por un huevo batido.", "Se fríe en aceite caliente y por último se espolvorea con azúcar con un colador bien limpio."], "notes": []}, {"title": "Tostadas De Maní", "ingredients": ["1 pan tajado", "1 tarro de leche condensada", "1 paquete de maní La Rosa"], "steps": ["Se toman unas tajadas de pan, se les quita la corteza, se cortan en forma de triángulo y se les unta leche condensada, luego se les pone maní triturado por encima, se meten al horno unos 20 minutos."], "notes": []}, {"title": "Turrón De Corn Flakes O Rice Crispis", "ingredients": ["¼ de libra de mantequilla de vaca", "3 paquetes pequeños de masmelos", "1 caja de mediana de Rice Crispis"], "steps": ["Se ponen al fuego los masmelos y la mantequilla.", "Cuando están bien derretidos, se retiran del fuego y se incorpora bien el Rice Crispis, y se revuelve muy bien.", "Se echa en un molde o bandeja engrasada con mantequilla, teniendo cuidado de unirlo muy bien, cuando esté frío se parte en pedazos."], "notes": []}]}, {"name": "Salsas y Cremas", "recipes": [{"title": "Crema Inglesa", "ingredients": ["2 tazas de leche", "3 yemas de huevo batidas", "1 cucharada de maicena", "½ taza de azúcar", "vainilla", "vino u otra esencia"], "steps": ["Se mezclan 2 tazas de leche, 3 yemas batidas, 1 cucharada de maicena y ½ taza de azúcar.", "Se pone al fuego y se revuelve hasta que espese.", "Se perfuma con vainilla, vino u otra esencia."], "notes": []}, {"title": "Crema De Leche Batida", "ingredients": ["NO SIRVE CREMA DE TARRO", "1 taza de crema de leche"], "steps": ["Se coloca en una vasija con agua fría o hielo.", "Se agrega una pizca de sal y se bate hasta que parezca clara de huevo, si está muy espesa se le echa un poco de leche."], "notes": []}, {"title": "Salsa Amarilla", "ingredients": ["½ taza de caldo o agua", "1 taza de leche", "1 cucharada de mantequilla", "1 cucharadita de sal", "1 cucharadita de azúcar", "1 cucharadita de perejil crespo picado", "1 cucharada de maicena", "2 yemas de huevo", "1 cucharada de vinagre o jugo de limón", "un poco de pimienta"], "steps": ["Se pone al juego ½ taza de caldo o agua, 1 taza de leche, 1 cucharada de mantequilla, 1 cucharadita de sal, 1 de azúcar, 1 de perejil crespo picado y un poquito de pimienta.", "Cuando empiece a hervir, se agrega 1 cucharada de maicena disuelta en un poco de agua o leche y mezclada con 2 yemas de huevo.", "Se revuelve hasta que espese.", "Se retira del fuego, se le agrega una cucharada de vinagre o jugo de limón."], "notes": []}, {"title": "Salsa De Aliños", "ingredients": ["Cebollas y tomates", "Un poco de manteca", "Unas gotas de limón o vinagre", "Un poco de pimienta", "Un poco de sal", "Perejil picado", "Cilindro picado"], "steps": ["Se pican menudamente o se muelen cebollas y tomates.", "Se ponen al fuego en una sartén con un poco de manteca, unas gotas de limón o vinagre, pimienta y sal revolviendo con frecuencia para que no se queme.", "Antes de usarla puede ponérsele perejil picado y cilantro."], "notes": []}, {"title": "Salda Bechamel", "ingredients": ["2 cucharadas de harina de trigo", "2 cucharadas de mantequilla", "1 cebolla de huevo molida", "1 taza de caldo", "1 taza de leche", "sal"], "steps": ["Se pone al fuego en un sartén 2 cucharadas de harina de trigo con 2 cucharadas de mantequilla, 1 cebolla de huevo molida y sal.", "Se revuelve un momento y se agrega poco a poco 1 taza de caldo y 1 taza de leche.", "Si no hay caldo puede reemplazarse con agua hervida de antemano con hiervas y pimienta."], "notes": []}, {"title": "Salsa Blanca", "ingredients": ["1 cucharadas de maicena o harina de trigo", "1 taza de leche", "½ taza de caldo o agua", "1 cucharada de mantequilla", "un poco de pimienta", "perejil picado", "sal"], "steps": ["Se disuelve 1 cucharada de maicena o harina de trigo en una taza de leche.", "Se agrega ½ taza de caldo o agua, 1 cucharada de mantequilla, un poco de pimienta y sal suficiente.", "Se tiene al fuego revolviéndola constantemente hasta que espese un poco.", "Se retira y se le pone perejil picado."], "notes": []}, {"title": "Salsa De Caldo De Pollo", "ingredients": ["1 taza de caldo de pollo", "2 papas cocidas y trituradas", "1 yema de huevo", "1 cucharada de maicena", "1 cucharadita de mantequilla", "1 cucharadita de salsa perrina", "un poco de leche"], "steps": ["Poner al fuego una taza de caldo de pollo, agregar 2 papas cocidas y trituradas, dejar hasta que hierva.", "Se añade la yema de un huevo disuelta en un poco de leche y 1 cucharada de maicena.", "Se revuelve hasta que espese.", "Se baja y se pone 1 cucharadita de mantequilla, 1 de salsa inglesa y se cubre el pastel con esta salsa caliente"], "notes": []}, {"title": "Salsa De Ciruelas", "ingredients": ["½ frasco de mermelada de ciruelas o frambuesa", "½ botella de coca cola", "1 astilla de canela", "1 cascara de limón verde", "1 trago de vino", "1 cucharada de maicena", "| cajita de pasas"], "steps": ["Se pone al fuego la mermelada con la coca cola hasta que se disuelva.", "Luego se agrega la cascara de limón y la canela.", "Cuando suelte el hervor se le pone la cucharada de maicena disuelta en un poquito de agua, se revuelve bien hasta que suelte el hervor y se espese.", "Se agregan las pasas.", "Se cubre el pastel con la salsa caliente."], "notes": ["TIEMPO: 20 minutos al fogón"]}, {"title": "Salsa Francesa", "ingredients": [], "steps": ["Se mezcla vinagre, aceite, mayonesa, mostaza, salsa de tomate, azúcar y sal al gusto."], "notes": []}, {"title": "Salsa Mayonesa", "ingredients": ["1 huevo", "1 cucharadita de mostaza", "1 cucharadita de azúcar", "1 pocillo chocolatero de aceite", "el jugo de un limón pequeño", "un tris de pimienta", "sal al gusto"], "steps": ["Se bate en la licuadora muy bien seca, 1 huevo, 1 cucharadita de mostaza, un tris de pimienta, 1 cucharadita de azúcar y sal al gusto.", "Cuando esté batida se agrega 1 pocillo chocolatero de aceite en forma de hilo alternando con el jugo de 1 limón pequeño y se bate hasta que espese.", "Si se corta se saca la mezcla, se lava muy bien y se seca la licuadora, se bate otro huevo y se le agrega la mezcla anterior."], "notes": []}, {"title": "Salsa De Tomate", "ingredients": ["1 taza de caldo", "4 tomates grandes partidos en pedazos", "1 diente de ajo machacado", "1 cebolla", "Hiervas", "cucharadita de sal", "cucharadas de azúcar", "```{=html}", "<!-- --", "```", "tajada de pan", "un poco de pimienta", "cucharada de mantequilla", "1 tajada de remolacha"], "steps": ["Se pone al fuego una taza de caldo con 4 tomates grandes partidos en pedazos, 1 diente de ajo machacado, 1 cebolla, hiervas, 1 cucharadita de sal, 2 cucharadas de azúcar, 1 tajada de pan y un poco de pimienta.", "Cuando estén cocidos los tomates, se cierne la salsa.", "Se le agrega 1 cucharada de mantequilla y se calienta de nuevo antes de usarla.", "Agregándole 1 tajada de remolacha queda mejor."], "notes": []}, {"title": "Salsa Para Los Camarones", "ingredients": ["1 paquetico de camarones", "1 lata de crema de leche o botellita pequeña", "2 cucharadas de salsa de tomate", "1 cucharadita de sal", "Pimienta, salsa negra y unas góticas de salsa de ají (5)"], "steps": ["Quíteles la vena a los camarones, sáquele la tierra y lávelos bien.", "Aparte prepare una salsa con la crema de leche, la salsa de tomate, la sal, la pimienta, la salsa negra y las 5 góticas de salsa de ají.", "Agregue a esta salsa los camarones y póngales copeticos a los aguacates.", "Rodee la bandeja de hojas de lechuga."], "notes": ["TIEMPO: ½ hora", "PORCIONES: 8"]}]}, {"name": "Sopas y Cremas", "recipes": [{"title": "Blanquillos", "ingredients": ["1 libra de blanquillos", "¼ pocillo de aceite", "1 libra de carne de cerdo", "1 cebolla de huevo blanca rallada", "1 tarro de pasta de tomate", "1 pocillo de agua y sal al gusto"], "steps": ["Se remojan los frijoles y se cocinan con agua solamente y se dejan pitar 10 minutos.", "Se retiran del fuego y si están tiernos se les agrega la carne cocida en un tris de agua con la pasta de tomate o extracto.", "Se ponen al fuego nuevamente con el resto de los ingredientes hasta que calen bien.", "Se sirven calientes con queso rallado por encima."], "notes": []}, {"title": "Crema De Ahuyama", "ingredients": ["1 ahuyama pequeña o un trozo de ahuyama grande de una libra.", "1 libra de hueso de cerdo, o una caja de caldo de gallina.", "Recuerde que el hueso da sabor, pero no es nutritivo.", "1 taza de leche hervida", "2 cucharadas de mantequilla", "1 cucharada de salsa negra", "2 huevos cocidos", "2 ramitas de perejil crespo picado", "1 trago de vino"], "steps": ["Se parte la ahuyama en pedacitos no muy pequeños, se le saca la semilla y se pone a cocinar en agua con sal.", "Se cierne y se mezcla con un buen caldo, hecho en el hueso o la cajita de caldo de gallina.", "Se agrega la leche hervida, la mantequilla, la salsa negra, los huevos cocidos y picados, el perejil crespo picado, sal al gusto y se deja hervir.", "Antes de servirla se agrega el trago de vino."], "notes": []}, {"title": "Crema De Espinacas", "ingredients": ["1 atado grande de espinacas", "1 litro de consomé preparado", "2 cucharadas de mantequilla", "1 pocillo de crema de leche (chocolatero)", "2 cucharadas de maicena"], "steps": ["En el consomé se cocinan las espinacas bien lavadas y luego se licúan.", "Se agrega la crema de leche, la mantequilla y finalmente se espesa con la maicena disuelta en un poquito de agua y se agrega la sal al gusto."], "notes": []}, {"title": "Crema De Pan", "ingredients": ["1 pan mediano de tajada o cualquier otro pan sin corteza", "1 litro de agua", "2 cucharadas de mantequilla", "2 cubitos de caldo de pollo", "½ litro de leche", "2 cucharadas de maicena para espesar"], "steps": ["Con los cubos se prepara el consomé fuerte con el agua.", "Luego se agrega el pan y se licúa.", "Se mezcla con la leche, la mantequilla y finalmente la maicena bien disuelta.", "Se revuelve seguido y al espesar se retira del fuego, se le agrega el vino y se sirve."], "notes": []}, {"title": "Crema De Papa Amarilla", "ingredients": ["1 libra de papa criolla", "2 cebollas de huevo", "1 tomate de riñón", "1 diente de ajo", "un buen caldo", "sal, pimienta al gusto", "un poco de leche", "½ pocillo de crema de leche", "2 yemas de huevo"], "steps": ["Se cocinan las papas en el caldo (peladas), las cebollas, el tomate pelado sin semilla, el ajo y se licúa todo.", "Se agrega sal y pimienta al gusto, se le agrega leche hasta formar una crema no muy gruesa, se le pone la crema de leche con las dos yemas batidas.", "Se deja dar un hervor y se sirve."], "notes": []}, {"title": "Crema De Pollo", "ingredients": ["Salsa blanca", "2 cucharadas de mantequilla", "3 cucharadas de harina de trigo", "3 pocillos de leche", "sal y pimienta al gusto (con estos ingredientes", "se prepara una salsa blanca)", "2 ó 3 pechugas cocidas con aliños, y que queden 2 pocillos de caldo", "cucharadas de alcaparras", "¼ de crema de leche"], "steps": ["Se pican las pechugas en cuadritos menuditos.", "El caldo se espesa con un poco de harina de trigo y se mezcla con la salsa blanca, las alcaparras se pican, y se mezcla todo; a tiempo se bajaría y se agrega la crema de leche."], "notes": []}, {"title": "Crema De Tomate", "ingredients": ["5 tomates maduros", "2 vasos de leche", "1 cucharadita de mantequilla", "1 lata de extracto de tomate o pasta", "1 remolacha pequeña licuada", "hueso de cerdo o una caja de caldo de pollo", "un poquito de azúcar", "maicena para espesar", "laurel", "crema de leche", "sal y pimienta al gusto"], "steps": ["Se pone al fuego una vasija con agua suficiente, el hueso o caldo de pollo, los tomates partidos en cuatro, sal y pimienta al gusto, 3 hojas de laurel y dos cucharadas de azúcar; hasta que hierva un rato.", "Se baja y se licúa todo, se cierne y se pone de nuevo al fuego con la pasta de tomate o extracto, la mantequilla, la remolacha licuada en un poco de agua, un poco de azúcar que quede un poco dulzona, la leche y la maicena desleída en un poco de leche o agua.", "Se deja hasta que espese y se retira del fuego.", "Se sirve acompañada de panes individuales y a cada plato se le pone 1 cucharada de crema de leche."], "notes": ["TIEMPO: 1 hora con preparación", "PORCIONES: 11"]}, {"title": "Fríjoles", "ingredients": ["1 libra de frijoles rojos", "¼ de mantequilla", "¼ de tocineta", "azúcar, sal, salsa picante al gusto", "1 tarro de pasta de tomate o la misma medida de salsa de tomate", "1 cebolla de huevo blanca rallada", "1 cucharadita de mostaza"], "steps": ["Se remojan los frijoles la víspera, luego se ponen a cocinar con agua suficiente.", "Cuando casi estén cocidos, se les agrega la pasta de tomate o salsa.", "La tocineta se parte en pedacitos y se fríe en un poquito de mantequilla y se les añade a lo anterior con la grasa que suelte.", "La cebolla picada se fríe con un poco de mantequilla y se le agrega junto con la sal, el azúcar o panela, la salsa picante y el resto de la mantequilla, se dejan hervir un ratico hasta que tengan buen gusto.", "Pueden servirse en cazuelas individuales adornados con pedacitos de tocineta por encima y acompañados de moldecitos de arroz y arepitas. Puede hacerse un buen ahogo, y echarles una cucharadita por encima."], "notes": []}, {"title": "Fríjoles Con Tocino Y Mazorca", "ingredients": ["1 kilo de frijoles cargamanto", "1 ½ libra de tocino carnudo", "6 choclos grandes y tiernos", "1 libra de tomaticos de aliño", "4 cebollas largas"], "steps": ["Se escogen y se lavan muy bien los frijoles y se ponen a remojar desde la víspera.", "Al día siguiente se ponen a cocinar con el tocino picado menudito hasta que estén tiernos.", "Se agrega la sal y la mazorca y se dejan cocinar un poco.", "Se sirven acompañados de arepitas y con salsa de aliños por encima. SALSA DE ALIÑOS", "Se pican cebolla y tomates menuditos, se ponen al fuego con un poco de aceite, sal y pimienta y se dejan sazonar un poco."], "notes": []}, {"title": "Sopa De Avena", "ingredients": ["1 cucharada de avena por cada plato", "1 buen caldo", "1 trago de vino", "½ taza de crema de leche", "1 yema batida"], "steps": ["Se pone la avena en el caldo y se deja hervir durante dos horas, para agregarle la crema de leche, la yema batida y el vino.", "Se sirve."], "notes": []}, {"title": "Sopa De Cebada", "ingredients": ["½ libra de cebada", "2 zanahorias", "2 tomates maduros", "sal al gusto", "1 libra de espinazo de cerdo", "choclos", "una ramita de cilantro"], "steps": ["Se pone a remojar la cebada en la víspera. En la misma agua que se remoje se pone a cocinar con el espinazo y demás aliños hasta cuando esté blanda la cebada.", "Previamente se agregan las legumbres. Esta sopa es de gran alimento."], "notes": []}, {"title": "Sopa De Cebolla", "ingredients": ["un buen caldo de pollo o carne", "perejil y cilantro", "4 cebollas de huevo", "½ pan", "1 taza de leche", "1 copa de vino", "¼ de jamón o queso amarillo", "crema de leche", "perejil picado", "sal y pimienta al gusto"], "steps": ["Se pone el caldo al fuego con perejil y cilantro, se agregan las cebollas y se dejan hervir un rato, luego se sacan las hierbas, y se agrega el medio pan, la taza de leche y se licúa.", "Luego se pone a hervir de nuevo y a tiempo de servirla se agrega pimienta, sal al gusto y la copa de vino.", "Se sirve muy caliente con pedazos de jamón o queso amarillo y perejil picado y 1 cucharada de crema de leche."], "notes": ["NOTA: No debe llevar tomate porque se corta."]}, {"title": "Sopa De Coliflor", "ingredients": ["coliflor", "un buen caldo de gallina", "½ pocillo de crema de leche", "1 taza de leche", "3 cucharadas de maicena", "3 yemas de huevo"], "steps": ["Se cocina la coliflor, se cierne, se mezcla con el caldo de gallina.", "Poco antes de servirla, se agregan las 3 cucharadas de maicena disueltas en la leche, se deja hervir y se pone en la sopera sobre las yemas de huevo batidas con un poco de crema de leche."], "notes": []}, {"title": "Sopa De Pan Con Salchichas", "ingredients": ["8 tajadas de pan", "2 cucharadas de mantequilla", "1 taza de leche", "1 huevo cocido y picado", "2 cucharadas de salsa de tomate", "un buen caldo aliñado con diente de ajo y hiervas,", "salchichas en rodajas, un poco de azafrán y", "perejil crespo picado"], "steps": ["Se parten en pedacitos 8 tajadas de pan y se ponen en la sartén con 2 cucharadas de mantequilla, revolviéndolas para que doren.", "Se agrega un buen caldo aliñado con un diente de ajo, hierbas y una taza de leche; se deja hervir hasta que estén casi desechas.", "Se agregan rodajitas de salchichas y un huevo cocido picado, un poquito de azafrán o color, dos cucharadas de salsa de tomate y perejil picado."], "notes": []}, {"title": "Sopa De Papas", "ingredients": ["6 papas cocidas", "huevos", "cucharadas de queso rallado", "un poco de pimienta y nuez moscada", "rallada en muy poca cantidad", "1 caja de caldo de gallina", "1 vaso de leche", "sal al gusto", "cucharadas de mantequilla derretida", "perejil crespo"], "steps": ["Se muelen las papas cocidas, se disuelven en un poco de leche, se les agrega la sal, los huevos batidos, el queso rallado, la mantequilla derretida, la pimienta y la nuez moscada rallada.", "Se desata esta pasta en un buen caldo que no esté muy caliente, se ponen al fuego y se deja hervir un ratico, se le ponen perejil picado a tiempo de servirla. R E C E T A S V A R I A S"], "notes": []}, {"title": "Club Sandwiche", "ingredients": ["1 pan de molde grande sin rebanar", "1 tarro de atún", "1 pocillo de mayonesa", "2 huevos cocidos picados", "1 lechuga", "½ taza de crema de leche", "½ libra de queso crema", "2 pechugas de pollo sudadas", "aceitunas rellenas"], "steps": ["Rebane a lo largo el pan después de quitarle la corteza por los cuatro lados.", "Unte las rebanadas de mantequilla blanda.", "Pique finamente la lechuga, agregue el atún desmenuzado, los huevos picados, ¼ de taza de mayonesa, ¼ de taza de crema de leche, ponga esto sobre una de las rebanadas de pan, tape con la otra.", "Mezcle el pollo picado pequeño con su salsa, ponga 1 cucharada de mayonesa, una cucharada de crema de leche y unas aceitunas picadas. Ponga este relleno sobre la segunda rebanada de pan, tape con la última rebanada de pan.", "Mezcle el queso crema con el resto de mayonesa y crema de leche, cubra los 3 lados del pan con esta mezcla, póngalo en la nevera hasta el momento deservir. Adórnelo con aceitunas rellenas y ramas de perejil."], "notes": []}, {"title": "Empanaditas", "ingredients": ["1 libra de harina de trigo", "1 cucharadita de sal", "2 yemas de huevos", "2 cucharaditas de aceite", "¼ de mantequilla", "agua tibia para mojar la masa", "½ libra de salchichas o salami molido"], "steps": ["Se coloca la harina sobre a tabla, se añade la sal, las yemas, el aceite y la mantequilla.", "Se comienza a mojar con el agua amasando hasta formar pasta suave, se forma una bola y se deja reposar 10 minutos.", "Se extiende sobre la tabla enharinada con el rodillo, dejando la masa de ½ centímetro de espesor.", "Se cortan redondeticos pequeños, se rellenan con el salami y se forman empanaditas, se pegan bien en el borde para que no se abran y se fríen en aceite caliente."], "notes": []}, {"title": "Emparedados De Queso", "ingredients": ["1 libra de queso amarillo o blanco", "¼ de mantequilla", "½ pocillo de leche tibia"], "steps": ["Se mezcla ½ libra de queso amarillo o blanco con ¼ de mantequilla y ½ pocillo de leche tibia.", "Se bate todo bien durante un minuto y se hacen los emparedados en rebanadas delgadas de pan poniéndoles suficiente cantidad de crema para que queden un poco gruesos.", "Pueden llevarse al horno o servirse fríos."], "notes": []}, {"title": "Frisolitos Blancos Con Salami Y Tocineta", "ingredients": ["½ libra de tocineta fría 1 kilo de frisolitos blancos", "½ libra de salami (salchichón cervecero) 1 tarro de pasta de tomate", "2 cebollas de huevo 4 cucharadas de aceite de", "1 cucharada de sal oliva o de cualquier otro", "pocillo de agua"], "steps": ["Después de remojados los frisolitos desde el día anterior, se cocinan en agua con sal, hasta que estén bien tiernos.", "Se escurren y se agregan los demás ingredientes, teniendo en cuenta rallar la cebolla de huevo, picar finamente el salami y partir en pedacitos pequeños la tocineta frita, puede agregarse el aceite y en el que se fritó la tocineta para que queden más gustosos.", "Se ponen al horno a 350 grados durante media hora, se sirven en la misma fuente y quedan muy jugosos."], "notes": []}, {"title": "Guiso", "ingredients": ["1 paquete de habichuelas", "1 frasco mediano de mayonesa", "6 papas medianas", "1 zanahoria grande", "1 tarro pequeño de alverjas", "6 jamón o mortadela", "sal al gusto"], "steps": ["Se cocinan las papas peladas y picadas menuditas, en agua con sal.", "Aparte se cocinan las zanahorias y luego se pican.", "Se cocinan las alverjas también por aparte.", "Se cocinan las habichuelas y se pican menuditas.", "Se revuelve todo con mayonesa.", "Se rellenan las canasticas y se adornan con una ramita de perejil crespo."], "notes": ["TIEMPO: 1 ½", "PORCIONES: 32"]}, {"title": "Huevos En Salsa De Tomate", "ingredients": ["6 huevos", "1 cucharadita de azúcar", "1 cucharadita de vinagre", "1 cebolla cabezona", "Pimienta al gusto", "5 tomates maduros medianos bien rojos", "½ cucharadita de sal", "1 cucharada de mantequilla", "1 hoja de laurel", "1 tajada de queso de prensa rallado"], "steps": ["Se ponen en una sartén los tomates pelados y partidos en pedazos con el resto de los ingredientes.", "Se dejan hervir a fuego lento hasta que los tomates estén desbaratados, luego se sirve esta salsa y se bañan con ella los huevos cocidos y partidos a lo largo.", "Se les pone por encima queso rallado y se meten 5 minutos al horno."], "notes": []}, {"title": "Huevos Con Crema De Leche", "ingredients": ["6 huevos cocidos duros", "1 tarro de alverjas grande", "½ botella de crema de leche", "1 mata de lechuga", "aceite, vinagre y sal"], "steps": ["Se preparan las lechugas con una mezcla de vinagre, aceite y sal.", "Se parten los huevos a lo largo.", "Se colocan las lechugas en una bandeja, luego se colocan las alverjas y por último los huevos cubriendo todo con un poco de crema de leche y un poquito de sal.", "Sirve para acompañar pollo o lengua."], "notes": []}, {"title": "Huevos Rellenos", "ingredients": ["8 huevos duros", "1 lata de atún", "un poco de salsa de bechamel", "8 tajadas de piña calada", "1 mata de lechuga"], "steps": ["Se colocan los huevos echándolos en agua caliente para que la yema quede en la mitad.", "Se pelan en agua fría.", "Se trituran las yemas y se mezclan con el atún triturado en un poco de salsa bechamel.", "Se rellenan los huevos en mitades.", "En platicos medianos se coloca una hoja de lechuga encima los huevos de a dos mitades por persona y una rebanada de piña calada en un poco de azúcar"], "notes": ["PORCIONES: 16"]}, {"title": "Plato Para Te Con Salsa Griega", "ingredients": ["libras de carne de cerdo pulpa 2 cucharadas de mostaza", "1 libra de harina de trigo 1 cucharadita de sal", "8 huevos 1 cucharadita de azúcar", "2 pocillos de leche 3 tomates maduros", "2 panes de salsa negra al gusto", "2 cucharaditas de polvo royal 2 cucharadas de mantequilla", "derretida"], "steps": ["Se aliña la carne al gusto desde la víspera y luego se cocina, y luego se cocina en pitadora con agua suficiente hasta que esté blandita.", "Se muelen 2 veces, se les pone el jugo de los tomates cocidos y escurridos, los panes remojados en ½ pocillo de caldo, 2 huevos batidos, la mostaza, la salsa negra y la mantequilla, se revuelve todo bien. Que la carne quede como paté."], "notes": []}, {"title": "Sandwiches Calientes", "ingredients": ["unas tajadas de pan tostado", "1 caja de sardinas", "2 cucharadas de harina de trigo", "2 tajadas de jamón", "½ libra de mantequilla", "1 taza de caldo", "pimienta y sal al gusto", "queso rallado"], "steps": ["Se untan las tajadas de pan con mantequilla y se le pone una sardina a cada una.", "Se prepara una salsa bechamel así: 2 cucharadas de mantequilla, con 2 de harina de trigo y se ponen al fuego hasta que estén compactas.", "Se agrega poco a poco una taza de caldo, pimienta y sal al gusto, se le pica el jamón menudamente y se cubre el pan con esta salsa y queso rallado", "Se pone al horno ½ hora."], "notes": []}, {"title": "Sandwiches De Atún O Sardina", "ingredients": ["1 caja grande de sardina en tomate o atún", "¼ de mantequilla de vaca", "1 ½ cucharadas de perejil crespo picado menudito", "Sal y pimienta al gusto", "1 pan grande cuadrado sin corteza", "2 cucharadas de salsa blanca", "1 cucharada de mayonesa", "2 zanahorias cocidas y trituradas", "1 frasco de alcaparras", "1 taza de caldo", "unas gotas de limón"], "steps": ["Se mezcla la mantequilla blanda con el perejil, la sal y la pimienta.", "Se unta el pan sin corteza.", "Se revuelve el atún o sardina triturados con la salsa blanca, mayonesa, sal al gusto, alcaparras picadas, la zanahoria triturada y las gotas de limón.", "Se pone una capa de esta pasta sobre las tajadas de pan y se cubre con otra tajada de pan con mantequilla."], "notes": []}, {"title": "Sandwiches De Pollo Calientes", "ingredients": ["1 pan tajado grande", "1 sobre de crema de champiñones", "1 pollo", "2 cucharadas de perejil crespo picado menudito", "2 cucharadas de mantequilla", "3 pocillos de agua", "Condimento al gusto"], "steps": ["Se untan las tajadas de pan con mantequilla y se ponen a tostar en el horno.", "Se cocina el pollo bien condimentado, luego se deshilacha bien parejo.", "Se prepara la crema de champiñones en el agua, cuando suelte el primer hervor se le agrega el pollo y se deja espesar.", "Se coloca por cucharadas sobre las tajadas de pan, ponerle otra tajada de pan y bañarlo con más salsa.", "Servirlos calientes acompañados de lechuga y tomate."], "notes": []}, {"title": "Souflé De Queso", "ingredients": ["½ libra de queso de prensa", "claras de huevo", "```{=html}", "<!-- --", "```", "panes de 0.20", "1 taza de leche", "¼ de cucharadita de cremor de tártaro", "1 cucharada de mantequilla derretida", "Sal al gusto"], "steps": ["Se remoja el pan con la leche.", "Se agrega el queso rallado y la mantequilla derretida.", "Se baten los huevos a punto de nieve y se les agrega el cremor tártaro para que quede más esponjoso.", "Se mezcla todo muy bien y se le pone sal al gusto.", "Se pone en un molde engrasado al baño maría hasta que al introducir un cuchillo salga limpio.", "Se sirve rodeados de alverjitas cocidas, revueltas con ½ cucharada de mantequilla y ½ cucharadita de azúcar."], "notes": ["TIEMPO: 1 hora en el horno", "PORCIONES: 13", "C O N F E R E N C I A S"]}, {"title": "Vocabulario De Los Términos De Culinaria", "ingredients": ["ABRILLANTAR: cubrir con gelatina un ave, carne o pescado, etc., lo", "cual se acostumbra hacer con una cuchara de sopa. También cubrir de", "huevo con un pincel en diferentes clases de pasta.", "ACEITAR: untar abundantemente con aceite.", "ACIDULAR: poner acido a un líquido, un manjar, un guiso (ya sea", "vinagre, limón, etc.).", "ADEREZAR: preparar un manjar para que tenga buen aspecto y cuidar su", "presentación.", "ADEREZO: es lo que añade a un manjar para que le sirva de adorno o", "de acompañamiento. Por ejemplo, una carne con aderezo de papas fritas.", "ADOBAR: es la tarea que consiste en preparar en crudo carnes y", "pescados para guisarlos, teniéndolos previamente sumergidos en una", "mezcla de aceite, vinagre, especies, perejil y cebollas etc.", "AGITAR: mover con frecuencia un líquido o salsa.", "AJIACEITE: (all-i-oli) salsa de ajo y aceite trabada (condimento", "típico catalán.", "ALIÑAR: aderezar, condimentar.", "AMASAR: trabajar una pasta compuesta de harina o fécula, etc.", "ARMAR: (un ave, un pájaro), sujetar con un trozo de cordón los", "miembros del animal, para que al asarlo se conserve en forma adecuada,", "bien la suya o la que se le quiera dar.", "AROMATICAS: (hiervas). Toda hierba, planta o raíz que tiene un olor", "o sabor agradable, perfumado.", "ASAR: someter un manjar al fuego, generalmente al horno, al asador o", "parrilla, hasta dejarlo bien cocinado, cocido.", "ATAR: envolver o sujetar con bramante o hijo fuerte un trozo de", "carne, un asado o un manojo de hiervas.", "BAÑO MARÍA O", "BAÑO DE MARÍA: calentar o cocer un manjar colocándolo dentro de una", "vasija y echándola a otra con agua caliente. Se hierve a voluntad.", "BATIR: (a punto de nieve), agitar o batir, con unas varillas, huevos", "o claras de huevo, hasta formar un cuerpo espeso.", "BOQUILLA: instrumento de hojalata, de forma cónica, lisa o risada,", "que, colocada en una manga de tela, sirve para decorar con puré y para", "rellenar las carnes, pescados o legumbres.", "BRASEAR: rehogar un trozo de carne, ave, pescado, a fuego lento,", "mojado con vinos, caldos o salsas y tapar herméticamente dejándolo en el", "horno.", "CEDAZO O TAMÍZ: aro de madera de unos 10 centímetros de ancho,", "cubierta una de las caras en tela metálica o de seda. Los hay", "automáticos con unos tornillos que sirven para facilitar el cambio de", "dicha tela.", "CLARIFICAR: se refiere a hacer limpiadas las gelatinas, los jugos,", "la mantequilla y los caldos.", "COCER: hervir largo tiempo un alimento, ya sea directamente en el", "agua, en el caldo o en la salsa, ya al baño de maría o al vapor.", "COLOREAR: dar color a una salsa o caldo, añadiéndole caramelo", "quemado o un preparado al efecto.", "CONCENTRAR: aumentar la consistencia de una salsa, líquido, etc.,", "añadiendo ingredientes y evaporando líquido.", "CONDIMENTAR: (aderezar o sazonar), poner al guiso el condimento, sal", "y especies.", "CORDÓN: hilillo que se coloca como adorno en cualquier plato. Puede", "ser de salsa de tomate, mayonesa, huevo picado, gelatina, de tomates,", "perejil, etc.", "CUAJAR: dejar que el manjar se espese y solidifique.", "CHAMUSCAR: se refiere a la operación de pasar toda clase de aves de", "caza por encima de las llamas de un fuego fuerte, la mejor es la del", "alcohol porque no ahúma.", "DESCARNAR: quitar la grasa, caldo o salsas.", "DESHUESAR: quitar los huesos a un trozo de carne o a un ave", "cualquiera.", "DESLEIR: añadir liquido con precaución para que no se formen grumos,", "si se trata de harinas o para que no se corten las yemas.", "DESOLLAR: quitarle la piel a un conejo o a un cordero, etc.", "DESTRIPAR: quitarle las tripas a un ave o pescado.", "DORAR: freír un alimento hasta darle un bonito color dorado; también", "se dora al horno.", "EMPANAR: envolver un manjar bañado en huevo batido o en pan rallado.", "EMPAREDAR: colocar un manjar (queso, jamón, lechuga, pepino, carne", "asada, pavo, etc.), entre los cuadros o triángulos de pan (miga algo", "seca) en forma de emparedado.", "ENHARINAR: envolver en harina (el pescado o la carne), para freír o", "rehogar.", "ENSARTAR: atravesar con un agujón trocitos de carne o tocino para", "asarlos al horno o sobre las llamas.", "ENTRADAS: es uno de los grupos de platos que figuran en las comidas", "de alguna importancia; constituyen el primer servicio después de la", "sopa.", "ESCALDAR: someter los alimentos durante unos segundos al agua", "hirviendo, para ablandarlos o mondarlos, quitar a las aves las plumas", "con más facilidad.", "ESCALFAR: cuajar un manjar (generalmente huevos) en agua hirviendo.", "ESPUMAR: retirar cuidadosamente con un espumador o en su defecto,", "con una cuchara, la espuma o impureza que queda sobre un caldo o una", "salsa hasta dejarlos completamente limpios (es operación que debe", "practicarse siempre que se hace sopa del cocido, pues de no hacerlo,", "resultaría turbia).", "ESTOFAR: guisado en que los componentes de la salsa (cebolla,", "tomate, zanahoria, laurel, perejil entre otros), se pone al fuego con la", "carne en crudo. Se suele echar encima una copa de vino blanco.", "FILETES: trozos planos de carne escogida de vaca, ternera, etc. Se", "llaman también filetes, los trozos de carne que se sacan en tiras de la", "pechuga de las aves y piezas de caza. Cuando se trata de pescado, los", "filetes se separan fácilmente sin cortarse a lo largo de la espían", "central.", "FILTRAR: hacer pasar un líquido por un trapo, colador de papel de", "filtro, a fin de quitarle toda impureza.", "FREIR: cocer un alimento en grasa hirviendo (aceite, manteca de", "cerdo o mantequilla).", "FRITURA: nombre genérico dado a todo manjar frito (fritos de carne,", "pescado, croquetas, etc.) Indebidamente se denomina también así a las", "harinas fritas formando buñuelos, crispetas, etc.", "GLASEAR: operación culinaria que se realiza sobre todo con las", "frutas y dulces, bañándolas en liquido azucarado espeso y dejándolas", "secar.", "GOLPEAR: dar golpes a una carne que se ablande, hasta romper sus", "fibras.", "GRUMOS: se llaman así a las bolas o conglomerados que se forman en", "las harinas, las sopas u otras sustancias cuando se revuelve mal.", "GUISAR: condimentar al fuego lento un alimento rehogando, que se ha", "de servir con la salsa en que se ha cocido (en términos generales, se", "dice también guiso para cocinar).", "HERVIR: llevar a la ebullición un líquido puesto al fuego", "(generalmente se emplea en culinaria hervido o cocido como sinónimos).", "LARDEAR: untar con grasa o manteca un pedazo de carne para facilitar", "su cocción.", "MACERAR: poner y dejar un alimento en remojo, sea en agua, vinagre o", "alcohol.", "MACEAR: es lo mismo que golpear.", "MAJAR: machacar y aplastar en el mortero cualquier manjar hasta", "ponerlo en forma de pasta fina.", "MANTECAR: cubrir el fondo o pared de una fuente o molde con manteca.", "MARINAR: aliñar.", "MECILAR: traspasar las carnes con agujón especial o con la punta de", "un cuchillo para meter tiras de jamón, tocino, etc., en los agujeros así", "abiertos.", "MOJAR: terminar una salsa añadiéndole la cantidad de líquido (agua,", "leche o caldo) que se necesite.", "MONDAR: quitar la piel de las frutas, hortalizas, etc.", "NATA: parte grasosa de la leche. Se forma dejando reposar la leche", "cruda durante 24 horas, en ella se hace la mantequilla o manteca de", "vaca. Se emplea mucho en la cocina y en los postres. No hay que", "confundirla con la nata que se forma después de cocida la leche.", "PAN RALLADO: pan tostado al horno, de un color dorado, machacado y", "pasado por el tamiz.", "PICAR: cortar muy menuda la carne u otra sustancia alimenticia", "(cebolla, aderezo, etc.) para hacer albóndigas, croquetas, rellenos,", "etc.", "PINCHAR: atravesar las morcillas u otro alimento con aguja para que", "no se reviente.", "PURÉ: especie de pasta muy espesa obtenida de legumbres u otras", "sustancias alimenticias, después de cocidas, pasadas por el colador", "disueltas con caldo (puré de lentejas, de patatas de leguminosas, etc.).", "RALLAR: raspar con el rallador o pasando por la máquina de rallar.", "RAMITO DE", "HIERBAS", "AROMÁTICAS: (bouquet) se compone de ramos de perejil, apio, tomillo", "y laurel; y en otros casos, se agrega también estragón e hinojo y", "perifollo, atado todo con un bramante.", "REBOZAR: enharinar la carne o pescado, o bien empanar y bañar de", "huevo.", "REDUCIR: ir cociendo una salsa, un caldo o un líquido cualquiera,", "para que vaya perdiendo volumen por la evaporación y se espese.", "REHOGAR: dar vueltas sobre fuego vivo, en la sartén o la cazuela, a", "ciertas sustancias para que empiecen a tomar color antes de añadir el", "caldo o salsa.", "RELLENAR: embutir al interior de un ave, pescado, molde, etc., con", "distintas clases de rellenos.", "SALAR: poner la sal al guiso o manjar. Dejar en sal un alimento", "(tocino, carne, etc.) para conservarlo.", "SALMUERA: liquido de la sal para conservar en el algún alimento.", "Tener en salmuera un tocino.", "SALSEAR: operación de regar las carnes, pescado, etc., con su salsa", "correspondiente.", "SALTEAR: cocer a buen fuego alguna cosa, sin caldo alguno, en una", "sartén que sirva a este fin, haciéndola dar saltitos por medio de", "movimientos impresos al mango, para que no se pegue el manjar ni se", "agarre. Esta operación es muy distinta a freír.", "SAZONAR: condimentar la comida con sal, pimienta, especias, etc.", "SUDAR: meter un pescado, ave, carne en una cacerola conteniendo un", "líquido graso o envuelto en papel mantecoso y bien cubierto. Calentarlo", "lentamente."], "steps": [], "notes": []}, {"title": "Equivalencias Más Comunes Y Usadas En Culinaria", "ingredients": [], "steps": [], "notes": []}, {"title": "Equivalencias Mas Usadas:", "ingredients": ["1 cucharada 3 cucharaditas", "16 cucharadas 1 taza", "16 onzas 1 libra", "60 gotas 1 cucharadita", "2 tazas 1 pinta", "2 pintas 1 cuartilla", "4 cuartillas 1 galón"], "steps": [], "notes": []}, {"title": "Cucharaditas En 1 Onza De Varios Alimentos:", "ingredients": ["1 onza de azúcar 6 cucharaditas", "1 onza de aceite 7 ¼ cucharaditas", "1 onza de canela en polvo 14 cucharaditas", "1 onza de harina de trigo 12 cucharaditas", "1 onza de jugo de limón 6 cucharaditas", "1 onza de maicena 9 cucharaditas", "1 onza de mantequilla 6 cucharaditas", "1 onza de mayonesa 6 cucharaditas", "1 onza de pimienta en polvo 11 cucharaditas", "1 onza de polvo para hornear 8 cucharaditas", "1 onza de sal 6 cucharaditas", "1 onza de esencia de vainilla 8 cucharaditas", "1 onza de esencia de clavo 22 cucharaditas", "1 libra de canela molida 2 tazas", "1 libra de queso rallado 4 tazas", "1 libra de arroz crudo 1 ¾ tazas", "1 libra de arroz cocido 3 a 4 tazas", "1 libra de espaguetis crudos 5 ½ tazas", "1 libra de espaguetis partidos 5 ½ tazas", "1 libra de espaguetis cocidos 11 tazas", "1 libra de harina de arroz 2 y 2/3 de taza", "1 libra de harina de maíz 3 tazas", "1 libra de harina de trigo 4 tazas", "1 libra de coco rallado 4 tazas", "1 libra de guayabas partidas 1 taza", "1 libra de nueces partidas 3 tazas", "1 libra de nueces sin semilla 3 tazas", "1 libra de habichuela cruda 2 ½ tazas", "1 libra de garbanzos crudos 2 tazas", "1 libra de garbanzos hervidos 2 ½ tazas", "1 libra de leche en polvo 4 tazas", "1 libra de chocolate rallado 3 tazas", "1 libra de pasas sin semillas 3 tazas", "1 libra de azúcar en polvo 3 tazas", "1 libra de manzanas partidas 3 tazas", "1 libra de azúcar granulado 2 ½ tazas", "1 libra de manteca 2 tazas", "1 libra de mantequilla 2 tazas", "1 libra de sal 2 tazas", "1 apio rallado ¾ tazas", "1 libra de papas 2 tazas", "1 libra de yuca rallada 1 ¼ tazas", "1 libra de café fino molido 5 a 6 tazas"], "steps": [], "notes": []}, {"title": "Otras Equivalencias:", "ingredients": ["1 taza de aceitunas pequeñas 60 aceitunas", "1 taza de alcaparras 16 cucharadas", "1 libra de canelones 45 a 60 canelones", "5 a 6 huevos 1 taza", "12 yemas de huevo 1 taza", "1 libra de jamón hervido 16 lonjas", "15 limones grandes 1 taza de jugo", "1 libra de tocineta 20 a 25 lonjas", "Pocillo chocolatero: que comúnmente se llama taza en culinaria, y de", "no poseerse", "las tazas especiales para medir, es el indicado para preparar los", "diferentes platos.", "UN POCILLO CHOCOLATERO EQUIVALE APROXIMADAMENTE A:", "½ libra de mantequilla. ¼ de libra de harina de trigo.", "¼ de litro leche. ½ libra de azúcar.", "INTERPRETACIÓN DE RECETAS", "[Escoja recetas de fuentes fidedignas y léalas", "cuidadosamente.]", "[Si es necesario hornear o asar en horno el producto, encienda la", "llama del horno a la temperatura exacta para tener el calor", "conveniente cuando la mezcla esté completamente lista para", "cocer.]", "[Acostumbre a ordenar todas las recetas en la siguiente", "forma:]", "```{=html}", "<!-- --", "```", "ejemplo: 2 huevos, 1 cucharada de harina, etc.]", "b) [EQUIPO: utensilios que necesitará para preparar las", "recetas, ejemplo: 1 horno, 1 nevera, 1 cuchillo de carne, 1 cuchara,", "1 tabla de picar, etc. Aquí anote si alguno de estos utensilios", "puede ser reemplazado por otro, ejemplo: una prensa puré, o un", "tenedor para majar las papas.]"], "steps": ["ejemplo:] Aliñada: 1 hora Horno: ½ hora Nevera: 2 horas Total: 3 ½ horas", "[Así usted podrá saber si cuenta con tiempo disponible para preparar o no determinada receta.]", "] ALGUNAS NORMAS SOBRE ETIQUETA DE MESA . Para lograr debemos tener en cuenta los siguientes aspectos:] MANTEL:", "[Use individuales o manteles de colores para desayunos, almuerzos o tés.]", "Use mantel blanco para comidas.", "[Coloque debajo de bajo del mantel un dulce abrigo o tela fuerte para proteger la mesa y evitar los ruidos fuertes.]", "El mantel debe colgar unos 30 centímetros a cada lado. [Hay gran variedad de adornos para la mesa, flores, frutas, cristales, porcelanas, platería o combinaciones de estas cosas.] [La ornamentación de la mesa debe ser al buen gusto de la dueña de la casa, donde ella pondrá en alto relieve su personalidad, se prescinde de grandes floreros o centros monumentales. Las velas en candelabros en plata, de cristal o porcelana son muy usados, siendo de mal gusto las eléctricas. Las velas pueden ser blancas o de colores. Deberá evitarse las flores perfumadas.] SERVILLETAS:", "[Las servilletas para comida deben ser grandes, del mismo material del mantel, dobladas sencillamente con el monograma en las partes de encima. Algunos autores opinan que debe colocarse al lado izquierdo del plato y otros que sobre]", "[el mismo; la anfitriona escogerá la manera que le parezca más adecuada de acuerdo a las costumbres del lugar.]", "[Cuando se pasa el primer plato se desdoblan discretamente sobre el regazo. Es de muy mal gusto utilizarlas a manera de babero.]", "[Se utilizan para limpiarse suavemente después de cualquier líquido.]", "[Al terminar la comida se dejan sin doblar al lado izquierdo del plato.]", "[Las servilletas de papel se usan en familia y se colocan dobladas de bajo del tenedor.] LOS PLATOS:", "[La distancia entre cada plato debe ser suficiente para que los criados puedan servir con facilidad sin incomodar a los invitados.]", "[No se deben colocar en una mesa co

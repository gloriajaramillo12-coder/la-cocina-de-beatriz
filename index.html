n capacidad para 10 personas a 16 personas. Más o menos cada invitado debe tener derecho a 70 u 80 centímetros.]", "[Se colocan de manera que al borde coincida con el de la mesa.]", "[Los cerros de platos son de malísimo gusto; sobre la mesa no debe haber nunca más de dos. Si hay un plato mayor que los demás, se utiliza para presentar sobre él los demás platos y se debe retirar antes del postre.]", "[Si en una misma comida se sirve pescado y carne, se usarán platos diferentes para el uno y para el otro.]", "[El platico mantequillero se coloca al lado izquierdo del plato principal, delante del tenedor y a su lado la palita para la mantequilla.]", "[La sopa se lleva a la mesa ya servida en su plato respectivo sobre una bandeja.]", "[El postre se pasa también ya servido y los cubiertos para éste, pueden colocarse desde el principio o en el momento de servirlo.] CUBIERTOS:", "Se colocan los tenedores a la izquierda del plato.", "[Los cuchillos (con el filo hacia adentro) y las cucharas al lado derecho.] CRISTALERÍA: [La cristalería debe estar muy bien lavada y nunca empañada, pues da un aspecto terrible. El cristal nunca se seca, sino que se escurre y se debe tener un jabón y un escobillón solo para ello, con el fin de no engrasarlo.] MODO DE COLOCAR LAS COPAS: Se coloca al lado derecho del plato de la siguiente forma:", "Junto a la punta del cuchillo, la del agua.", "Enseguida hacia la derecha, la del vino blanco.", "Luego la del vino tinto.", "[El vino blanco se sirve semi helado y se usa para acompañar carnes dulces y pescado]", "[El vino tinto se sirve a la temperatura ambiente, y acompañará a las demás carnes.] COLOCACION DE LOS INVITADOS:", "[La primera en sentarse a la mesa es la dueña de la casa y también la primera en levantarse al terminar la comida.]", "[Los dueños de la casa se sientan en las cabeceras de la mesa.]", "[Los alimentos se sirven primero a la dueña de la casa, siendo el ultimo el señor de la casa.]", "[Se sirve primero a la dueña para que esta pruebe que estén preparados correctamente, y autorice servir a los invitados.]", "[El pan debe ir sobre la servilleta, o a la izquierda del plato, cerca de la punta del tenedor, o pasarse después de que los invitados estén sentados, y debe partirse en pequeños trozos a medida que se va comiendo.]", "[Los cubiertos se dejan sobre el plato, uno al lado del otro.]", "Las papas, legumbres y pastas no se parten con cuchillo.", "[Las aves (pollo, pato, etc.) se comen con cuchillo y tenedor, solo en familia se cogen con la mano.]", "La cuchara se lleva a la boca de punta y no de lado.", "Nunca debe sorberse ni hacer ruidos al comer.", "No use palillos para dientes.", "[Nunca pida la receta de un plato durante la comida, hágalo después.]", "[Los alimentos sólidos se sirven por la izquierda, los líquidos (sopa) por la derecha.]", "Los platos se retiran por el lado derecho. [Pero recuerde, que la mejor regla es imitar a la dueña de casa o a la persona que nos ha invitado.] [Y, si es usted, quien hace la invitación, recuerde que debe estar tranquila y preocuparse solamente porque todos se encuentren cómodos.] INVITADOS:", "[Hágase con tiempo: son 6 u 8 días anticipadamente, si es informal, 15 días si es de etiqueta.]", "La casa debe estar perfecta y totalmente arreglada.", "[Recibe los abrigos y carteras de sus invitados e indique a donde va a colocarlos.]", "[Diga que tragos tiene y sirva a cada persona el que éste desee.]", "[Con discreción hágale compañía a aquellas personas que parecen aisladas.]", "Nunca sirva la comida demasiado tarde. [BIBLIOGRAFIA: ESCOBAR, De María José \"GLAMOUR\", la clave del éxito, Editorial Bedout, Medellín, febrero de 1.971.]", "EL COMEDOR, LA MESA Y SUS SERVICIOS EL COMEDOR: [El comedor debe ser confortable, con buena luz natural y ventilado.] [En las comidas de rigurosa etiqueta hay requisitos imprescindibles; y aunque en la vida moderna agasajamos con comidas de menos formalidad, seguimos siempre algunas reglas que contribuyen a dar esplendor a las mismas.] LA MESA: [La mesa debe ponerse esmeradamente a diario, pues así, una fiesta no supone el menor trastorno, ni para el servicio, ni para el ama de casa. Los primeros \"invitados\" son los individuos que componen la familia, y una comida por sencilla que sea, bien presentada y bien servida, tiene un encanto especial.] [El número de cubiertos debe corresponder al tamaño de la mesa, pues cada comensal requiere un espacio de más o menos 60 centímetros.] MANTELERIA: [La mantelería no debe ser recargada de bordados. Su lujo consiste en la riqueza de la tela y el primor del sencillo bordado que debe adornarla. Debe ser blanca y estar correctamente planchada con el aspecto de nueva. No debe usarse manteles almidonados.] [Sobre la mesa se pone un tapete de lanilla gruesa u otro género, cortado al tamaño de la mesa. Este es imprescindible para que no hagan ruido los platos cubiertos. Encima se coloca el mantel, cayendo a sus puntas por igual hasta la mitad de la altura de la mesa o 30 centímetros a cada lado.] [El centro de la mesa se adorna a capricho con centros de plata y más aún, con unas flores puestas en envases muy bajos de manera que permitan a los comensales conversar y mirarse sin molestias. No debemos olvidar que las flores colocadas con naturalidad dan un efecto bellísimo y que las hojas y tallos son también motivos muy atractivos en la decoración. También podrá adornarse la mesa con porcelanas con motivos de anímales, preferible aves o con candelabros bajos de porcelana o plata con una o más velas.] [Las servilletas deben hacer juego con el mantel, doblarse sencillamente y colocadas una sobre cada plato. Las servilletas de papel solo se usarán en familia.] LA VAJILLA, LOS CUBIERTOS Y LA CRISTALERÍA Todos deben estar esmeradamente limpios. [Luego de colocar el tapete, mantel y candelabros, se pone un plato principal de tamaño 10 ½ pulgadas a 11 de diámetro por cada comensal, colocándolo a 3 o 4 centímetros del borde de la mesa. El uso de este plato es únicamente decorativo, pues sobre él nunca se come directamente. Sirve para colocar sobre él, el plato de aperitivo y sopa; y es el único plato que debe de aparecer en la mesa al principio de la comida. Su diseño es muy ornamental y debe hacer juego con la vajilla.] [El plato de aperitivo: Tiene regularmente 7 pulgadas de diámetro sírvase en las ostras, melón, etc.] [El plato de sopa: Es de 8 a 8 ½ pulgadas de diámetro, sirva en el los caldos.] [El plato de entremés: Es pando de 8 ½ a 9 pulgadas de diámetro. Sirva los pescados.] [El plato de carne: Es pando de 8 ½ a 9 pulgadas de diámetro. Sirva las carnes.] [El plato de pan: Es pando de 6 a 6 ½ pulgadas de diámetro.] [El plato de postre: Puede ser pando u hondo, regularmente tiene 7 ½ pulgadas. Sirva los postres.] [A la derecha del plato principal se colocarán cuchillos, cucharas y cucharitas, colocándose de ultima la que primero se usará. Los cuchillos deben colocarse con el filo hacia el plato.] [A la izquierda se colocan los tenedores que van a ser usados, exceptuando el tenedor de aperitivo, que se colocará a la derecha de la cuchara de sopa. Si no se va a servir sopa, póngalo a la derecha de los cuchillos.] [La cucharita o tenedor de postre no debe aparecer en la mesa. Se traerá en su oportunidad sobre el plato de postre.] [Los cubiertos deben colocarse siempre en el orden de su uso, es decir, el primero en usarse está más lejos del plato.] [Según algunas autoridades en servicio de mesa, el cuchillo de mantequilla no debe usarse para comidas formales. Si se usa debe estar colocado en la mesa sobre el plato de pan y mantequilla en posición paralela al borde la mesa y con el mango hacia la derecha.] Los cubiertos que deben aparecer en una comida formal son: (De afuera hacia adentro). 1. Una cucharita o tenedorcito de aperitivo. 2. Una cucharada de sopa 3. Un cuchillo de pescado 4. Un cuchillo de carne 5. Un cuchillo de ensalada El cuchillo de mantequilla sobre el plato de pan y mantequilla. A LA IZQUIERDA DEL PLATO PRINCIPAL (De afuera hacia adentro)", "Un tenedor de entremés o pescado", "Un tenedor de carne", "Un tenedor de ensalada [NOTA: regularmente usamos el mismo tenedor para pescado y ensalada.] LA CRISTALERÍA: [Se coloca de derecha a izquierda: copa para vino tinto seco, vino blanco, vino tinto o de champagne y de agua. Siendo la del vino jerez seco, la primera a la derecha. Los vinos no se ponen sobre la mesa; lo sirven los sirvientes.] [El uso de enjuague se ha dado para comidas de rigurosa etiqueta. Se prepara un tazón con agua y pétalos de rosa, y se pasa a los comensales puesto sobre una bandeja con pañito aprobado, por el lado izquierdo. Regularmente este se usa para lavarse los dedos después de los mariscos y antes de comer el postre.] [En el puesto de cada comensal, estará escrita una tarjeta delante del plato en la que irán escritos los nombres, apellidos y títulos si los tuviera el comensal.] [Todos los invitados se colocarán alternando un caballero y una dama, se tendrá cuidado de aparearlos, no colocando hermanos juntos y menos esposos.] [Solo en la comida de bodas, se colocan juntos en el centro los futuros esposos. De la buena colocación de los invitados dependerá el éxito de la comida, pues por selectos que sean los manjares, si no son gratos los vecinos no se saborearán a gusto. La buena ama de casa ha de saber seleccionar sus invitados, buscando entre ellos afinidad de gustos y simpatía.] MODO DE SERVIR LA MESA [A la hora señalada para servir la comida, o la cena, el sirviente llegará hasta la puerta de la sala o del sitio donde estén reunidos y pronunciará la frase de rigor: La cena está servida. La señora se las habrá arreglado para retener a su lado a los dos caballeros de mayor categoría y conversando con ellos ira hasta el comedor, seguida por los demás invitados.] [La señora será la primera en entrar al comedor y se dirigirá a su puesto, permaneciendo de pie, mientras los demás comensales se dirigirán a sus respectivos puestos, quedando igualmente de pie ante ellos. Después de estar todos los invitados sentados, se presentarán las fuentes de cada comensal por la izquierda, poniéndole debajo una servilleta doblada y cada cual se sirve al gusto.] [El sirviente deberá fijarse cuando falte pan, trayendo otro pancito en un plato y retirando el vacío.] [Cuando se usa pan tostado con las comidas, se sirven en paneras de plata o metal con servilletas cubriendo estas y doblándolas para cubrir el pan.] [Debe prepararse todo de antemano: los platos de recambio, los cubiertos, el servicio de postre, el del café, los licores, etc.] [Llevará a la cocina los platos que se han de calentar, así como las fuentes, etc.] [Para frutas se ponen tenedores pequeños y cuchillos con hojas inoxidables o de plata.] [Los sirvientes deben servir los vinos por la derecha de cada invitado y deben anunciar la clase de vino que se sirve.] [El café debe servirse fuera de la mesa. Con este se sirven licores y cigarrillos.] El orden del servicio de la comida es el siguiente: 1. [El aperitivo, el cual se traerá a la mesa servido. Colóquelo sobre el plato principal] 2. [La sopa, después de retirar el plato o copa del aperitivo, sustitúyalo por el plato de sopa. Sirva vino jerez blanco.] 3. [Entremés o pescado. Después de retirar el plato de sopa junto con el plato principal, sustitúyalo por el plato de entremés o pescado. Retire la copa de jerez. Sirva el entremés o pescado. Sirva vino blanco.] 4. [La carne. Retire el plato de entremés o pescado sustitúyalo por el de la carne. Retire la copa de vino blanco. Sirva las carnes con champagne o vino tinto.] 5. [Ensalada. Sustituya el plato de carne por el de ensalada. Sírvala.] 6. [Para servir el postre limpie totalmente la mesa, dejando solamente las copas de agua y champagne. Sirva el postre seleccionado.] 7. [Si es comida de rigurosa etiqueta traiga el tazón con el enjuague y pase por la izquierda de cada comensal.] 8. El café se servirá fuera de la mesa. 9. [Licores. Sírvalo después del café, acompañados por cigarrillos. Si la primera parte de la comida es fría como queso, galleticas, aceitunas, bocadillos, etc., estos se servirán antes de sentarse a la mesa los invitados.] [El sirviente servirá la sopa desde el auxiliar y se irá colocando en el orden de los invitados, empezando por la dama sentada a la derecha del dueño de casa, luego a la izquierda y seguido a todas las señoras, siendo la última en servirle a la dueña de casa. Seguirá con el caballero sentado a la derecha de ésta, luego a la izquierda y seguido a todos los demás señores, terminando por el dueño de casa. Si sirven dos sirvientes, uno servirá a las señoras y otro a los señores en el orden antedicho.] [Durante la comida no se hará presión para que se sirvan más o repitan, dejando a cada comensal en perfecta libertad de servirse y comer lo que le guste.] [Si los hijos de la casa son comensales, éstos serán los últimos en servirse, después del señor de la casa.] [El sirviente de la casa, vestirá pantalón negro con saco blanco cruzado o smoking.] [La sirvienta de comedor estará vestida en traje color negro; en corte sencillo, cuello y puños blancos, delantal pequeño en hilo, organdí o pique blanco.] [ ] ALGUNAS REGLAS A SEGUIR EN LA MESA [Hay ciertas reglas a seguir en la mesa que toda persona educada conoce: como debe usar el cuchillo y el tenedor, modo de sentarse a la mesa y forma de comer.] [Procure sentarse derecho, y mantener las manos sobre las piernas si no está comiendo. No poner jamás los codos sobre la mesa.] [No debe inclinar el plato en ningún momento para poder tomar su contenido.] [El pan debe partirse con la mano, nunca llevarse un pedazo grande a la boca.] [El cuchillo solo se usa para cortar cosas más o menos duras. Mientras no lo usa, póngalo en la orilla del plato con el filo hacia adentro.] COCTELES [El coctel es una bebida que se obtiene mezclando de una manera lógica y precisa licores, vinos o jarabes, jugos de frutas, etc., de suerte que su conjunto produzca una exquisita armonía en el sabor.] [Todo el mundo tiene en su casa una botella de licor, pero si lo que pretende es hacerse a un pequeño bar, es indispensable que esos licores sean variados, unos más finos que otros, unos más fuertes para caballeros y otros más suaves y dulces para las damas. Al seleccionar estos licores se tendrá en cuenta las costumbres de la región como el presupuesto.] [Cuando se trata de preparar cocteles, debe tener en cuenta entre otros, los siguientes aspectos:] [EL HIELO: uno de los elementos que debe necesariamente entrar de una manera discreta, en toda fórmula de coctel es el hielo, que aparte de su función primordial de enfriar la fórmula, cumple de fusionar (mezclar bien) los licores entre sí y con los demás ingredientes del coctel. Además, neutraliza el alcohol y estimula el aroma y el sabor de los licores.] [Los cocteles que se preparan sin hielo no son cocteles, sino mezclas de alcoholes faltas de todo aliciente.] [Pero esto no quiere decir que el hielo no ponerse en exceso, ni demasiado partido, pues entonces resultarían cocteles insípidos, ya que, al diluirse con rapidez, el hielo al ser agitado en la coctelera, rebajaría la calidad de la bebida, haciéndole perder todo su encanto. Úsese siempre en trozos más bien grandecitos (cubitos, por ejemplo), y 3 o 4 trozos son suficientes, agítese con energía, pero brevemente.] [El coctel debe ser preparado en el preciso momento de su degustación (que se va a tomar), pues la fusión (mezcla) íntima de los licores entre sí dura poco rato, pasado el cual, el coctel se convierte en una bebida absurda.] [La coctelera o el vaso mezclador: la preparación de cocteles, se hace por lo general en uno de estos utensilios o en un recipiente que hayamos adaptado para ello.] [La coctelera es un vaso de dos cuerpos: que encajan uno en el otro y posee un pasador en su interior. Es muy útil para los cocteles que llevan yema de huevo o crema de leche.] [Se debe tener cuidado de cogerla con una servilleta para evitar salpicaduras al agitarlo, al mismo tiempo que prevenir la molestia del frío en las manos.] [Para enfriar bien un coctel, se toma la coctelera con las dos manos y, a la altura del hombro y se sacude enérgicamente su contenido. Obteniéndose así un buen coctel en un mínimo tiempo.] [El vaso mezclador: posee una cuchilla negra, para agitar los ingredientes, se utiliza para cocteles que lleven champaña o bebidas gaseosas, pues si estos se preparan en coctelera y fueran batidos, nos expondríamos a una explosión de los gases al agitarse.] [También es indicado el vaso mezclador para los cocteles hechos exclusivamente con el jugo de frutas (cocteles sin alcohol).] [Sin embargo, en ausencia de estos utensilios, podemos utilizar para la preparación de los cocteles en un recipiente que consideramos apropiado y cómodo.] [PROCEDIMIENTOS: para hacer un perfecto coctel, se seguirá las normas siguientes:] 1. [Se deposita en la coctelera, vaso mezclador o recipiente que vaya a sustituirlos, una discreta cantidad de hielo (3 o 4 pedacitos)] 2. [Se adiciona el azúcar a los jarabes, huevos u otros elementos que contenga la fórmula que desee.] 3. Por último, se adicionan los licores. 4. Se agita breve y enérgicamente. 5. [Se sirve el contenido en una copa de coctel, colocándolo bien. Esto para evitar que pasen a la copa residuos de hielo o cualquier otro ingrediente.] [LAS COPAS: son muy elegantes y modernas, las de forma de cono invertido y, que tienen más o menos la cabida de los vinos jerez.] [Recuerde que el coctel se sirve en vaso frío. No debe ponerse en el fondo de las copas rajas o trozos de limón o de naranja, pues además de no ser agradable a la vista, en lo practico no sirve de nada. sin embargo, si quieren emplearse, deben ser muy delgados y agregarse en el último momento.] [Cuando se desee perfumar la bebida, se cogerá con las pinzas el limón o la naranja y con ellas se exprimirá a fin de que suelte la fragancia de su perfume.] [PASABOCAS Y ENTREMESES: es muy conveniente servir coctel acompañado de entremeses o pasabocas.] [Estos entremeses para ser buen tono, deberán ser ligeros. No es de buen tono servir en un coctel alimentos equivalentes a un almuerzo.] [BIBLIOGRAFIA: \"Enciclopedia del Hogar\" Tomo III. Octava Edición.] Edición Garrica, Editorial Éxito, Barcelona, España, Noviembre de 1967."], "notes": []}, {"title": "Bibliografía", "ingredients": ["ARROYAVE, Mercedes Jaramillo de, [\"Cocinando con mis mejores", "recetas\"].", "Tipografía y Editorial Gamma, Medellín.", "BORNIA, Ligia de, \"La Cocina Dominicana\", Editorial del", "Caribe, C por A,", "Ciudad Trujillo, Republica Dominicana.", "\"Enciclopedia del Hogar\", Tomo III, Octava Edición, Enciclopedia", "Carrica.", "Editorial Éxito, Barcelona, España, noviembre de 1967.", "ESCOBAR, de María José, \"Glamour\", la clave del éxito,", "Editorial Bedout, Medellín, febrero de 1971.", "NAVARRO, Sofía Ospina de, \"La buena mesa\", Editorial Gran", "América,", "Decima segunda edición, Medellín.", "VALDES, Nelly Duque de, \"Mis mejores comidas\", segunda", "edición,", "Editorial Bedout, Medellín, Colombia."], "steps": [], "notes": []}]}]};

32 34 32 32 L32 22Z\" stroke-width=\"1.5\" fill=\"rgba(255,255,255,.13)\"/><path d=\"M6 22 Q6 19 20 19 Q34 19 34 22Z\" stroke-width=\"1.4\" fill=\"rgba(255,255,255,.2)\"/><line x1=\"20\" y1=\"19\" x2=\"20\" y2=\"14\" stroke-width=\"1.4\"/><path d=\"M16 14 L24 14\" stroke-width=\"1.6\"/><circle cx=\"20\" cy=\"13\" r=\"2\" fill=\"rgba(255,255,255,.4)\" stroke-width=\"1\"/><path d=\"M4 26 L8 26\" stroke-width=\"1.5\"/><path d=\"M32 26 L36 26\" stroke-width=\"1.5\"/><path d=\"M34 16 L38 8\" stroke-width=\"1.4\"/><path d=\"M36 8 Q40 8 40 11 Q38 14 36 12 Q37 10 36 8Z\" fill=\"rgba(255,255,255,.35)\" stroke-width=\".9\"/></svg>"};
const ICONS={"Arroz": "🌾", "Carnes": "🥩", "Cocteles y Pasabocas": "🍹", "Ensaladas y Vegetales": "🥗", "Mezclas Vegetales": "🌿", "Papas": "🥔", "Pastas": "🍝", "Postres": "🍮", "Repostería": "🍰", "Salsas y Cremas": "🫙", "Sopas y Cremas": "🍲", "Recetas Varias": "🍽️"};
const INTRO_LINES=["Desde marzo de 1.972, fecha en que se creó el Departamento de Bienestar", "Social de CAJACOM, hasta noviembre de 1.975, se han dictado en el", "Departamento diferentes cursos de culinaria para jóvenes y amas de casa,", "en los cuales se han atendido aproximadamente 740 personas.", "Estos cursos forman parte del programa de capacitación de este", "Departamento, el cual a su vez está integrado a los demás programas de", "la Institución que propenden todos por lograr un desarrollo integral de", "los afiliados y sus familias.", "Para cumplir a cabalidad con este objetivo se han incluido dentro del", "programa de Culinaria, nociones de dietética y nutrición, etiqueta en la", "mesa y otra serie de materias afines que contribuyen a dar una", "instrucción más amplia y eficaz.", "En este trabajo se han tratado de compendiar todas las preparaciones", "(recetas), nociones de nutrición, dietética, etiqueta y demás temas", "enseñados con el fin de que den crédito de los programas desarrollados y", "a la vez sirvan de consulta para futuros programas.", "Al final del trabajo estará consignada la Bibliografía consultada tanto", "en cuanto a preparaciones culinarias como la de los temas", "correlacionados.", "Si se desean estudiar los contenidos de cada curso, las matrículas,", "asistencias, fichas de alumnos, diarios de control de clase,", "evaluaciones, fotografías de exposiciones y demás datos relacionados con", "estos cursos, pueden consultarse los libros de archivo del Departamento."];
let curSec=null,curRec=null;

function setTheme(n){
  const c=COLORS[n]||{acc:'#a07840',light:'#e8dcc8',fade:'232,220,200'};
  const r=document.documentElement;
  r.style.setProperty('--ch-acc',c.acc);
  r.style.setProperty('--ch-light',c.light);
  r.style.setProperty('--ch-fade',c.fade);
}

function enterApp(){
  document.getElementById('cover').style.display='none';
  document.getElementById('app').style.display='block';
  buildIntro();buildIndex();showPage('page-index');
}

function buildIntro(){
  let h='<div style="padding:2.5rem 1.5rem"><h2 class=\"intro-hdg\">Historia del Libro</h2><hr class=\"intro-rule\"><div class=\"intro-text\">';
  INTRO_LINES.forEach(l=>{h+=`<p>${l}</p>`;});
  h+='</div><div class=\"intro-sig\">— Beatriz G&oacute;mez Jaramillo<small>Jefe, Departamento de Bienestar Social &middot; CAJACOM</small></div></div>';
  document.getElementById('page-intro').innerHTML=h;
}

function buildIndex(){
  const g=document.getElementById('sec-grid');g.innerHTML='';
  COOKBOOK.sections.forEach((s,i)=>{
    const c=COLORS[s.name]||{};
    const el=document.createElement('div');el.className='sec-card';
    el.style.setProperty('--ch-acc',c.acc||'');
    el.style.setProperty('--ch-light',c.light||'');
    el.style.setProperty('--ch-fade',c.fade||'');
    const svgIcon=ICONS_SVG[s.name]||'';
    el.innerHTML='<div class="sec-card-hdr" style="background:'+(c.acc||'#a07840')+'">'
      +'<span class="sec-card-ico">'+svgIcon+'</span>'
      +'<div><div class="sec-card-name">'+s.name+'</div><div class="sec-card-sub">capítulo</div></div>'
      +'</div>'
      +'<div class="sec-card-body" style="background:'+(c.light||'#e8dcc8')+'">'
      +'<span class="sec-count">'+s.recipes.length+' receta'+(s.recipes.length!==1?'s':'')+'</span>'
      +'</div>';
    (function(idx){el.addEventListener('click',function(){showSection(idx);});})(i);
    g.appendChild(el);
  });
}

function showSection(idx){
  curSec=idx;
  const s=COOKBOOK.sections[idx];
  const secCol=COLORS[s.name]||{};
  setTheme(s.name);
  const secIconEl=document.getElementById('sec-icon');
  secIconEl.innerHTML=ICONS_SVG[s.name]||'';
  secIconEl.style.color=secCol.acc||'#a07840';
  document.getElementById('sec-title').textContent=s.name;
  document.getElementById('bc-sec').textContent=s.name;
  const l=document.getElementById('rec-list');l.innerHTML='';
  s.recipes.forEach((r,i)=>{
    const it=document.createElement('div');it.className='rec-item';
    it.innerHTML='<span class="rec-num">'+(i+1)+'</span><span class="rec-title">'+r.title+'</span><span class="rec-arr">&rsaquo;</span>';
    (function(si,ri){it.addEventListener('click',function(){showRecipe(si,ri);});})(idx,i);
    l.appendChild(it);
  });
  showPage('page-section');setNav('nav-inicio');
}

function showRecipe(si,ri){
  curSec=si;curRec=ri;
  const s=COOKBOOK.sections[si],r=s.recipes[ri];
  const rcpCol=COLORS[s.name]||{};
  setTheme(s.name);

  document.getElementById('rcp-title').textContent=r.title;
  const secLbl=document.getElementById('rcp-sec-lbl');
  const rSvg=ICONS_SVG[s.name]||'';
  secLbl.style.color=rcpCol.acc||'';
  secLbl.innerHTML='<span class="rcp-sec-ico" style="color:'+( rcpCol.acc||'')+'">'+ rSvg +'</span><span>'+ s.name.toUpperCase()+'</span>';
  document.getElementById('rcp-bc').innerHTML=
    `<span onclick="showPage('page-index')">Cap&iacute;tulos</span><span class="bc-sep">&rsaquo;</span>`+
    `<span onclick="showSection(${si})">${s.name}</span><span class="bc-sep">&rsaquo;</span><span>${r.title}</span>`;

  // Ilustración de fondo
  const iw=document.getElementById('rcp-illus-wrap');
  const illus=ILLUS[s.name];
  if(illus){
    iw.innerHTML=illus;
    const sv=iw.querySelector('svg');
    if(sv){sv.removeAttribute('width');sv.removeAttribute('height');}
  } else iw.innerHTML='';

  // Cuerpo
  let b='';
  if(r.ingredients&&r.ingredients.length){
    b+='<div class="rcp-block-title">Ingredientes</div><ul class="ing-list">';
    r.ingredients.forEach(i=>{b+=`<li>${i}</li>`;});
    b+='</ul><div class="rcp-orn" style="margin:1rem 0"><div class="rcp-orn-line"></div><span class="rcp-orn-dot">&middot; &middot; &middot;</span><div class="rcp-orn-line"></div></div>';
  }
  if(r.steps&&r.steps.length){
    b+='<div class="rcp-block-title">Preparaci&oacute;n</div><ol class="steps-list">';
    r.steps.forEach(st=>{b+=`<li>${st}</li>`;});
    b+='</ol>';
  }
  if(r.notes&&r.notes.length){
    b+='<div class="rcp-notes">';
    r.notes.forEach(n=>{b+=n+'<br>';});
    b+='</div>';
  }
  document.getElementById('rcp-body').innerHTML=b;

  // Prev/Next
  const hp=ri>0,hn=ri<s.recipes.length-1;
  document.getElementById('rcp-nav').innerHTML=
    `<button class="rcp-nav-btn${hp?'':' disabled'}" ${hp?`onclick="showRecipe(${si},${ri-1})"`:''}>
      <span class="rcp-nav-arrow">&lsaquo;</span>
      <span><span class="rcp-nav-label">Anterior</span><span class="rcp-nav-name">${hp?s.recipes[ri-1].title:'—'}</span></span>
    </button>`+
    `<button class="rcp-nav-btn next${hn?'':' disabled'}" ${hn?`onclick="showRecipe(${si},${ri+1})"`:''}>
      <span><span class="rcp-nav-label">Siguiente</span><span class="rcp-nav-name">${hn?s.recipes[ri+1].title:'—'}</span></span>
      <span class="rcp-nav-arrow">&rsaquo;</span>
    </button>`;

  showPage('page-recipe');window.scrollTo(0,0);
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const t={'page-index':'La Cocina de Beatriz','page-intro':'Historia del Libro',
    'page-section':document.getElementById('sec-title')?.textContent||'',
    'page-search':'B\u00fasqueda',
    'page-recipe':document.getElementById('rcp-title')?.textContent||''};
  document.getElementById('topbar-title').textContent=t[id]||'';}
function goHome(){showPage('page-index');setNav('nav-inicio');setTheme('');}
function setNav(id){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById(id)?.classList.add('active');}
function focusSearch(){document.getElementById('search-input').focus();setNav('nav-buscar');}

function doSearch(q){
  q=q.trim().toLowerCase();
  if(!q){if(document.getElementById('page-search').classList.contains('active'))showPage('page-index');return;}
  setNav('nav-buscar');showPage('page-search');
  document.getElementById('srch-hdg').textContent=`Resultados para "${q}"`;
  const res=[];
  COOKBOOK.sections.forEach((s,si)=>{s.recipes.forEach((r,ri)=>{
    if((r.title+' '+(r.ingredients||[]).join(' ')+' '+(r.steps||[]).join(' ')).toLowerCase().includes(q))
      res.push({s,si,r,ri});
  });});
  const c=document.getElementById('srch-results');
  if(!res.length){c.innerHTML='<div class="srch-empty">No se encontraron recetas.</div>';return;}
  c.innerHTML='';
  res.forEach(x=>{
    const it=document.createElement('div');it.className='rec-item';
    it.innerHTML=`<span class="rec-num">${ICONS[x.s.name]||'🍽️'}</span><div style="flex:1"><div class="rec-title">${x.r.title}</div><div class="srch-sec-tag">${x.s.name}</div></div><span class="rec-arr">&rsaquo;</span>`;
    it.onclick=()=>showRecipe(x.si,x.ri);
    c.appendChild(it);
  });
}
</script>
</body>
</html>

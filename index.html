asco pequeño de mayonesa.", "½ frasco pequeño de salsa de tomate."], "steps": ["Se pelan y se pican bien las peras y las manzanas y se echan en agua con sal.", "Se enjuagan bien las frutas, se revuelve todo muy bien, se sirve en una bandeja formando niditos en las hojas de lechuga."], "notes": ["Tiempo: ½ hora", "Porciones: 6"]}, {"title": "Ensalada De Conchitas", "ingredients": ["1 paquete de conchitas.", "½ queso picado menudito (del amarillo o cuajada).", "½ libra de jamón o mortadela jamonada.", "2 ramitas de apio bogotano picadas menuditas.", "2 cebollas de huevo picadas menuditas.", "2 tomates grandes maduros en tajadas.", "salsa francesa."], "steps": ["Se revuelve todo, se le ponen las tajadas de tomate por encima.", "Se baña con la salsa francesa."], "notes": []}, {"title": "Ensalada Deliciosa", "ingredients": ["1 repollo finamente picado.", "½ coco rallado fresco.", "½ libra de uvas moradas.", "½ piña calada en tronquitos.", "1 frasco pequeño de mayonesa."], "steps": ["Se revuelve todo muy bien y se coloca en una bandeja rodeada de lechuga."], "notes": ["NOTA: El repollo se deja en agua un rato antes de preparar la ensalada."]}, {"title": "Ensalada De Frutas", "ingredients": ["1 piña pequeña.", "1 papaya pequeña.", "4 peras.", "1 libra de uvas verdes.", "1 libra de uvas moradas.", "2 manzanas grandes", "3 mangos maduros grandes", "fresas si se quiere."], "steps": ["Se pica todo menudito menos las uvas, las peras y las manzanas. Se echan en agua con sal para que no se pongan negras, luego se escurren y se revuelve todo muy bien con una botella de crema de leche azucarada al gusto, se pone a enfriar en la nevera y se sirve. Es muy propia esta ensalada para platos fríos."], "notes": []}, {"title": "Ensalada De Lechuga", "ingredients": ["1 lechuga", "2 aguacates grandes", "3 tomates grandes", "1 tajada de queso rallada", "2 huevos duros", "¼ de jamón mortadela", "½ pocillo de salsa de tomate", "1 frasco de mayonesa pequeño", "2 cucharadas de vinagre", "sal al gusto"], "steps": ["Se pican los aguacates en tronquitos pequeños y se rocían con el vinagre para que no se pongan negros.", "Se pica la lechuga menudita, se ralla el queso, se pican los huevos, el jamón o la mortadela en pedacitos pequeños y se les echa un poco de sal.", "Aparte se hace una salsa con la salsa de tomate y la mayonesa, sal al gusto y se baña con esto la ensalada que ha sido puesta de antemano en una bandeja rodeada de lechugas.", "Se adorna con flores el huevo"], "notes": ["Tiempo: ½ hora", "Porciones: 8"]}, {"title": "Ensalada De Tomates", "ingredients": ["1 queso crema de 6 onzas", "1 lata de atún", "2 cucharadas de cebolla cabezona picadita", "2 cucharadas de salsa de tomate", "3 tomates grandes", "¼ de jamón mortadela", "Unas gotas de jugo maggi"], "steps": ["Se cortan los tomates en rodajas.", "Se mezcla el queso con el atún desmenuzado, la cebolla y la salsa de tomate.", "Se coloca una cucharada de esta pasta sobre cada rodaja de tomate y se adorna cada una con la mitad de una aceituna rellena, poniendo cada rodaja de tomate sobre una hoja de lechuga.", "Por último, se agrega unas góticas de jugo maggi."], "notes": []}, {"title": "Ensalada Margarita", "ingredients": ["12 papas cocidas, en cuadritos", "3 zanahorias", "1 frasquito de alcaparras", "3 huevos cocidos", "1 tarro de alverjas", "1 libra de camarones", "1 taza de mayonesa", "perejil crespo"], "steps": ["Se pela la papa y se parte en cuadritos pequeños y se cocina en agua con sal, las zanahorias se pelan y se parten en tronquitos pequeños, y se cocinan en agua con sal en la pitadora durante 15 minutos.", "Los camarones se ponen en agua con un poquito de sal y se dejan un ratico, se les cambia el agua y se les pone agua con limón.", "La mitad de la mayonesa se revuelve con la papa y demás ingredientes ya fríos.", "Se coloca la ensalada en una bandeja dejándola un poco levantada en el centro, se cubre con el resto de la mayonesa y se rocía con perejil finamente picado.", "Los huevos se parten en cascos para formar los pétalos de una margarita.", "El centro se forma pasando las yemas por una coladera, los tallos se forman con ramitas de perejil crespo"], "notes": []}, {"title": "Ensalada De Masmelos", "ingredients": ["1 piña partida en trocitos", "1 taza de coco rallado", "1 ½ tasa de azúcar", "6 cucharadas de mayonesa", "¼ de pasas", "2 cucharadas de crema de leche", "1 paquete grande de masmelos picados"], "steps": ["Se parte la piña en pedacitos y se cala con el azúcar y una tasa de agua. Se deja hasta que la piña esté transparente y se retira del fuego.", "A la piña calada se le agrega la gelatina remojada, la crema de leche, el coco, la mayonesa, los masmelos picados, las pasas y se revuelve todo muy bien.", "Se pone en un molde engrasado y se lleva a la nevera hasta que cuaje.", "Se desmolda y se adorna al gusto (con tajadas de piña)."], "notes": []}, {"title": "Ensalada En Molde", "ingredients": ["1 frasco de pepinos en vinagre partidos en tajadas", "1 tarro de alverjas pequeño", "¼ de crema de leche", "1 tarro de atún", "¼ de salchichas en tajadas", "papaya en tronquitos", "1 tarro de pasta de tomate o extracto", "¾ de caja de gelatina sin sabor", "1 frasco de mayonesa pequeño", "1 cucharadita de azúcar", "sal al gusto"], "steps": ["Se revuelve todo, se desata la gelatina en un pocillo grande de agua caliente, se agrega a la mezcla anterior y se pone a la nevera hasta que cuaje, se desmolda y se adorna al gusto o con flores de huevo."], "notes": []}, {"title": "Ensalada De Papa", "ingredients": ["10 papas cocidas, peladas y partidas en trocitos.", "5 huevos cocidos y partidos en trocitos", "1 pocillo cafetero de leche", "1 cucharadita de sal", "¼ cucharadita de pimienta"], "steps": ["Se forma el fondo de un papel engrasado. Engrásese también las paredes del mismo.", "Combine las papas, los huevos, la leche, la sal, la pimienta y la mayonesa.", "Revuelva bien esto y pase al molde presionando con la mano hasta el nivel del borde.", "Tápelo y llévelo al refrigerador media hora antes de servir y despréndalo con un cuchillo. Desmolde en un plato redondo, quite el papel y adorne con flores de tomate y ramas de perejil."], "notes": []}, {"title": "Ensalada De Papa Y Manzana", "ingredients": ["3 libras de papa", "1 libra de camarones", "1 frasco mediano de mayonesa", "4 manzanas verdes", "2 tallos de apio picados y fritos en mantequilla (bogotano)", "1 frasquito de crema de leche"], "steps": ["Se cocina la papa en agua con sal picada en tronquitos, la manzana se pica y se deja en agua con sal.", "Los camarones se lavan y se les quita la vena y la tierra, y se dejan en agua con limón.", "Se escurre todo bien y se revuelve con el apio, la crema y la mayonesa.", "Se decora con gelatina y con boquilla."], "notes": []}, {"title": "Ensalada De Papas Y Verdura", "ingredients": ["unas papas grandes", "1 tarro de alverjas", "2 paquetes de habichuelas picadas y cocidas", "1 tomate grande picado", "1 cebolla de huevo picada menudita", "1 cucharada de salsa negra", "3 cucharadas de aceite", "3 cucharadas de vinagre", "1 cucharada de perejil crespo picado", "½ cucharadita de pimienta", "1 cucharadita de azúcar", "1 cucharadita de sal", "3 cucharadas de salda de tomate", "½ tasa de mayonesa", "1 mata de lechuga", "4 tomaticos pequeños maduros picados menuditos"], "steps": ["Se cocinan las papas picadas en agua con sal y limón o un poco de leche, se dejan hasta que al introducir un palillo hunda fácil y se escurren.", "Se agregan las alverjas, las habichuelas cocidas y escurridas, el tomate picado menudito, la cebolla de huevo picada, la salsa negra, el aceite, el vinagre, el perejil, la pimienta, el azúcar, la sal y la salsa de tomate.", "Se agrega la mayonesa, se revuelve bien y se deja conservar un rato.", "Se coloca en una bandeja sobre hojas de lechuga y se adorna con flores de tomate."], "notes": []}, {"title": "Ensalada De Pepinos Cohombros", "ingredients": ["2 pepinos medianos", "1 cucharada de vinagre", "1 cucharada de azúcar", "1 mata de lechuga pequeña", "sal al gusto", "3 cucharadas de crema de leche", "½ cucharada de aceite", "1 cebolla de huevo picada menudita", "pimienta y perejil picado"], "steps": ["Se pelan los pepinos, se parten en rodajas delgadas y se ponen un rato con sal.", "Se mezcla la crema de leche con el vinagre, el aceite, el azúcar, la pimienta y el perejil picado.", "Se colocan las rodajas de pepino en la ensaladera o bandeja, se les pone la cebolla picada y se baña con la salsa.", "Se rodea de hojas de lechuga."], "notes": []}, {"title": "Ensalada De Piña Y Zanahoria", "ingredients": ["1 piña calada en trocitos con un poco de azúcar sin agua", "2 zanahorias cocidas y ralladas", "2 cajas de gelatina de piña", "½ pocillo de agua"], "steps": ["Se prepara la gelatina en el pocillo y medio de agua caliente, se revuelve con la piña calada y escurrida, la zanahoria rallada y se vacía en un molde húmedo. Sirve para acompañar platos fríos o carnes."], "notes": []}, {"title": "Ensalada De Pollo", "ingredients": ["7 paquetes de habichuelas picadas y cocidas", "2 zanahorias picadas en tiritas y cocidas", "1 tarro de alverjas", "1 pollo cocido y desmenuzado", "½ libra de jamón o mortadela jamonada", "4 cucharadas de aceite", "4 cucharadas de vinagre", "2 cucharadas de salsa de perrins", "2 cucharadas de azúcar", "1 cucharada de mostaza", "4 cucharadas de mayonesa", "sal y pimienta al gusto"], "steps": ["Se revuelve todo muy bien y se deja helar, luego se coloca en una bandeja sobre hojas de lechuga, se cubre con mayonesa, se adorna con flores de huevo duro y se sirve."], "notes": []}, {"title": "Ensalada De Repollo Y Atún", "ingredients": ["Unas hojas de repollo blanco lavadas y picadas menuditas", "y mezcladas con vinagre.", "1 taza de salsa blanca", "1 lata de atún", "3 cucharadas de mayonesa", "3 cucharadas de crema de leche"], "steps": ["Se mezcla el atún con el repollo y luego la salsa blanca mezclada con la crema y la mayonesa.", "Se sirve fría rodeada de lechugas."], "notes": []}, {"title": "Ensalada De Remolacha", "ingredients": ["2 remolachas grandes", "1 taza de salsa blanca", "1 tarro de alverjas tiernas", "unas hojas de repollo blanco", "pimienta, vinagre, sal, aceite", "1 frasquito de mayonesa"], "steps": ["Se cocinan las remolachas y se dejan enfriar para picarlas en trocitos pequeños.", "Se pica el repollo menudito y se pasa por agua hirviendo, se mezcla con sal, aceite, vinagre y las alverjas.", "Se forman niditos con esto y encima se colocan las remolachas mezcladas con mayonesa, sal y pimienta. Se adorna alrededor con cascos de tomate."], "notes": []}, {"title": "Ensalada De Repollo Y Verduras", "ingredients": ["1 repollito pequeño picado menudito", "2 zanahorias", "un poco de mayonesa", "2 pepinos pequeños de ensalada", "poco de crema de leche", "vinagre al gusto"], "steps": ["Se pica el repollo bien menudito y se pone a desaguar un rato en un poco de agua sal con unas gotas de limón.", "Se pelan los pepinos y se parten en tajadas delgadas y se colocan en agua con vinagre."], "notes": []}, {"title": "Ensalada Rusa", "ingredients": ["1 tarro de espárragos", "1 tarro grande de alverjas", "2 pepinos cohombros", "4 huevos cocidos", "un poco de crema de leche", "½ libra de mortadela jamonada", "4 zanahorias grandes", "Perejil crespo", "3 cebollas de huevo picadas menuditas", "mayonesa"], "steps": ["Se cocinan las zanahorias y habichuelas hasta que estén blandas (picadas), y se escurren.", "Se mezclan las zanahorias, las habichuelas, alverjas escurridas, espárragos picados, la mortadela picada y sal al gusto.", "Aparte se hace una salsa con la cebolla picada, el pepino, el perejil picado menudito, los huevos triturados, la mayonesa, la crema y un poco de sal.", "Esta salsa se agrega a las verduras y se mezcla bien."], "notes": []}, {"title": "Ensaladilla De Vegetales", "ingredients": ["3 tomates", "1 cebolla", "1 pepino cohombro", "½ libra de repollitas de bruselas", "1 huevo duro", "2 cucharadas de aceite", "2 cucharadas de vinagre", "1 cucharadita de sal", "1 cucharadita de azúcar", "pimienta", "1 aguacate picado"], "steps": ["Se parten los tomates en pedazos pequeños, se ponen en una vasija con la cebolla finamente picada, el pepino partido en pedacitos, unas repollitas de bruselas cocidas, huevo picado, el aceite, el vinagre, la sal, el azúcar, la pimienta, el aguacate picado.", "Se lleva a la mesa en una ensaladera honda."], "notes": []}, {"title": "Flan De Bolo", "ingredients": ["1 bolo pequeño y tierno", "¼ de mantequilla de la fina derretida", "nuez moscada rallada", "2 cucharadas de panela quemada", "¾ de panela para calar el bolo", "12 cucharadas de harina de trigo", "2 cucharadas de polvo royal", "1 trago de vino", "3 huevos"], "steps": ["Se pela y se parte en trocitos el bolo, se pone en la pitadora en la panela, sin agua, la nuez moscada y un poco de canela.", "Cuando esté calada se baja y se deja enfriar bien, se agrega el resto de los ingredientes, los huevos batidos y la mantequilla derretida.", "Puede agregarse brevas caladas o pasas y se coloca al horno en un molde engrasado y enharinado y se deja hasta que esté consistente.", "Se sirve con crema de leche batida con un poco de azúcar."], "notes": []}, {"title": "Flan De Legumbres", "ingredients": ["2 tazas de legumbres cocidas y picadas", "habichuelas", "coliflor", "zanahorias", "alverjas", "2 tazas de migas de pan", "½ litro de leche", "3 huevos batidos", "¼ de libra de tocino en pedacitos", "3 cucharadas de salsa de tomate", "3 cucharadas de salsa de aliños", "2 cucharadas de mantequilla derretida", "un poco de pimienta y perejil picado"], "steps": ["Se revuelve todo muy bien.", "Se pone al baño maría en el horno en un molde engrasado con mantequilla, hasta que al introducir un cuchillo salga limpio.", "Se cubre con salsa blanca."], "notes": ["Tiempo: 40 minutos en el horno", "Porciones: 14"]}, {"title": "Molde De Aguacate", "ingredients": ["3 aguacates", "1 cucharadita de vinagre", "2 huevos duros picados", "½ cucharada de salsa negra", "3 cucharadas de mayonesa", "½ taza de crema de leche", "1 cucharada de aceite", "5 hojas de colapiscis disuelta en ½ taza de agua hervida"], "steps": ["Se licúan los aguacates con la mayonesa, la crema de leche, el vinagre, el aceite, la sal, la pimienta y la salsa negra.", "Luego se agrega la colapiscis o la gelatina remojada en ½ pocillo de agua hervida.", "Se vacía en molde engrasado con un poco de aceite y se coloca a la nevera hasta que cuaje.", "Se desmolda y se rodea de hojas de lechuga y se adorna con cascos de tomata."], "notes": []}, {"title": "Moldecitos De Verdura", "ingredients": ["1 taza de salsa Bechamel espesa", "3 huevos batidos separadamente", "3 cucharadas de queso rallado", "zanahorias, coliflor, habichuelas cocidas", "salsa amarilla mezclada con un poco de mostaza", "vinagre y alcaparras."], "steps": ["Se pican menudamente la coliflor las habichuelas y las zanahorias. Se mezclan con la taza de salsa espesa.", "Se agregan los 3 huevos batidos separadamente y el queso rallado.", "Se ponen en moldecitos engrasados con mantequilla, y se meten al horno entre una lata con agua.", "Cuando se introduzca el cuchillo y salga limpio, se vacían los moldes y se bañan con una salsa amarilla mezclada con un poco de salsa de mostaza desleída en vinagre y alcaparras picadas."], "notes": []}, {"title": "Pepinos En Encurtido", "ingredients": ["4 pepinos cohombros pelados", "1 pocillo de vinagre blanco", "¾ de pocillo de azúcar", "½ pocillo de agua", "2 cucharaditas de sal", "2 cucharaditas de eneldo fresco picado", "¼ cucharadita de pimienta dulce"], "steps": ["Corte los pepinos en rodajas delgadas.", "Mezcle y caliente en una cacerola el vinagre, el azúcar, el agua, la sal, el eneldo y la pimienta hasta que hierva.", "Vierta esta mezcla sobre las rodajas de pepino y guárdelas en un frasco, tápelo muy bien y póngalo en la nevera.", "Sírvalo como acompañamiento con las ensaladas o como encurtido sobre las hamburguesas o en los sanduches.", "Puede agregarse brevas caladas o pasas y se coloca al horno en un molde engrasado y enharinado y se deja hasta que esté consistente.", "También pueden arreglarse los pepinos pelados y tajados delgados con aceite, sal, y vinagre para las ensaladas; pueden envasarse y guardarse en la nevera."], "notes": ["Tiempo: ½ hora", "Porciones: 1 frasco de 1 litro"]}, {"title": "Pepinos Rellenos", "ingredients": [], "steps": ["Se cocinan unos pepinos medianos hasta que estén blandos, se les saca la semilla y se rellenan con el siguiente guiso: ```{=html} <!-- -- ```", "Se muele un poco de carne cocida, se mezcla con unas papas cocidas y trituradas, 2 huevos cocidos duros y picados menudito.", "Se ponen al fuego con 2 tomates picados menuditos y una cebolla también picada menudita.", "Se agregan 3 cucharadas de aceite, sal y pimienta al gusto. Corte los pepinos en rodajas delgadas. ```{=html} <!-- -- ```", "Cuando estén rellenos los pepinos se pasan por una colada hecha con un huevo batido, mezclado con harina, leche y sal; se revuelve bien, que quede espeso y se fríen en aceite caliente.", "Se sirven adornados con salsa de tomate por encima."], "notes": []}, {"title": "Souffle De Espárragos", "ingredients": ["1 tarro grande de espárragos", "1 pan tajado", "2 vasos de leche", "2 cucharadas de mantequilla altas", "3 cucharadas de harina de trigo", "1 cucharadita de royal", "¼ de queso blanco rallado"], "steps": ["Se ralla el pan y se remoja en la leche, se mezcla con los espárragos picados, la mantequilla derretida, el polvo royal, el queso rallado y los huevos batidos", "Se mezcla todo bien y se coloca en la lata engrasada al horno al baño maría, hasta que el cuchillo salga limpio.", "Se desmolda y se cubre con una salsa hecha con el agua de los espárragos, un poco de leche, mantequilla, y se espesa con un poco de maicena, sal y pimienta al gusto."], "notes": []}, {"title": "Souffle De Verduras", "ingredients": ["2 tazas de legumbres cocidas y picadas", "Habichuelas, coliflor, alverjas, y zanahoria", "½ libra de tocino en pedacitos", "3 cucharadas de aliños", "2 cucharadas de mantequilla derretida", "un poco de pimienta y perejil picado", "2 tazas de migas de pan", "½ litros de leche", "3 huevos batidos", "3 cucharadas de salsa de tomate"], "steps": ["Se revuelve todo muy bien.", "Se pone al baño maría en el horno, en un molde engrasado con mantequilla hasta que al introducir un cuchillo salga limpio.", "Se cubre con salsa blanca."], "notes": []}, {"title": "Souffle De Zanahorias", "ingredients": ["5 zanahorias", "1 taza de pan rallado", "1 vaso de leche", "2 cucharadas de mantequilla derretida", "3 huevos batidos", "½ de queso rallado", "5 cucharadas de azúcar", "½ copa de vino"], "steps": ["Se cocinan las zanahorias", "Se trituran, se mezclan con el pan rallado remojado en la leche, la mantequilla derretida y los huevos batidos.", "Se revuelve todo muy bien, se vacía en un molde engrasado y se pone al baño maría en el horno hasta que al introducir un cuchillo salga limpio.", "Este suflé es propio para acompañar carnes."], "notes": ["Tiempo: 40 minutos en el horno", "Porciones: 10"]}, {"title": "Tomates Rellenos", "ingredients": ["10 tomates grandes", "½ libra de carne de cerdo cocida (o de cualquier otra clase)", "3 panes pequeños", "1 vaso de leche de 250 ml", "1 cucharada de mantequilla", "1 tarrito de alverjas", "1 frasco de mayonesa mediano", "perejil crespo picado, vinagre, sal, azúcar y pimienta."], "steps": ["Se les quita la tapita a los tomates por la parte superior.", "Con una cucharita se le saca la pulpa.", "Las cocas se aliñan con una mezcla de vinagre, azúcar, sal y pimienta, moviéndolas para que se impregnen bien.", "Aparte se hace un guiso con la carne cocida y picada la pulpa de los tomates escurrida y el pan desmenuzado.", "A esto se le agrega la mantequilla, una cucharadita de azúcar, una cucharadita de sal, el tarrito de alverjas y unas ramitas de perejil crespo picado.", "Cuando esté espeso se le agregan 2 cucharadas de mayonesa y se llenan los tomates.", "Se deja enfriar bien (si es posible helados), se cubren con mayonesa y se adornan con ramitas de perejil crespo."], "notes": []}, {"title": "Torta De Zanahoria", "ingredients": ["1 pocillo de zanahoria rallada cruda", "1 pocillo de harina de trigo", "2 cucharadas de mantequilla", "2 huevos", "1 cucharadita de polvo royal", "azúcar al gusto (1 pocillo mermado)", "1 poco de leche si queda muy seco"], "steps": ["Se mezclan todos los ingredientes y se colocan en un molde engrasado con mantequilla y enharinado, se pone al horno a 350 grados hasta que el cuchillo salga limpio."], "notes": []}, {"title": "Zanahorias A La Crema", "ingredients": ["6 zanahorias grandes cocidas", "2 cucharaditas de azúcar", "½ libra de queso de prensa rallado", "2 cucharadas de mantequilla", "1 botella de crema de leche", "Sal, pimienta, perejil picado"], "steps": ["Se cortan rebanadas delgadas de zanahoria, se fríen en mantequilla, con sal, pimienta, perejil y azúcar.", "Se colocan en un molde engrasado un tendido de zanahoria, otro de queso rallado y así hasta terminar, luego se cubren con la leche y el queso rallado.", "Se colocan al horno 10 minutos y se sirve caliente."], "notes": []}]}, {"name": "Mezclas Vegetales", "recipes": [{"title": "Arepuelas Con Incaparina", "ingredients": ["7 cucharadas rasas de Incaprarina", "9 cucharadas rasas de harina de trigo", "1 huevo", "3 cucharadas de manteca derretida", "sal al gusto"], "steps": ["Mezcle la Incaparina, la harina de trigo, y la sal y ciérnalo todo.", "Agregue a esta mezcla la manteca derretida.", "Amase un poco y agregue el huevo.", "Continúe amasando hasta que obtenga una pasta suave, déjela reposar durante 15 minutos.", "Haga arepuelas pequeñas y delgadas.", "Fríalas en aceite o manteca bien caliente, cuando estén doradas por ambos lados, sáquelas y déjeles escurrir la grasa."], "notes": ["NOTA: si se requiere, en lugar de freírlas, pueden meterse al horno."]}, {"title": "Buñuelos De Colombiharina", "ingredients": ["½ taza de queso blando rayado", "3/4 de taza de Colombiharina", "2 cucharadas de aceite", "1 cucharadita de polvo royal"], "steps": ["Mezclar bien todos los ingredientes, sin amasar mucho.", "Formar los buñuelos.", "Freír en manteca o aceite bien caliente hasta que doren."], "notes": []}, {"title": "Bizcochitos", "ingredients": ["¾ taza de Colombiharina", "1 huevo", "8 cucharadas de mantequilla", "1 cucharadita de polvo royal", "sal"], "steps": ["Mezclar bien todos los ingredientes.", "Formar los bizcochitos (con moldes si los hay).", "Meter al horno templado."], "notes": []}, {"title": "Colada De Incaparina", "ingredients": ["2 cucharadas rasas de Incaprarina", "½ pocillo de leche (chocolatero)", "1 pocillo de agua (chocolatero)", "3 cucharadas rasas de azúcar", "canela en astilla al gusto"], "steps": ["Mezcle la Incaparina con el agua, disuélvala bien y ponga al fuego.", "Agréguele el azúcar y la canela.", "Déjela hervir por 10 minutos contados a partir del primer hervor y rebulla constantemente.", "Agréguele la leche y déjela hervir por 5 minutos más."], "notes": ["NOTA: El pocillo empleado para medir es el chocolatero."]}, {"title": "Croquetas De Incaparina Con Tallos", "ingredients": ["10 hojas medianas de tallos o coles", "1 huevo", "1 calado rallado de $", "2 cucharadas rasas de harina de trigo", "½ pocillo de leche", "5 cucharadas rasas de Incaparina", "sal al gusto", "grasa suficiente para freír"], "steps": ["Lave muy bien los tallos o coles y quíteles el tallo o parte dura.", "Eche agua y sal en una olla y cuando empiece a hervir agréguele los tallos de antemano lavados.", "Cuando estén tiernos, retírelos del fuego, escúrralos córtelos en pedazos pequeños.", "Mezcle la Incaparina con el agua, disuélvala bien y ponga al fuego.", "A los tallos cocidos y cortados, agréguele la Incaparina, el huevo, el calado rallado y la harina de trigo disuelta en leche.", "Revuelva todo muy bien y agréguele sal al gusto.", "En un sartén con aceite bien caliente eche esta mezcla por cucharadas pequeñas. Deje dorar las croquetas por ambos lados, retírelas del fuego."], "notes": ["NOTA: En lugar de tallos puede utilizar acelgas, espinacas, repollo u", "hojas de zanahoria, de remolacha, de rábano o de ahuyama bien tiernas."]}, {"title": "Empanadas De Areparina", "ingredients": ["1 libra de areparina amarilla 1 libra de carne de res pulpa", "2 huevos cocidos duros 3 papas cocidas y trituradas.", "Sal, pimienta y cominos 4 tomaticos pequeños", "2 cebollas largas 2 cucharadas de yucarina", "1 cucharada de panela raspada aceite suficiente para freír"], "steps": ["Se amasa la areparina con un poco de agua caliente, se le agregan los cominos, pimienta, sal, yucarina y un poco de aceite, se agrega además la panela raspada.", "Se hace un guiso con la carne cocida y molida, los huevos picados (menuditos), las papas cocidas y trituradas, la cebolla, el tomate picado menudito, sal, pimienta y cominos, se agrega un poquito de aceite y se pone al fuego. Puede agregarse un tris de caldo de carne.", "Se arman arepitas pequeñas de masa y se rellenan con un poquito de guiso, se ciernen y se rizan en los bordes.", "Se fríen en abundante aceite caliente, dejándolas dorar por un lado sin moverlas. Mezcle la Incaparina con el agua, disuélvala bien y ponga al fuego.", "Se sirven con ají o trocitos de limón."], "notes": []}, {"title": "Galletas De Coco Con Incaparina", "ingredients": ["½ libra de manteca o mantequilla", "1 huevo", "1 taza mediana de azúcar (pocillo chocolatero)", "1 taza mediana de Incaparina (pocillo chocolatero)", "1 ½ tazas mediana de harina de trigo (pocillo chocolatero)", "1 cucharadita alta de polvo para hornear", "½ taza de coco rallado (pocillo chocolatero)"], "steps": ["Mezclar la manteca o mantequilla con el azúcar. Agregar el huevo y seguir batiendo, agregar poco a poco la Incaparina, la harina de trigo y el polvo para hornear.", "Agregar el coco rallado.", "Cuando estén tiernos, retírelos del fuego, escúrralos córtelos en pedazos pequeños.", "Poner esta mezcla por cucharaditas en moldes sin engrasar y sin enharinar.", "Poner al horno durante 15 minutos hasta que doren. Con esta fórmula se pueden preparar: GALLETAS DE NARANJA: agregando en lugar del coco, el jugo y el rallado de la cascara de una naranja. GALLETAS DE LIMÓN: (en la misma forma). Agregue el jugo y el rallado de La cascara del limón."], "notes": []}, {"title": "Pasteles De Carne Con Colombiharina", "ingredients": ["¼ taza de Colombiharina", "½ libra de carne cruda molida", "1 huevo", "1 cucharada de aceite", "2 cucharadas de cebolla picada", "1 cucharadita de polvo royal", "sal y pimienta al gusto."], "steps": ["Mezcle la Colombiharina con todos los ingredientes.", "Forme los pastelitos.", "Enharínelos con más Colombiharina.", "Frite en manteca o aceite bien caliente."], "notes": []}, {"title": "Pasteles De Incaparina Con Plátano", "ingredients": [], "steps": [], "notes": []}, {"title": "Hartón Maduro", "ingredients": ["1 plátano mediano hartón maduro", "4 cucharadas rasas de Incaparina", "3 cucharadas rasas de harina de trigo", "1 cucharada de manteca derretida", "6 cucharadas rasas de azúcar", "1 huevo", "esencia de vainilla (cantidad suficiente)", "grasa suficiente para freír"], "steps": ["Lave muy bien el plátano, quítele la cascara y córtelo en pedazos de regular tamaño.", "Eche en una olla agua y póngala al fuego; cuando empiece a hervir agréguele el plátano y déjelo cocer con la olla tapada.", "Cuando esté blando retírelo del fuego y macháquelo bien hasta obtener una masa suave.", "Agréguele luego la Incaparina, la harina de trigo, el azúcar, la esencia de vainilla y la manteca derretida.", "Revuelva muy bien y mezcle el huevo entero (yema y clara juntas).", "En un sartén con manteca bien caliente, eche de la mezcla anterior por cucharadas pequeñas.", "Cuando los pasteles doren por ambos lados, retírelos del fuego."], "notes": ["NOTA: Usted puede hacerlos también con yuca, papa y arracacha."]}, {"title": "Refrescos De Colombiharina", "ingredients": ["10 cucharadas rasas de Colombiharina", "6 tazas de agua", "8 cucharadas de azúcar", "¾ taza de jugo de frutas"], "steps": ["Disuelva la Colombiharina con parte del agua.", "Coloque al fuego el resto de agua; cuando esté caliente, agregue poco a poco la Colombiharina y el azúcar disuelto.", "Rebulla constantemente. Deje hervir 15 minutos y retire del fuego.", "Deje enfriar y luego agregue el jugo de frutas.", "Sírvase helado con trocitos de hielo Cantidad: para cinco (5) personas."], "notes": ["NOTA: Para esta preparación, puede usarse cualquiera de estas frutas:", "Guayaba, naranja, limón, piña, lulos, maracuyá y moras."]}, {"title": "Refresco O Sorbete De Lulo", "ingredients": [], "steps": [], "notes": []}, {"title": "Con Incaparina", "ingredients": ["9 tazas medianas de agua", "16 cucharadas rasas de Incaparina", "6 lulos medianos", "azúcar o panela al gusto", "1 tarro de leche condensada grande"], "steps": ["Disuelva en el agua la Incaparina.", "Agregue el azúcar o la panela.", "Ponga al fuego y deje hervir durante 15 minutos, a partir del momento en suelte el primer hervor.", "Rebulla continuamente.", "Si es posible, sírvalo con trozos de hielo.", "Puede usar el juego de cualquier fruta: guayaba, naranja, limón, mandarina, mango, piña, maracuyá, curuba o mora."], "notes": []}, {"title": "Sopa De Incaparina Con Verduras", "ingredients": ["1/2 pocillo de Incaparina (chocolatero)", "1 zanahoria pequeña", "2 cucharadas de alverja verde desgranada", "1½ hojas de acelgas o tallos", "1 tomate pequeño", "1 cebolla larga", "1 cucharada de aceite o manteca derretida", "10 pocillos de agua (chocolateros)", "sal al gusto"], "steps": ["Lave muy bien la cebolla y el tomate, y córtelos finamente.", "Frítalos ligeramente en la manteca o aceite.", "Agregue 7 pocillos de agua y déjela hervir.", "Lave muy bien la zanahoria, las acelgas y la alverja verde.", "Pele la zanahoria y córtela en pedazos de regular tamaño junto con el tallo y las hojas de acelgas.", "Al agua hirviendo agréguele la zanahoria, el tallo y las hojas de acelgas ya cortados y la alverja verde; déjelos hervir con la olla tapada hasta que ablanden.", "Disuelva la Incaparina en el resto del agua (3 pocillos) y agréguela a la mezcla anterior. Rebulla constantemente.", "Agréguele la sal y déjela hervir 15 minutos más."], "notes": []}, {"title": "Recetas A Base De Colombiharina", "ingredients": [], "steps": [], "notes": []}, {"title": "Tetero", "ingredients": ["8 cucharadas rasas de Colombiharina", "6 tazas de agua", "8 cucharadas de azúcar", "canela al gusto"], "steps": ["Tome parte del agua y disuelva en ella la Colombiharina y el azúcar.", "Coloque al fuego el agua restante.", "Agregue al agua caliente, poco a poco la Colombiharina y el azúcar disuelto, rebullendo constantemente.", "Deje hervir la preparación durante 15 minutos.", "Pele la zanahoria y córtela en pedazos de regular tamaño junto con el tallo y las hojas de acelgas Cantidad para: 5 teteros de 8 onzas. IMPORTANTE: INCLUYA LENTAMENTE LA COLOMBIHARINA EN LA ALIMENTACIÓN DE SU NIÑO Y OBSERVE CUIDADOSAMENTE SU ACEPTACIÓN. USTED PUEDE COMENZAR A ALIMENTAR A SU NIÑO CON COLOMBIHARINA, A PARTIR DE LOS 6 MESSE DE EDAD."], "notes": []}, {"title": "Torta De Carne Con Incaparina", "ingredients": ["2 libras de carne molida cruda", "1 huevo", "½ pocillo de Incaparina (chocolatero)", "1 copa de vino", "3 huevos cocidos", "un poquito de nuez moscada", "sal y pimienta al gusto"], "steps": ["Se pone la carne en un tazón y se le agregan todos los ingredientes mezclando bien.", "Se unta el molde de grasa y se espolvorea con Incaparina.", "Se coloca la carne en el molde y se hornea en horno moderado durante 40 minutos aproximadamente."], "notes": ["NOTA: Para saber si la carne ya está lista, introdúzcase un cuchillo, si", "sale limpio, la carne ya estará cocida.", "Se adorna con ramas de perejil."]}]}, {"name": "Papas", "recipes": [{"title": "Cazuelitas De Papa", "ingredients": ["8 papas grandes y redondas", "1 frasco pequeño de alcaparras", "un poco de polvo de bizcocho", "¼ de salchichas", "2 huevos", "¼ de queso", "sal y pimienta al gusto", "un poco de salsa blanca"], "steps": ["Se pelan las papas, se ponen a cocinar en agua con sal, se dejan reposar un poco y se parten a la mitad, se les saca un poco de comida en el centro, formando una cazuelita.", "Se pican los huevos previamente cocidos, se mezclan con la salsa blanca y las alcaparras picadas (dejando unas para adornar las salchichas picadas), el queso rallado y algo de la pulpa de las papas.", "Se rellenan las papas, se le ponen por encima el polvo de bizcocho, un poco de queso y un pedacito de mantequilla.", "Se adornan con alcaparras."], "notes": []}, {"title": "Corona De Papa", "ingredients": ["1 kilo de papas cocidas", "2 cucharadas de mantequilla", "1 cucharada de crema", "2 yemas de huevo", "sal y pimienta al gusto"], "steps": ["Se cocinan las papas peladas en agua con sal, se pasan por el prensa puré.", "Se baten con la mantequilla derretida, la crema, las yemas, sal y pimienta.", "Se engrasa un molde con mantequilla, se le pone polvo de bizcocho, se aprieta bien el puré y se lleva al horno 25 minutos.", "Se desmolda y se sirve con una salsa de carne abundante con champiñones."], "notes": []}, {"title": "Papitas Al Buen Día Con Salami", "ingredients": ["10 papitas fritas en cuadritos pequeños", "½ litro de salsa blanca", "¼ de queso amarillo", "½ libra de salami", "1 paquete de habichuelas"], "steps": ["Se colocan las papitas fritas en cuadritos, con las habichuelas ya cocidas y se cubren con la mitad de la salsa blanca.", "Se agrega el salami picado en cuadritos, el queso rallado y más salsa blanca.", "Se meten un momento al horno y se sirven en el mismo molde."], "notes": []}, {"title": "Papas Con Cuajada Y Jamón", "ingredients": ["unas papas cocidas sin corteza", "aceite para freír", "½ libra de jamón o mortadela jamonada", "1 taza de leche", "un poco de nuez moscada rallada", "sal al gusto", "¼ de cuajada", "1 cucharada de mantequilla", "un poco de polvo de bizcocho", "2 cucharadas de harina de trigo", "2 yemas de huevo batidas"], "steps": ["Se cortan las papas en tajadas gruesas. Se fríen en aceite caliente.", "Se untan de mantequilla un molde refractario, se espolvorea con polvo de bizcocho, se pone un tendido de papas, otro de jamón, o mortadela y encima más papas.", "Se disuelve la harina en la leche, se agregan las yemas batidas, la nuez moscada y la sal. En esta colada se desmenuza la cuajada y con esta mezcla se cubren las papas. Se les pone encima polvo de bizcocho, pedacitos de mantequilla y se meten al horno.", "Se sirven calientes."], "notes": []}, {"title": "Papas Con Perejil", "ingredients": ["unas papas grandes peladas", "¼ libra de mantequilla", "perejil crespo picado", "sal al gusto"], "steps": ["Se pelan las papas que sean grandes, se sacan bolitas con el sacabocados y", "Se ponen a cocinar en agua con sal hasta que estén blandas, pero no desechas, se retiran y se escurren.", "Se pone al fuego la mantequilla, cuando esté derretida y caliente, se agregan las papas y se les pica el perejil, se dejan sazonar un ratico y se bajan.", "Se ponen en una bandeja y se adornan con ramitas de perejil. Son muy propias para acompañar chuletas."], "notes": []}, {"title": "Papas Con Queso", "ingredients": ["10 papas", "mantequilla", "queso amarillo", "polvo de bizcocho"], "steps": ["Se cocinan las papas con cascara y se dejan enfriar.", "Se les hace un hueco en el centro y se rellenan con queso amarillo, un trocito de mantequilla y polvo de bizcocho.", "Se pone al horno por 15 minutos para servirlas calientes."], "notes": []}, {"title": "Papas En Bolitas", "ingredients": ["10 papas cocidas", "2 yemas de huevo", "1 cucharada de mantequilla", "polvo de bizcocho", "aceite para freír", "sal y pimienta", "un poquito de nuez moscada"], "steps": ["Se trituran las papas muy bien, se mezclan con las yemas de huevo, la sal, la pimienta, el poquito de nuez moscada y la cucharada de mantequilla.", "Se forman bolitas pequeñas, se untan en las claras sobrantes a medio batir, se envuelven en polvo de bizcocho y se fríen en manteca o aceite caliente. Son muy propias para acompañar pescado."], "notes": []}, {"title": "Rollo De Papa", "ingredients": ["10 papas medianas", "2 cucharadas de mantequilla", "1 lata de atún", "4 cucharadas de mayonesa", "perejil crespo", "2 yemas de huevo crudas", "1 tajada de queso", "1 zanahoria", "sal y pimienta al gusto"], "steps": ["Se cocinan las papas peladas con sal que no queden ni muy blanditas ni muy duras y se pasan por el prensa puré.", "Se agrega el queso rallado, las yemas, la mantequilla derretida y la pimienta. Se forman bolitas pequeñas, se untan en las claras sobrantes a medio batir, se envuelven en polvo de bizcocho y se fríen en manteca o aceite caliente.", "Se engrasa una lata larga, se cubre con papel parafinado engrasado y enharinado, se extiende la mezcla de la papa y se lleva al horno un momento, teniendo cuidado que no se vaya a tostar.", "Se saca del horno y se coloca en un secador húmedo.", "Se mezcla el atún, la zanahoria cocida y rallada, la mayonesa y el perejil picado, se echa esta mezcla sobre la papa y se enrolla como un pionono.", "Se coloca en la nevera un rato, se decora con salsa de tomate y ramas de perejil crespo."], "notes": []}, {"title": "Torta De Papas Con Salchichas", "ingredients": ["15 papas cocidas", "½ libra de salchichas blancas o un tarro grande", "1 cucharadita de mantequilla", "3 cucharadas de polvo de bizcocho", "1 huevo"], "steps": ["Se pasan las papas por el prensa puré y se le agregan los demás ingredientes, teniendo en cuenta de picar las salchichas.", "Se engrasa un molde y se colocan al hormo a 350 grados hasta que el cuchillo salga limpio.", "Se sacan del horno y se rocían de queso rallado por encima."], "notes": []}]}, {"name": "Pastas", "recipes": [{"title": "Cazuela De Espaguetis", "ingredients": ["1 zanahoria grande 1 cebolla de huevo", "1 tomate pequeño maduro 1 vaso de agua", "1 libra de carne de cerdo cocida y molida 1 libra de espaguetis", "1 cucharada de salsa inglesa 3 cucharadas de aceite o", "1 tarro de pasta o salsa de tomate. mantequilla", "5 cucharadas de crema de leche 1 tarro de alverjas", "1 cucharada de vinagre 1 vaso de leche", "queso parmesano rallado al gusto. perejil, apio, sal, cominos,", "pimienta al gusto"], "steps": ["Se ralla la zanahoria, se agrega la cebolla, el perejil, el apio, el tomate y el vaso de agua.", "Se licua todo y se agrega el aceite o la mantequilla, la salsa perrins, el vinagre y la sal al gusto.", "Se pone al fuego durante 20 minutos.", "Se agrega la salsa o pasta de tomate disuelta en leche, las alverjas, la crema de leche y los demás aliños.", "Se sacan del horno ya cocinados, la carne molida o deshilachada, se coloca en cazuelas y se les echa queso parmesano rallado por encima.", "Se sirven calientes acompañados de panes individuales."], "notes": []}, {"title": "Lasaña", "ingredients": ["1.5 paquete de pasta para lasaña 1 frasco mediano de mayonesa 2", "zanahorias cocidas", "1 tarro de pasta de tomates 2 huevos", "1 frasco pequeño de alcaparras 2 pocillos de leche", "1 paquete de queso amarillo sal, pimienta, cebolla", "1 kilo de pierna de cerdo laurel, salsa negra"], "steps": ["Se pone al fuego una vasija con bastante agua, sal y aceite. Cuando esté caliente se agrega la pasta una a una revolviéndolas para que no se peguen.", "Cuando estén blandas se retiran del fuego, se les bota el agua en que se cocinaron y se les echa agua fría.", "La carne se cocina con los aliños y con poca agua, también con las zanahorias. Cuando estén cocidas se agregan las ¾ partes de la mayonesa, se pican las zanahorias, la mitad de las alcaparras picadas, la pasta de tomate y revuelve todo muy bien.", "En molde engrasado con mantequilla, se pone un tendido de pasta, otro de carne y así terminar con pasta.", "Luego se hace una salsa blanca con la leche, las yemas batidas, 2 cucharadas de maizena, sal y pimienta al gusto.", "Cuando se retira la salsa del fuego se agrega el resto de la mayonesa, el resto de las alcaparras picadas con esta salsa, se cubre el molde. Se le pone queso rallado por encima y trocitos de mantequilla.", "Se mete al horno a 350 grados por ¾ de hora."], "notes": []}, {"title": "Macarronada", "ingredients": ["3 paquetes de macarrones", "¼ de salchicha", "1 pocillo de salsa blanca", "1 cucharadita de mantequilla", "2 tomates grandes maduros", "3 huevos cocidos", "2 tostadas molidas"], "steps": ["Untar una fuente de mantequilla.", "Cocer los macarrones con un poco de sal.", "Poner en la fuente un tendido de macarrones (cocidos).", "Colocar otro de rebanadas de tomate, espolvoreadas con azúcar y tajaditas de salchichas.", "Terminar con otro tendido de macarrones.", "Colocar encima unos trocitos de mantequilla y un poco de polvo de bizcocho.", "Poner al horno por poco rato."], "notes": []}, {"title": "Ravioles Exquisitos", "ingredients": ["2 libras de harina de trigo", "4 claras de huevo", "4 cucharaditas de sal", "4 copitas de vino blanco", "2 cucharadas de extracto de carne", "4 huevos", "8 cucharadas de mantequilla", "1 seso cocido", "½ queso amarillo rallado"], "steps": ["Se amasa la harina con las tres yemas de huevo y la clara", "Se moja con agua tibia y se amasa hasta que la pasta esté suave.", "Se extiende delgada, se cortan y se rellenan con el guiso dándoles forma de empanadas.", "El guiso se hace así: Se pican finamente unas hojas de espinaca, se ponen en una sartén con dos cucharadas de mantequilla y una cucharadita de sal, y cuando se hayan frito un poco, se agrega el seso cocido y triturado, las alcaparras, las hierbas, la pimienta, la cebolla, todo molido con un poco de sal.", "Se echan las empanaditas en el caldo hirviendo o a falta de éste en agua con sal durante 5 minutos.", "Se colocan en una bandeja y se cubre con una salsa de tomate mezclada con una copa de vino blanco, ¼ de queso amarillo rallado, dos cucharadas de extracto de tomate.", "La salsa de tomate se hace batiendo en la licuadora los tomates maduros y sazonándoles, luego con mantequilla, azúcar, sal al gusto y a fuego lento."], "notes": []}, {"title": "Espaguetis Con Carne De Cerdo", "ingredients": ["2 cucharadas de perejil crespo", "2 cebollas de huevo picadas menuditas", "3 zanahorias crudas ralladas", "3 cucharadas de apio bogotano picado menudito", "3 paquetes de espaguetis cocidos y escurridos", "1 libra de cordón de cerdo o pierna picado crudo", "1 tarro de extracto de tomate", "¼ de mantequilla", "2 hojas de laurel y un tris de pimienta", "sal al gusto."], "steps": ["Se pone todo a cocinar con agua suficiente, laurel, pimienta y sal.", "Cuando esté la carne blanda se le agregan los espaguetis, la mantequilla y el extracto de tomate.", "Un poco antes de servirlos, se dejan a fuego lento o al horno para que no se enfríen. Se puede servir con queso rallado por encima y acompañado de rebanadas de pan o panes individuales."], "notes": ["Tiempo: 1 hora", "Porciones: 8"]}, {"title": "Espaguettis Venecianos", "ingredients": ["1 libra de espaguetis", "¼ de mantequilla", "1 tarrito de extracto de tomate pocillo de salsa blanca", "1 cebolla de huevo", "½ libra de solomo de res o cerdo pulpo tomates grandes maduros", "½ paquete de queso parmesano", "1 tarrito de agua medido con el del extracto"], "steps": ["Se cocinan los espaguetis en agua abundante con sal y aceite, cuando estén cocidos se bajan y se les pone agua fría, dejándolos así hasta cuando se vayan a preparar.", "Por separado se prepara la siguiente salsa: se muele la carne ya cocida, se agrega el extracto de tomate, la mantequilla y la cebolla rallada, y se pone al fuego por 5 minutos con el tarrito de agua.", "Esta salsa se pone encima de los espaguetis poniéndoles encima el queso rallado."], "notes": []}, {"title": "Soufle De Espaguetis", "ingredients": ["2 paquetes de espaguetis", "2 cucharadas de mantequilla", "1 lata de pasta de tomate", "2 huevos", "1 lata de atún.", "1 paquete de queso rallado"], "steps": ["Se cocinan los espaguetis con agua caliente con sal, aceite y, cuando estén blandos se pasan por un cedazo y se juagan.", "Se mezclan con el atún desmenuzado, la sal, la pasta de tomate, la mitad de queso rallado, los huevos batidos (como para perico) y la mantequilla derretida.", "Se colocan en un molde engrasado, se cubren con el resto de queso y se ponen al horno un rato."], "notes": []}, {"title": "Tallarines Con Albondigas", "ingredients": ["1 paquete de tallarines grande", "tomates maduros medianos", "3 cucharadas de aceite", "albóndigas de res o cerdo, cantidad al gusto.", "queso parmesano rallado, al gusto", "1 ½ cucharadita de sal", "1 ½ de azúcar", "½ cucharadita de pimienta", "1 tarro de extracto de tomate", "2 cebollas de huevo blancas partidas en rebanadas", "1 hoja de laurel, orégano y dos dientes de ajo", "1 taza de agua"], "steps": ["Se pone la cebolla y los ajos a dorar en el aceite, luego se agregan los demás ingredientes, los tomates pelados y picados, se dejan hervir durante 10 minutos sin tapar.", "Se echan las albóndigas y se dejan cocinar 20 minutos tapados.", "En una bandeja se colocan los tallarines cocidos, luego se les echa la salsa por encima con las albóndigas y se cubren con queso rallado."], "notes": []}, {"title": "Tallarines Susanita", "ingredients": ["1 ½ paquetes de tallarines", "1 paquete de sopa de champiñones", "un poco de leche para preparar la sopa", "¾ de libra de mortadela jamonada o jamón", "1 pocillo de crema de leche", "1 cebolla de huevo rallada y dorada en mantequilla", "1 paquete de queso rallado", "6 huevos", "un poco de polvo para bizcocho"], "steps": ["Se cocinan los tallarines, se pasan por agua fría y se escurren.", "Aparte, se prepara el paquete de sopa en leche, con un poquito de agua; debe quedar un poco espesita.", "Se muele la mortadela o jamón y se mezcla con la sopa, la crema de leche, la cebolla dorada en la mantequilla, el paquete de queso, las yemas, los tallarines y las claras batidas a la nieve.", "Se vierte la mezcla en un molde engrasado y con polvo de bizcocho, se lleva al horno al baño maría hasta que salga limpio el cuchillo. Se desmolda y se adorna con aros de aguacate con vinagreta y ramitas de perejil."], "notes": []}]}, {"name": "Postres", "recipes": [{"title": "Cassata", "ingredients": ["2 cucharadas de gelatina de limón", "1 tarro grande de leche condensada", "1 pocillo de crema de leche", "2 huevos", "2 vasos de jugo de cualquier fruta sin agua"], "steps": ["Se baten las claras de huevo a la nieve, y poco a poco se les va añadiendo la leche condensada, la crema, el jugo y las yemas.", "Se disuelve la gelatina en un poco de leche tibia y se incorpora a la mezcla anterior.", "En un molde engrasado con aceite, se vacía la mitad la mezcla y, se pone en el congelador hasta que cuaje.", "Cuando esté dura se le pone una capa de bizcochuelo mojado en vino con azúcar, almendras y fruta cristalizada, luego se vacía sobre esto el resto de la mezcla.", "Se mete al congelador. Se desmonta y se cubre con almendras picadas."], "notes": []}, {"title": "Crepes Rellenos De Fresa Con Crema", "ingredients": ["2 tercios de taza de harina", "½ cucharadita de sal", "3 huevos", "½ taza de leche", "1 cucharadita de polvo royal", "Fresas y crema de leche", "½ cucharadita de mantequilla derretida"], "steps": ["En una taza mediana cierna la harina, la sal y el polvo royal.", "Aparte, bata los huevos bien y agregue la harina poco a poco alternando la leche sin que quede en grumos hasta formar una colada, ni muy gruesa, ni muy delgada.", "Agregue la mantequilla revolviendo bien.", "Caliente bien una cacerola engrasada con mantequilla y vierta un poco de la muestra, riéguela bien y déjela dorar, luego voltéelo y déjelo dorar por el otro lado echando un poco de mantequilla, repita hasta terminar la colada.", "Prepare el relleno con las fresas lavadas y cortadas en tajadas, agregue un poco de azúcar pulverizada y crema de leche, rellene los crepes y enróllelos en forma de cartucho.", "Pueden rellenarse con cualquier mermelada o con crema inglesa espesa y se enrollan común y corriente."], "notes": ["Tiempo: 1 hora", "Porciones: de 10 a 12"]}, {"title": "Deliciosas Peras", "ingredients": ["8 peras medianas pintonas", "¼ de azúcar", "2 cucharadas rasas de harina de trigo", "1 vaso de vino blanco", "1 trago de brandy", "1 pocillo chocolatero de leche", "2 huevos", "4 pastillas de chocolate amargo", "1 limón", "6 huevos", "1 poquito de vainilla"], "steps": ["En una cazuela se mezclan en frío la harina, el azúcar, las yemas de huevo, el chocolate y el brandy y el vino blanco", "Se revuelve bien con un batidor por espacio de unos minutos.", "Lentamente se agrega la leche caliente y se le añade la vainilla. Se pone al fuego la y se continúa revolviendo lentamente.", "Cuando empiece a hervir se retira del fuego.", "Se deja enfriar revolviéndolo bien de cuando en cuando a fin de evitar que se formen grumos o nata por encima.", "Aparte de pelan las peras teniendo cuidado de no cortarles el palito y se igualan por debajo para que se sostengan bien derechas en la bandeja. Pasa .........................", "Viene ... Deliciosas Peras", "Se ponen en una cazuela.", "Se les echa encima el azúcar, el zumo de limón con un pedacito de corteza, un vaso de vino blanco y el agua necesaria para cubrir totalmente las peras.", "Se deja cocer por espacio de 10 minutos chuzándolas con un palillo para ver si están blandas.", "Se sacan del fuego y se dejan enfriar.", "En el fondo de la bandeja se vacía la mitad de la crema, se colocan encima de las peras frías y con una cuchara se echa sobre ellas el resto de crema, procurando que queden totalmente cubiertas.", "Se puede colocar a cada pera una hojita de yerbabuena."], "notes": []}, {"title": "Esponjado De Tomate", "ingredients": ["1 caja de gelatina de cereza", "4 tomates de árbol", "8 pocillos de crema de leche", "1 hoja de colapiscis", "Azúcar al gusto", "4 huevos"], "steps": ["Se licúan los tomates en un pocillo de agua.", "Se ponen al fogón.", "Cuando hiervan se les agrega la colapiscis y la gelatina disuelta en el otro pocillo de agua caliente.", "Se baten las claras a la nieve y se les agrega a la mezcla anterior batiendo bastante.", "Se vacía en un molde húmedo y se pone en la nevera hasta que cuaje."], "notes": []}, {"title": "Flan De Leche", "ingredients": ["1 litro de leche", "8 huevos batidos", "½ libra de azúcar", "1 cucharadita de vainilla", "½ libra de queso rallado", "1 pocillo de azúcar", "1 pocillo se agua", "1 cucharada de color de caramelo", "½ trago de ron", "Se pone al fuego el azúcar con el agua hasta que espese un poco.", "Cuando dé punto se retira del fuego, se agrega el color de caramelo", "y el ron."], "steps": ["Mezcle el litro de leche con los huevos batidos.", "Agregue la ½ libra de azúcar, la vainilla o el rallado de limón.", "Ponga al baño maría hasta que esté consistente.", "Déjelo enfriar para desmoldarlo.", "Se sirve bañado con almíbar teñido de caramelo al que se le pone ½ trago de ron."], "notes": ["Tiempo: 1 hora", "Porciones: 13"]}, {"title": "Flan De Pan", "ingredients": ["1 pan grande", "2 huevos", "2 cucharadas de mantequilla derretida", "1 vasos de leche", "3 cucharadas de harina de trigo", "1 cucharadita de polvo royal", "1 cajita de pasas", "la cascara de un limón verde rallada", "panela quemada", "azúcar al gusto", "1 trago de vino"], "steps": ["Se desmenuza el pan y se remoja con la leche amasándolo bien.", "Se agrega la harina de trigo mezclada con el polvo royal, con los demás ingredientes: el azúcar, y la panela quemada.", "Se coloca en un molde engrasado y se pone al baño maría en el horno hasta que al introducir un cuchillo salga limpio.", "Se deja reposar para desmoldarlo y se sirve con almíbar con ron. Se adorna al gusto o con hojas de rosas."], "notes": ["Tiempo: 40 minutos", "Porciones: 13"]}, {"title": "Fresas Con Crema", "ingredients": ["Fresas", "Azúcar", "Canela en polvo", "Crema de leche batida"], "steps": ["Se limpian las fresas de los pezones. Se lavan y se ponen a escurrir en un colador, luego se espolvorean con azúcar y canela en polvo y se ponen a helar. A tiempo de servirlas se bañan con crema de leche batida."], "notes": []}, {"title": "Gelatina De Guanabana", "ingredients": ["6 claras de huevo", "12 hojas de colapiscis o una caja de gelatina sin sabor", "½ libra de azúcar", "1 taza cernida de guanábana"], "steps": ["Se baten muy bien las claras de huevo.", "Se agrega la colapiscis o la caja de gelatina, remojada en un pocillo de agua fría.", "Se agrega el azúcar y el cernido de guanábana.", "Se vacía en un molde húmedo o engrasado y se lleva a la nevera hasta que cuaje.", "Para servirlo se puede acompañar con salsa de moras o crema inglesa."], "notes": []}, {"title": "Gelatina Divina", "ingredients": ["2 sobres de gelatina (4 cucharadas) sin sabor)", "1 tarro de leche condensada grande", "2 pocillos de agua"], "steps": ["Se pone a hervir el agua y se agrega la gelatina remojada en un poco de agua fría, cuando hierva se retira.", "Se licúa con la leche condensada que debe echarse poco a poco, se pone en molde engrasado a la nevera hasta que cuaje.", "Se desmolda y se baña con crema de leche con azúcar (b"], "notes": []}, {"title": "Manzanas Rellenas", "ingredients": ["10 manzanas", "1 ½ libra de azúcar", "1 taza de leche", "ciruelas pasas o brevas caladas", "3 huevos", "La cascara de un limón verde rallada", "1 trago de vino"], "steps": ["Se pelan las manzanas, se descorazonan, se echan en agua con limón y sal.", "Se coloca en una olla 3 pocillos de agua, ½ libra de azúcar, se dejan cocinar teniendo en cuenta que no se deshagan.", "A medida que se van cocinando, se van sacando y se colocan en una bandeja. Las ciruelas se parten en pedacitos y se ponen a cocinar en un pocillo de agua y ½ taza de azúcar con el trago de vino; se dejan hervir revolviendo hasta que espesen un poco. También puede utilizarse las brevas caladas conservándolas en el vino un ratico. Con esta salsa se rellenan las manzanas (o con las brevas); del agua que ha quedado del cocimiento de las manzanas se saca ½ taza, y se hace un almíbar que, de punto de bola blanda, que se mezcla con hielo dejando a las claras previamente batidas a la nieve.", "A la otra parte del cocimiento se le agregan las yemas batidas en leche, revolviendo constantemente, si queda claro se espesa con una cucharada de maicena disuelta en leche y se sigue revolviendo.", "Con esta salsa se bañan las manzanas y se cubren con el batido."], "notes": []}, {"title": "Melocotones Rellenos", "ingredients": ["1 lata de melocotones grandes", "2 claras de huevo batidas a la nieve", "1 pocillo de crema de leche batida", "azúcar al gusto", "fresas o cerezas para adornar"], "steps": ["Se destapan los melocotones y se escurren en un cedazo.", "Se baten las claras a la nieve que queden duras y se le pone azúcar al gusto.", "Con esta crema se rellenan los melocotones y se adornan por encima con una fresa o cerezas."], "notes": []}, {"title": "Molde De Gelatina Con Fruta", "ingredients": ["4 cajas de gelatina de limón", "1 frasco de brevas", "1 papaya pequeña madura partida", "un poquito de azúcar", "1 tarro de duraznos (grande)", "1 piña calada en trocitos", "1 liba de peras maduras"], "steps": ["Se disuelve la gelatina en 6 pocillos de agua caliente.", "Se agregan 3 cucharadas de azúcar.", "Se deja enfriar un poco.", "Se vacía parte de esta mezcla en el fondo de un molde húmedo.", "Se deja cuajar un poco.", "Se coloca una capa de frutas", "Se agrega un poquito de gelatina.", "Se deja cuajar un poco, luego se agrega fruta y se termina con gelatina.", "Se pone en la nevera hasta que cuaje bien.", "Se desmolda."], "notes": ["NOTA: Este postre sirve para adornar carnes frías, o se sirve rodeado de", "hojas de lechuga. Puede hacerse en moldecitos individuales."]}, {"title": "Natilla", "ingredients": ["3 botellas de leche", "2 pocillos de maicena un poco altos", "un poquito de coco rallado de deshidratado", "3 paqueticos de clavos", "1 panela", "1 cucharada de mantequilla", "canela en astilla", "1 taza de agua"], "steps": ["Se parte la panela en pedacitos y se pone al fuego en 2 botellas de leche hasta que se disuelva bien.", "Se disuelve la maicena en la otra botella de leche y se le agrega a la mezcla anterior, cuando empiece a hervir, y se revuelve seguido con un mecedor.", "Los clavos y la canela se ponen a hervir por un ratico en una taza de agua hasta que suelte bien y se le agrega a la mezcla de la leche y la panela.", "Cuando dé punto que desprenda de la paila se le agrega el coco rallado y la mantequilla, se revuelve bien y se vacía en una bandeja y se espolvorea con la canela en polvo."], "notes": []}, {"title": "Piña Nevada", "ingredients": ["1 piña", "2 claras de huevo batidas a la nieve", "Azúcar al gusto", "coco rallado", "cerezas"], "steps": ["Se pela la piña y se corta en rebanadas.", "Se le saca el corazón con una tapa de aguardiente.", "Se cubren las rebanadas de piña con las claras de huevo batidas a la nieve mezcladas con azúcar.", "Se les pone coco rallado por encima y se adornan con una cereza."], "notes": []}, {"title": "Postre De Arroz Con Leche", "ingredients": ["¾ de arroz", "½ litro de leche", "3 huevos", "6 bizcochuelos", "1 copa de vino", "1 cucharadita de vainilla", "¼ de pasas"], "steps": ["Se hace el arroz de leche con tiempo, luego se baten los huevos, se desmenuza el bizcochuelo y se le mezclan los demás ingredientes.", "Se ponen al horno, se adorna para servirlo con ramos de uvas."], "notes": []}, {"title": "Postre De 7 Colores", "ingredients": ["1 paquete de gelatina de mora", "1 paquete de gelatina de fresa", "1 paquete de gelatina de frambuesa", "1 paquete de gelatina de naranja", "1 paquete de gelatina de uva blanca", "1 paquete de gelatina de cereza", "1 paquete de gelatina de piña", "2 paquete de gelatina de limón", "1 cucharada de gelatina sin sabor (alta)", "1 tarro de leche condensada grande, la misma medida", "de leche con una papaya calada en tiritas."], "steps": ["Cada paquete de gelatina se prepara en un pocillo de agua hirviendo separadamente menos limón.", "Todas las gelatinas ya cuajadas se pican menudamente.", "En un pocillo de agua hirviendo se desatan las gelatinas de limón y la cuchara de gelatina sin sabor.", "Esto se baja del fuego, se le revuelve la lata de leche condensada, la otra leche y se bate fuertemente con batidor o en la licuadora.", "Se engrasa el molde con un poquito de aceite.", "El fondo del molde se arregla con las tiritas de papaya calada en forma de girasol.", "Se pone una capa delgada de crema, luego un tendido de gelatina picada, otra capa de crema y así sucesivamente hasta terminar con crema y se lleva a la nevera."], "notes": []}, {"title": "Postre De Coco", "ingredients": ["1 coco pelado y rallado o un paquete", "1 libra de azúcar", "4 huevos", "4 vasos de leche", "1 lata de duraznos", "1 paquete de maicena pequeño", "¼ de ciruelas pasas", "esencia de vainilla"], "steps": ["Se pone al fuego la leche y la mitad del azúcar, dejando un poco de leche disolver la maicena, cuando hierva se agrega la maicena disuelta en la leche y las yemas bien batidas, revolviendo constantemente para que no se pegue, se deja hasta que no sepa a maicena.", "Se agrega el coco y se revuelve bien, se retira y se deja reposar, se agrega la esencia de vainilla.", "Se coloca en una bandeja, se cubre con el resto del azúcar hecho en almíbar espeso y mezclado con las claras batidas a la nieve y las ciruelas picadas.", "Se coloca encima de la maicena tajaditas de duraznos y luego el batido, se le pone coco rallado por encima y se adorna con el resto de los duraznos."], "notes": []}, {"title": "Postre De Crema Inglesa", "ingredients": ["unas tajadas de ponqué ramo remojadas", "en un poco de agua de azúcar con vino", "1 ½ botella de leche en crema inglesa espesa", "4 yemas de huevo", "un poco de vino para perfumar la crema", "azúcar al gusto", "maicena suficiente para espesar bien la salsa", "¼ de pasas", "4 claras batidas a la nieve", "un poco de coco rallado para adornar por encima"], "steps": ["Se prepara la crema inglesa que quede espesa y bien cocida, se retira del fuego y se perfuma con un poco de vino.", "Se coloca en un molde un tendido de esta crema, otro de torta remojada y pasas, y así hasta terminar con crema.", "Se cubre con las claras batidas a la nieve y se adorna con coco por encima."], "notes": []}, {"title": "Postre De Curubas", "ingredients": ["6 claras batidas a la nieve", "azúcar en polvo (un poco menos de ½ libra)", "½ taza de jugo de curuba", "el jugo de 2 limones", "½ pocillo de crema de leche", "un poco de esencia de vainilla", "5 cucharadas de gelatina sin sabor", "½ pocillo de agua hirviendo"], "steps": ["Se baten las claras a punto de nieve, se agrega el azúcar, el jugo de las curubas, la gelatina remojada en un poco de agua fría y disuelta en el agua caliente, a la que se le pone el jugo de los limones, se bate rápidamente y se agrega a la crema.", "Se agrega la vainilla y se coloca en un molde liso engrasado hasta que cuaje.", "Se desmolda y se sirve con crema inglesa y se adorna con ciruelas o duraznos."], "notes": []}, {"title": "Postre De Chocolate", "ingredients": ["chocolatas bambi de leche o chocolate con azúcar", "½ botella de crema de leche", "ponqué negro o chocolate ramo", "1 botella de leche", "1 caja de gelatina sin sabor"], "steps": ["Se pone a hervir la leche con el chocolate y se revuelve hasta que se disuelva bien, se agrega la gelatina en agua fría y se deja enfriar para agregar la crema de leche y se azucara al gusto", "Se coloca en un molde engrasado con un poco de crema, unas tajadas de ponqué y así hasta terminar con crema.", "Se pone a la nevera hasta que cuaje, y se sirve con crema inglesa."], "notes": []}, {"title": "Postre De Minuto", "ingredients": ["1 pan grande de molde", "1 taza de leche", "1 huevo batido a la nieve", "arequipe o mermelada y azúcar al gusto", "¼ de mantequilla", "1 cucharada de panela raspada", "limón rallado"], "steps": ["Se le quitan las cortezas al pan y se le hace un hueco de extremo a extremo por todo el centro.", "Se le meten unos tronquitos de mantequilla, el arequipe o mermelada, o las dos cosas y, se colocan en un molde refractario.", "Se baña con la leche a la que se le pone azúcar al gusto, la panela y el rallado de limón.", "Se bate el huevo a la nieve, se agrega la yema y un poco de azúcar, se cubre el pan y se mete al horno un momento. Se sirve enseguida."], "notes": []}, {"title": "Postre Excelente", "ingredients": ["1 piña pequeña", "½ libra de queso rallado", "2 gelatinas de limón", "3 tazas de agua fría", "½ libra de azúcar", "½ botella de crema de leche", "sobres de gelatina sin sabor", "remojados en ½ taza de agua fría"], "steps": ["Se pela la piña y se pica en cuadritos, se pone al fuego con el azúcar y, se deja hervir durante ¼ de hora y se retira.", "Se ponen a hervir las 3 tazas de agua, se retiran del fuego y se les añade las gelatinas revolviendo para que se disuelvan.", "La piña, el queso rallado y la crema se revuelven con el resto de los ingredientes y se colocan en un molde engrasado con aceite, se coloca en la nevera hasta que cuaje."], "notes": []}, {"title": "Postre De Frambuesa", "ingredients": ["2 tazas de agua", "6 hojas de colapiscis o ½ caja de gelatina sin sabor", "2 paquetes de gelatina de fresa o frambuesa", "2 tarros de leche condensada", "3 claras de huevo batidas a la nieve", "½ libra de ciruelas pasas sin pepa", "½ botella de crema de leche", "Unas galletas de vainilla"], "steps": ["Se pone al fuego las dos tazas de agua; cuando hierva se agrega la colapiscis remojada en agua fría o la gelatina remojada también remojada en un poco de agua fría y los dos paquetes de gelatina de fresa o frambuesa.", "Se disuelve la gelatina en agua caliente, se pone en la licuadora con los dos tarros de leche condensada y se baten por 2 minutos.", "Se baten las claras a la nieve, y poco a poco se agregan a la mezcla de la gelatina y la leche condensada.", "Se unta un molde con mantequilla y en el fondo se cubre con ciruelas, y alrededor galletas de vainilla.", "Se llena el molde con la mezcla. Se pone en la nevera hasta que esté duro.", "Se desmolda introduciendo el molde por un instante en agua caliente. Se coloca en una bandeja y alrededor se pone crema de leche batida y azucarada. Se adorna con hojas de rosa o racimos de uvas."], "notes": []}, {"title": "Postre De Fresas", "ingredients": ["1 paquete de pudín de vainilla", "4 cucharadas de mermelada de fresas", "½ litro de leche", "1 torta de bizcochuelo grande o dos pequeñas", "1 tarrito de crema de leche Nestlé pequeño"], "steps": ["Se pone al fuego la leche, y cuando hierva se le agrega el pudín disuelto en un poco de agua y se revuelve constantemente hasta que espese", "En una vasija de cristal se pone un tendido de bizcochuelos con mermelada, luego crema de leche y la mitad del pudín ya preparado.", "Luego más bizcochuelos, el resto del pudín y más mermelada.", "Se pone a helar en la nevera."], "notes": []}, {"title": "Postre De Gelatina", "ingredients": ["1 paquete de gelatina de limón", "1 tarro de leche condensada", "1 huevo", "1 paquete de gelatina de naranja", "2 pocillos de agua hirviendo."], "steps": ["Se mezcla la gelatina con el agua caliente, se vacía en la licuadora, luego se agrega la leche condensada, el huevo y, se revuelve bien.", "Se vacía en un molde engrasado con un poco de aceite y se coloca a la nevera hasta que cuaje.", "Se adorna con tajadas de naranja o con ramos de uva."], "notes": []}, {"title": "Postre De Hojuelas Ramo", "ingredients": ["1 paquete de hojuelas ramo", "1 poco de crema helada de cualquier sabor", "dulce de peras o fresas", "3 pastas de chocolate amargo", "1 tarro de leche condensada grande"], "steps": ["Se coloca una hojuela encima de una bandeja, encima se le coloca un tendido de crema.", "Luego otra hojuela, encima un tendido de dulce y así hasta terminar con hojuela.", "Se cubre con salsa de chocolate hecha con las pastillas de chocolate derretidas al baño maría y mezcladas con la leche condensada.", "Se mete al congelador un rato y se parte a tiempo de servirlo para que no se derrita."], "notes": ["NOTA: Esto se puede hacer con guiso de sal y se baña con crema de pollo,", "perejil crespo picado."]}, {"title": "Postre Holandes", "ingredients": ["½ libra de cuajada escurrida y molida", "½ libra de bizcochuelo desmenuzado", "¼ de fruta cristalizada, picadas menuditas", "¼ de almendras tostadas y molidas", "6 huevos", "esencia de vainilla", "crema"], "steps": ["Se mezcla todo esto, agregándole los 6 huevos separadamente, unas gotas de esencia de vainilla y media taza de crema.", "Se engrasa un molde liso y se echa esta mezcla poniéndolo luego al baño maría en el horno hasta que esté bien cuajado.", "Se cubre con salsa de ciruelas pasas."], "notes": []}, {"title": "Postre De Limón", "ingredients": ["1 tarro de leche condensada grande", "1 pocillo cafetero de jugo de limón", "½ caja de gelatina sin sabor, remojada", "en un poco de agua fría", "½ botella de crema de leche", "1 pocillo de agua caliente"], "steps": ["Se mezclan todos los ingredientes y se baten en la licuadora, se colocan en un molde engrasado con un poco de aceite y se coloca a la nevera hasta que cuaje.", "Se sirve adornado con cáscara de limón verde rallada por encima."], "notes": []}, {"title": "Postre De Mandarina", "ingredients": ["1 pocillo de jugo de mandarina", "azúcar al gusto.", "crema inglesa", "6 claras de huevo batidas a la nieve", "6 hojas de colapiscis o media caja de gelatina", "sin sabor, remojada en ½ pocillo de agua fría"], "steps": ["Se remoja la gelatina en agua fría y se disuelve en un poco de jugo caliente.", "Se mezcla todo muy bien y se agregan las claras a la nieve, mezclando rápidamente.", "Se coloca en un molde engrasado con un poco de aceite y se lleva a la nevera hasta que cuaje.", "Se sirve con crema inglesa que se hace con las yemas que quedaron."], "notes": []}, {"title": "Postre De Moras", "ingredients": ["1 botella de leche", "¾ de libra de azúcar", "1 yema de huevo", "15 hojas de colapiscis o una caja de gelatina", "sin sabor, más una cucharada alta.", "1 taza de juego de moras", "2 claras de huevo batidas a la nieve", "1 pocillo de crema de leche (chocolatero)"], "steps": ["Se pone al fuego la leche con el azúcar y la yema de huevo, se deja hervir y se retira del fuego.", "Se agrega la colapiscis o la gelatina remojada en agua fría y la taza de juego de moras, las dos claras a la nieve y el pocillo de crema de leche.", "Se remueve todo muy bien, se pone en un molde engrasado y se lleva a la nevera hasta que cuaje. Se sirve con crema inglesa y se adorna con moras."], "notes": []}, {"title": "Postre O Mousse De Maracuyá", "ingredients": ["1 tarro de leche condensada grande", "2 pocillos de jugo de maracuyá (8 maracuyás)", "1 caja de gelatina sin sabor", "4 claras de huevo", "azúcar al gusto (de 8 a 9 cucharadas)", "1 paquete de masmelos pequeños"], "steps": ["Se licúan los maracuyás con un poco de agua hasta completar 2 pocillos y se cuelan bien.", "Agregue el jugo de maracuyá a la leche condensada batiendo en la licuadora.", "Aparte remoje la gelatina en ½ pocillo de agua fría, disuelva en 1 pocillo de agua hirviendo y agréguela a la mezcla anterior.", "Por último, agregue las claras batidas a la nieve revolviendo bien.", "Lleve a la nevera en un molde engrasado con aceite, deje hasta que cuaje bien.", "Adorne con flores de masmelo."], "notes": ["Tiempo: 2 horas en la nevera", "Porciones: 14"]}, {"title": "Postre De Masmelos", "ingredients": ["3 talegos de masmelos", "6 claras de huevo batidas a la nieve y las yemas si se quiere", "1 caja de gelatina sin sabor", "1 tarro de frutas en su jugo o una lata de duraznos pequeña", "½ botella de crema de leche", "el jugo de las frutas", "1 pocillo de agua caliente", "1 tarro de leche condensada"], "steps": ["Se mezcla el jugo de las frutas con la crema de leche y la leche condensada batiendo bien.", "Se agrega la gelatina sin sabor remojada en un pocillo de agua fría y disuelta en el pocillo de agua hirviendo.", "Se baten las claras a la nieve y se agregan las yemas si se quiere, se agregan a la mezcla anterior revolviendo bien.", "Se le agregan los masmelos picados menuditos y la fruta escurrida o los duraznos picados, dejando 2 o 3 para adornar el postre.", "Se pone en la nevera hasta que cuaje (en un molde húmedo); cuando esté se desmolda en una bandeja y se adorna con las flores de durazno. FLORES DE DURAZNO:", "Se parten los duraznos en tiritas largas y con ellas se forman los pétalos."], "notes": []}, {"title": "Postre De Peras", "ingredients": ["1 libra de peras", "1 limón", "1 onza de mantequilla", "5 huevos", "1 lata de leche condensada grande"], "steps": ["Se pelan las peras, se cortan en trozos pequeños y se ponen en agua con sal.", "Se escuren las peras y se ponen en la licuadora con la leche condensada y los huevos.", "Se vierte esta mezcla en un molde engrasado con la mantequilla y se pone al horno al baño maría, hasta que al introducir un cuchillo salga limpio.", "Se adorna con cascos de peras caladas o peras caladas enteras."], "notes": []}, {"title": "Postre De Piña", "ingredients": ["1 piña", "1 ½ pocillo de azúcar", "2 cajas de gelatina de piña", "6 hojas de colapiscis o un tercio de paquete de gelatina sin sabor", "1 tarro de leche condensada grande"], "steps": ["Se pica la piña en tronquitos pequeños y se cala en el pocillo y medio de azúcar, y un pocillo de agua hasta que quede brillante y se escurre.", "Se le agregan las 2 cajas de gelatina de pina disueltas en 2 pocillos de agua caliente y la colapiscis remojada en agua fría o la gelatina sin sabor, disueltas con la gelatina de piña.", "Se licúa todo con el tarro de leche condensada, se vacía en un molde engrasado con un poco de aceite, se pone a la nevera hasta que cuaje.", "Se adorna con tajadas de piña calada con una uva o cereza en el centro o con galletas."], "notes": ["Tiempo: de 1 ½ horas a 2 en congelador", "Porciones: 12"]}, {"title": "Postre Rapido", "ingredients": ["1 pocillo de agua", "¾ libra de azúcar", "vino o aguardiente", "pan tajado, bizcochuelos o ponqué ramo", "2 vasos de leche grandes", "5 cucharadas de azúcar", "2 yemas de huevo, 1 cucharada de maicena", "vainilla al gusto (una cucharadita pequeña)", "1 cajita de pasas"], "steps": ["Se hace una crema inglesa así: se ponen al fuego los vasos de leche, dejando un poquito para desleír la maicena.", "Se agregan las yemas, batiendo bien.", "Se agrega el azúcar.", "Cuando suelte el hervor, se agrega la maicena disuelta en un poquito de leche.", "Cuando hierva y espese se retira del fuego y se perfuma con vainilla", "Aparte se hace un almíbar con los ¾ de azúcar y el pocillo de agua, cuando dé punto de bola blanda se retira, se le agrega el trago cuando esté frío", "Se remojan los bizcochuelos, el ponqué ramo o las tajadas de pan en el almíbar, luego se pone en un molde engrasado con mantequilla un tendido de bizcochuelos, otro tendido de crema inglesa con pasas, y así hasta terminar con crema inglesa.", "Aparte se baten las claras a punto de merengue, se le echan al postre por encima, se mete un momento al horno hasta que dore el batido, se saca y se deja enfriar para servirlo."], "notes": []}, {"title": "Postre O Sorbete De Guanabana", "ingredients": [], "steps": ["Se cierne la guanábana y al jugo se le agrega el zumo de un limón, se azucara al gusto, ½ litro de leche y se mezcla poco a poco al jugo de la fruta.", "Se bate bien y se sirve en copas con polvo de canela."], "notes": []}, {"title": "Pudín De Coco", "ingredients": ["1 paquete de coco tostado al horno", "1 taza de leche", "1 pan tajado", "½ taza de azúcar", "2 cucharadas de mantequilla derretida", "1 cucharadita de vainilla", "½ cucharadita de sal", "2 huevos"], "steps": ["Se mezclan el pan rallado con la leche y el resto de los ingredientes, se coloca al horno caliente al baño maría en un molde engrasado hasta que el cuchillo salga limpio."], "notes": []}, {"title": "Pudín De Pan", "ingredients": ["1 pan grande de comapán o indupán desmenuzado", "4 huevos sin batir", "2 pocillos de leche", "2 cucharadas de mantequilla derretida", "½ cucharadita de canela", "azúcar al gusto", "¼ de queso rallado", "1 caja de pasas", "un poquito de arequipe", "1 copita de vino dulce", "el rallado de un limón verde", "1 cucharadita de polvo royal"], "steps": ["Se remoja el pan con la leche, se agregan los huevos, la mantequilla, el queso, la canela, azúcar al gusto, las pasas, el vino, el rallado del limón, el polvo royal y por ultimo los pedacitos de arequipe.", "Se coloca en un molde bien engrasado con mantequilla y se pone al horno al baño maría en una vasija con agua caliente.", "Cuando el cuchillo salga limpio se saca y se deja reposar para desmoldarlo."], "notes": []}, {"title": "Sufle De Coco", "ingredients": ["1 coco", "3 huevos", "2 tarros con de leche condensada"], "steps": ["Se ralla el coco, se mezcla con los huevos batidos y la leche condensada.", "Se acaramela el molde un poco, se echa todo y se pone al baño maría en el horno hasta que al introducir un cuchillo salga limpio."], "notes": []}]}, {"name": "Repostería", "recipes": [{"title": "Bananos Asados", "ingredients": ["7 bananos grandes", "¼ de queso blanco", "azúcar al gusto", "3 tostadas o polvo de bizcocho", "½ botella de leche", "2 huevos", "2 cucharadas de mantequilla", "canela en polvo"], "steps": ["Se pelan los bananos, se les quita la fibra y se abren a lo largo con el cuchillo.", "Se les pone por encima azúcar abundante, queso rallado y pedacitos de mantequilla y canela, se mezcla con los huevos batidos y la leche condensada.", "Se cubren con la crema de leche mezclada con azúcar y el huevo batido.", "Se les pone polvo de tostada por encima y se mete al horno hasta que dore en un molde engrasado."], "notes": ["Tiempo: ½ hora en el horno", "Porciones: 8"]}, {"title": "Barquillos Rellenos", "ingredients": ["½ libra de harina de trigo", "2 cucharadas de mantequilla", "un poco de: sal y agua de panela par mojar la masa", "1 cucharadita de polvo royal", "1 huevo"], "steps": ["Se mezcla la harina con el huevo, el polvo royal y la sal, se amasa todo muy bien y se moja todo con un poco de agua de panela hasta formar pasta suave, pero que no prenda de los dedos.", "Se tapa con una servilleta y se deja reposar ½ hora al sol o cerca del calor del fogón.", "Se extiende con el rodillo que quede delgada, se cortan tiras y se arman los barquillos en el molde y se pegan con un poco de huevo batido.", "Se fríen en aceite caliente hasta que doren.", "Se sacan del cartucho y se dejan freír por dentro.", "Luego se sacan bien escurridos y se rellenan con crema inglesa espesa y se les pone un copete de crema de leche azucarada y se colocan en una bandeja.", "También pueden rellenarse con guiso de sal."], "notes": []}, {"title": "Bizcochitos", "ingredients": ["2 tazas de galleta dulce", "2 tazas de maní picado", "180 gramos de chocolate semi - dulce", "1 lata grande de leche condensada"], "steps": ["Se mezcla las galletas trituradas con el chocolate derretido, el maní picado y la leche condensada, en un molde cuadrado engrasado con mantequilla, forrando su fondo con papel parafinado, se vierte la preparación anterior.", "Se lleva al horno a 350 grados hasta que esté dorado, se retira del horno y se deja reposar 10 minutos antes de voltearlo.", "Se quita el papel para partirlo en cuadritos, dejándoles enfriar."], "notes": []}, {"title": "Bizcocho De Coco", "ingredients": ["1 coco grande", "½ libra de azúcar", "½ pocillo de almíbar", "4 huevos", "½ libra de mantequilla", "½ libra de harina de trigo", "½ vaso de leche", "2 cucharaditas de polvo royal"], "steps": ["Se bate la mantequilla con el azúcar, se agregan los huevos batidos a la nieve.", "Se agrega el coco rallado y los demás ingredientes; luego se pone al horno en un molde engrasado con aceite y espolvoreado de harina.", "Se deja hasta que al introducir un cuchillo salga limpio.", "Se cubre con la siguiente crema: 3 claras de huevo 1 ½ Pocillo de azúcar 1/3 de pocillo de agua ½ cucharadita de vainilla ¼ cucharadita de jugo de limón", "Se baten las claras a punto de nieve. A parte de hace un almíbar con el azúcar y el agua hasta darle punto de bola dura.", "Se deja caer lentamente sobre las claras, sin dejar de revolver hasta darle consistencia gruesa.", "Se agrega el limón y la vainilla, se cubre el bizcocho y se adorna con coco rallado."], "notes": []}, {"title": "Bizcocho De Naranja", "ingredients": ["1 pocillo de jugo de naranja", "1 paquetico pequeño de maicena", "¼ de mantequilla", "3 huevos", "1 pocillo de azúcar", "½ pocillo de harina de trigo", "rallado de una naranja", "4 cucharaditas de polvo royal"], "steps": ["Se mezcla la mantequilla con el azúcar y el rallado de naranja.", "Se agregan las yemas, la leche, el polvo royal, el jugo de naranja, la maicena y la harina de trigo.", "Por último, se agregan las claras batidas a la nieve.", "Se coloca en un molde engrasado y enharinado.", "Se cubre con cubierta de chocolate."], "notes": []}, {"title": "Cubierta De Chocolate:", "ingredients": ["1 pocillo de azúcar", "3 cucharadas de leche", "1 clara de huevo"], "steps": ["Se pone la leche y el chocolate a derretir, se agrega el azúcar con la clara a la nieve y, se deja al fuego hasta que espese."], "notes": []}, {"title": "Bizcocho De Oro", "ingredients": ["1 ½ pocillos de azúcar", "6 yemas de huevo", "½ pocillo de leche", "2 pocillos colmados de maicena y harina de trigo", "1 pudín de chocolate", "¼ largo de mantequilla", "½ cucharadita de bicarbonato de soda", "un poco de esencia de vainilla"], "steps": ["Se bate el azúcar con la mantequilla hasta formar crema, luego se agregan las yemas, y después los demás ingredientes, batiendo bien todo.", "Se lleva al horno en un molde engrasado y en
